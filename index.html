      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border-vania {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.15),
          0 0 0 4px #D32F2F,
          0 0 0 8px #000;
      }

      /* Light Pastel Soft Pink Borders for Bubble Bobble Theme */
      .pixel-border-bubble {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.1),
          inset 4px 4px 0px 0px rgba(255,255,255,0.8),
          0 0 0 4px #FFC2D9,
          0 0 0 8px #00E5FF;
      }

      .music-border-vania {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.15),
          0 0 0 2px #E65100,
          0 0 0 4px #000;
      }

      .music-border-bubble {
        box-shadow:

          inset 2px 2px 0px 0px rgba(255,255,255,0.8),
          0 0 0 2px #FF80AB,
          0 0 0 4px #00E5FF;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(230,81,0,0.1) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.15;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 235, 204, 0); }
        10% { background-color: rgba(255, 240, 217, 0.7); }
        20% { background-color: rgba(255, 235, 204, 0); }
        35% { background-color: rgba(255, 240, 217, 0.5); }
        45% { background-color: rgba(255, 235, 204, 0); }
        100% { background-color: rgba(255, 235, 204, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.7s ease-out;
      }

      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      }

      /* Critter Wandering Paths - Full width screen traverse animations */
      @keyframes batFlyRight {
        0% { left: -15%; transform: scaleX(1) translateY(0); }
        25% { transform: scaleX(1) translateY(-12vh); }
        50% { transform: scaleX(1) translateY(15vh); }
        75% { transform: scaleX(1) translateY(-8vh); }
        100% { left: 115%; transform: scaleX(1) translateY(0); }
      }
      @keyframes batFlyLeft {
        0% { left: 115%; transform: scaleX(-1) translateY(0); }
        25% { transform: scaleX(-1) translateY(8vh); }
        50% { transform: scaleX(-1) translateY(-15vh); }
        75% { transform: scaleX(-1) translateY(5vh); }
        100% { left: -15%; transform: scaleX(-1) translateY(0); }
      }
      @keyframes spiderCrawlRight {
        0% { left: -15%; }
        100% { left: 115%; }
      }
      @keyframes spiderCrawlLeft {
        0% { left: 115%; }
        100% { left: -15%; }
      }
      @keyframes fairyFlyRight {
        0% { left: -15%; transform: scaleX(1) translateY(0); }
        50% { transform: scaleX(1) translateY(-10vh); }
        100% { left: 115%; transform: scaleX(1) translateY(0); }

        0% { left: 115%; transform: scaleX(-1) translateY(0); }
        50% { transform: scaleX(-1) translateY(10vh); }
        100% { left: -15%; transform: scaleX(-1) translateY(0); }

        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
      }
      .nes-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

        background-color: #B71C1C;
        box-shadow:

      .nes-btn-vania.red { background-color: #3e2723; color: #ffab91; }

        background-color: #FF80AB;
        color: white;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.2),

      .nes-btn-bubble.green { background-color: #00E5FF; color: #001133; }
      .nes-btn-bubble.red { background-color: #FF4081; color: #fff; }

      .nes-btn-adventure {
        background-color: #8D4F2A;

        box-shadow:

      .nes-btn-adventure.red { background-color: #5D4037; color: #FFF; }

      .scrollbar-vania::-webkit-scrollbar-track { background: #1a0f0d; border-left: 2px solid #E65100; }
      .scrollbar-vania::-webkit-scrollbar-thumb { background: #B71C1C; border: 2px solid #000; }

      .scrollbar-bubble::-webkit-scrollbar { width: 12px; }

      .scrollbar-bubble::-webkit-scrollbar-thumb { background: #FF80AB; border: 2px solid #fff; }

        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0,229,255,0.5);

        top: 0;

        margin: 0; 
        overflow-x: hidden;

        // --- RETRY FETCH HELPER ---
        async function fetchWithRetryLocal(url, options, retries = 3) {
          let delay = 300;
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, options);
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              return await response.json();
            } catch (e) {
              if (i === retries - 1) throw e;
              await sleep(delay);
              delay *= 2;
            }
          }
        };

        // --- GLOBAL ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMessage: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMessage: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("React Crash:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#180907] p-8 text-center border-4 border-red-600">
                  <h1 className="font-pixel text-4xl text-red-500 mb-6">SYSTEM CRASH</h1>
                  <p className="font-terminal text-2xl text-white mb-6">A magical anomaly broke the timeline:</p>
                  <div className="bg-black p-4 text-red-400 font-terminal text-xl pixel-border-vania w-full max-w-2xl break-words">
                    {this.state.errorMessage}
                  </div>
                  <button className="nes-btn nes-btn-vania green mt-8" onClick={() => window.location.reload()}>Reboot System</button>
                </div>
              );
            }
            return this.props.children; 
          }
        }

        // --- CLOZE COMPREHENSION SENTENCE TEXT CHAPTER ---
        function ClozeTextChapter({ pages, missingWords, isCurrent, isHistorical, currentBlanks, setCurrentBlanks, textSize, gameTheme }) {

          const isBubble = gameTheme === 'bubble';
          const isAdventure = gameTheme === 'adventure';
          
          let textStyle = `font-terminal leading-relaxed whitespace-pre-wrap mb-6 text-gray-200`;

          return (

                  return (
                    <p key={pIdx} className={textStyle} style={{ fontSize: `${textSize}px` }}>

                  );
                }
                
                return (

                    {parts.map((part, i) => {
                      if (i === parts.length - 1) return <span key={i}>{part}</span>;
                      
                      const currentBlankIndex = globalBlankCounter++;
                      const correctWord = missingWords && missingWords[currentBlankIndex] ? missingWords[currentBlankIndex] : "";
                      
                      if (isHistorical) {
                        return (
                          <React.Fragment key={i}>
                            <span>{part}</span>

                          </React.Fragment>

                      const userVal = currentBlanks[currentBlankIndex] || "";

        // --- FLAPPY BAT / CLOUD MINI GAME COMPONENT ---
        function FlappyBatMinigame({ theme }) {
          const canvasRef = useRef(null);
          const isBubble = theme === 'bubble';
          const isAdventure = theme === 'adventure';

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            let player = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 };
            let pipes = [];
            let score = 0; let gameOver = false; let frameCount = 0;

            const drawPlayer = (x, y, size) => {
              if (isBubble) {
                // Iridescent shiny magic bubble
                ctx.fillStyle = 'rgba(0, 229, 255, 0.7)';
                ctx.strokeStyle = '#FF80AB';
                ctx.lineWidth = 2;
                let s = size * 2.5; 
                let cx = x + size / 2;
                let cy = y + size / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, s/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Shine reflection highlight
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.arc(cx - s/6, cy - s/6, s/5, 0, Math.PI * 2);
                ctx.fill();
              } else if (isAdventure) {
                // Custom GBA-Style vector drawn Flappy Seagull
                ctx.strokeStyle = '#607D8B';
                ctx.lineWidth = 3;
                ctx.beginPath();
                let s = size * 2.5; 
                let ox = x - size * 0.75;
                let oy = y - size * 0.75;
                // Flapping wings alternating states (larger, matching bat wingspan)
                if (Math.floor(frameCount / 8) % 2 === 0) {
                  // Wings Up
                  ctx.moveTo(ox, oy + s);
                  ctx.quadraticCurveTo(ox + s/3, oy, ox + s/2, oy + s/2);
                  ctx.quadraticCurveTo(ox + 2*s/3, oy, ox + s, oy + s);
                } else {
                  // Wings Down
                  ctx.moveTo(ox, oy);
                  ctx.quadraticCurveTo(ox + s/3, oy + s, ox + s/2, oy + s/2);
                  ctx.quadraticCurveTo(ox + 2*s/3, oy + s, ox + s, oy);
                }
                ctx.stroke();
                // Core bird body block
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(ox + s/2 - 6, oy + s/2 - 4, 12, 8);
                ctx.fillStyle = '#FFC107'; // yellow beak
                ctx.fillRect(ox + s/2 + 6, oy + s/2 - 1, 6, 4);
              } else {
                ctx.fillStyle = '#ffb300'; ctx.fillRect(x, y + size/3, size, size/3);
                if (Math.floor(frameCount / 8) % 2 === 0) {
                  ctx.fillRect(x - size/2, y, size/2, size/2); ctx.fillRect(x + size, y, size/2, size/2); 
                } else {
                  ctx.fillRect(x - size/2, y + size/2, size/2, size/2); ctx.fillRect(x + size, y + size/2, size/2, size/2); 
                }
                ctx.fillStyle = '#ff2222'; ctx.fillRect(x + size - 4, y + size/3 + 2, 2, 2);
              }
            };

            const update = () => {
              if (gameOver) return;
              player.velocity += player.gravity; player.y += player.velocity;
              if (player.y > canvas.height - player.size || player.y < 0) gameOver = true;
              if (frameCount % 110 === 0) pipes.push({ x: canvas.width, topHeight: Math.random() * (canvas.height - 160) + 20, gap: 120, passed: false, width: 45 });
              pipes.forEach(p => {
                p.x -= 2.5;
                if (player.x < p.x + p.width && player.x + player.size > p.x) { if (player.y < p.topHeight || player.y + player.size > p.topHeight + p.gap) gameOver = true; }
                if (!p.passed && player.x > p.x + p.width) { p.passed = true; score++; }
              });
              pipes = pipes.filter(p => p.x + p.width > 0);
              frameCount++;
            };

            const draw = () => {
              if (isBubble) {
                // Light pastel magical blue sky
                ctx.fillStyle = '#E3F2FD'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw fluffy happy background pixel clouds
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(80, 40, 60, 20); ctx.fillRect(95, 30, 30, 30);
                ctx.fillRect(280, 70, 70, 20); ctx.fillRect(300, 60, 40, 30);
                ctx.fillRect(160, 160, 50, 15); ctx.fillRect(170, 150, 30, 25);
              } else if (isAdventure) {
                // Sunset Beach gradient for Flappy game screen too!
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#FFE082');
                grad.addColorStop(0.3, '#FFB74D');
                grad.addColorStop(0.65, '#90CAF9');
                grad.addColorStop(1, '#5C6BC0');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Sparkling sunset sun
                ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(canvas.width - 80, 65, 30, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFCA28';
                ctx.beginPath();
                ctx.arc(canvas.width - 80, 65, 18, 0, Math.PI*2);
                ctx.fill();
              } else {
                ctx.fillStyle = '#1c0f0d'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
              }
              
              pipes.forEach(p => {
                ctx.fillStyle = isBubble ? '#FF80AB' : (isAdventure ? '#E0F7FA' : '#d84315'); 
                ctx.fillRect(p.x, 0, p.width, p.topHeight); ctx.fillRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
                ctx.strokeStyle = isBubble ? '#FFFFFF' : (isAdventure ? '#8D4F2A' : '#3e2723'); 
                ctx.lineWidth = 3; 
                ctx.strokeRect(p.x, 0, p.width, p.topHeight); ctx.strokeRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
              });

              drawPlayer(player.x, player.y, player.size);

              // Render text on canvas helper
              ctx.fillStyle = (isBubble || isAdventure) ? '#0D47A1' : 'white'; 
              ctx.font = '12px "Press Start 2P", monospace'; 
              ctx.fillText(`SCORE:${score}`, 10, 30);

              if (gameOver) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#C2185B'; ctx.textAlign = 'center'; ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = '#0D47A1'; ctx.font = '8px "Press Start 2P", monospace'; ctx.fillText("Tap or Space to Restart", canvas.width/2, canvas.height/2 + 20); ctx.textAlign = 'left';
              }
            };

            const loop = () => { update(); draw(); animationFrameId = window.requestAnimationFrame(loop); };
            loop();

            const handleInput = (e) => {
              if (e.type === 'keydown' && e.code === 'Space') e.preventDefault();
              if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
              if (gameOver) { player = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 }; pipes = []; score = 0; gameOver = false; frameCount = 0; } 
              else { player.velocity = player.jump; }
            };

            window.addEventListener('keydown', handleInput, { passive: false });
            canvas.addEventListener('touchstart', handleInput, { passive: false });
            canvas.addEventListener('mousedown', handleInput);

            return () => {
              window.cancelAnimationFrame(animationFrameId);
              window.removeEventListener('keydown', handleInput);
              if (canvas) { canvas.removeEventListener('touchstart', handleInput); canvas.removeEventListener('mousedown', handleInput); }
            };
          }, [isBubble, isAdventure]);

          return (
            <div className="flex flex-col items-center w-full max-w-full mx-auto h-full justify-center">
              <p className={`font-pixel text-[8px] md:text-[10px] mb-4 animate-pulse text-center leading-relaxed ${isBubble ? 'text-[#C2185B]' : (isAdventure ? 'text-[#8D4F2A]' : 'text-amber-500')}`}>
                Play {isBubble ? 'Flappy Cloud' : (isAdventure ? 'Flappy Seagull' : 'Flappy Bat')} while the AI writes your book!
              </p>
              <canvas ref={canvasRef} width={480} height={280} className={`cursor-pointer touch-none max-w-full ${isBubble ? 'pixel-border-bubble bg-white' : (isAdventure ? 'pixel-border-bubble border-[#8D4F2A] bg-white' : 'pixel-border-vania bg-black')}`} />
              <p className={`font-terminal text-sm mt-4 text-center ${isBubble ? 'text-gray-600' : 'text-gray-400'}`}>Spacebar, Up Arrow, or Tap to jump.</p>
            </div>
          );
        }

        function SunsetPixelArt({ setting, turn, villain, theme }) {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            let skyColors = [];
            if (theme === 'bubble') {
              skyColors = ['#E1F5FE', '#B3E5FC', '#81D4FA'];
            } else if (theme === 'adventure') {
              // Custom Sunset Sky gradient in sunset scene
              skyColors = ['#FFE082', '#FFB74D', '#90CAF9', '#5C6BC0'];
            } else {
              if (turn === 0 || turn === 1) skyColors = ['#fc9838', '#fc7460', '#bc447c']; 
              else if (turn >= 2 && turn <= 4) skyColors = ['#f85800', '#e40058', '#a800a8', '#5800a8']; 
              else if (turn >= 5 && turn <= 7) skyColors = ['#e40058', '#a800a8', '#400080', '#000040']; 
              else skyColors = ['#180040', '#000028', '#000010', '#000000']; 
            }

            const step = h / skyColors.length;
            skyColors.forEach((color, i) => {
              ctx.fillStyle = color;
              ctx.fillRect(0, i * step, w, step);
            });

            if (turn < 7 || theme === 'adventure') {
              const sunY = 60 + turn * 22;
              ctx.fillStyle = theme === 'bubble' ? 'rgba(255, 255, 255, 0.4)' : (theme === 'adventure' ? 'rgba(255, 255, 255, 0.3)' : 'rgba(255, 235, 204, 0.2)');
              ctx.beginPath(); ctx.arc(w/2, sunY, 48, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = theme === 'bubble' ? '#ffffff' : (theme === 'adventure' ? '#FFF59D' : '#ffeb3b');
              ctx.beginPath(); ctx.arc(w/2, sunY, 32, 0, Math.PI * 2); ctx.fill();
            } else {
              ctx.fillStyle = '#ffffff';
              for (let i = 0; i < 20; i++) {
                ctx.fillRect(Math.floor((Math.sin(i * 99) * 0.5 + 0.5) * w), Math.floor((Math.cos(i * 33) * 0.5 + 0.5) * (h - 100)), 2, 2);
              }
              const moonColor = theme === 'bubble' ? '#88EEFF' : (turn === 9 ? '#d32f2f' : '#fff9c4');
              const moonGlow = theme === 'bubble' ? 'rgba(0, 229, 255, 0.3)' : (turn === 9 ? 'rgba(211, 47, 47, 0.3)' : 'rgba(255, 249, 196, 0.2)');
              ctx.fillStyle = moonGlow;
              ctx.beginPath(); ctx.arc(w - 70, 60, 26, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = moonColor;
              ctx.beginPath(); ctx.arc(w - 70, 60, 18, 0, Math.PI * 2); ctx.fill();
            }

            if (villain === 3) {
              const ogreX = w * 0.15; const ogreY = 45;
              ctx.fillStyle = '#388e3c'; ctx.fillRect(ogreX, ogreY, 40, 40);
              ctx.fillRect(ogreX - 8, ogreY + 6, 8, 8); ctx.fillRect(ogreX + 40, ogreY + 6, 8, 8);
              ctx.fillStyle = theme === 'bubble' ? '#FFC2D9' : '#f57c00'; ctx.fillRect(ogreX + 6, ogreY + 12, 6, 6); ctx.fillRect(ogreX + 28, ogreY + 12, 6, 6);
              ctx.fillStyle = '#ff1744'; ctx.fillRect(ogreX + 8, ogreY + 14, 2, 2); ctx.fillRect(ogreX + 30, ogreY + 14, 2, 2);
              ctx.fillStyle = '#1b5e20'; ctx.fillRect(ogreX + 16, ogreY + 22, 8, 6);
              ctx.fillStyle = '#ffffff'; ctx.fillRect(ogreX + 8, ogreY + 30, 4, 4); ctx.fillRect(ogreX + 28, ogreY + 30, 4, 4);
              ctx.fillStyle = '#000000'; ctx.fillRect(ogreX + 12, ogreY + 32, 16, 2);
            }

            ctx.fillStyle = theme === 'bubble' ? 'rgba(255, 255, 255, 0.65)' : 'rgba(24, 9, 7, 0.65)';
            ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(0, h - 80); ctx.lineTo(w * 0.2, h - 120);
            ctx.lineTo(w * 0.4, h - 70); ctx.lineTo(w * 0.6, h - 105); ctx.lineTo(w * 0.8, h - 80);
            ctx.lineTo(w, h - 130); ctx.lineTo(w, h); ctx.closePath(); ctx.fill();

            ctx.fillStyle = theme === 'bubble' ? '#E1F5FE' : '#100504'; ctx.fillRect(0, h - 40, w, 40);
            ctx.fillStyle = theme === 'bubble' ? '#FFC2D9' : '#3e2723'; ctx.fillRect(0, h - 40, w, 4);
            ctx.fillStyle = '#000000';

            switch(setting) {
              case 0: {
                ctx.fillRect(10, 0, 30, h); ctx.fillRect(w - 40, 0, 30, h);
                ctx.fillStyle = theme === 'bubble' ? '#FFC2D9' : '#ffeb3b'; ctx.fillRect(120, h - 140, 12, 6); ctx.fillRect(w - 150, h - 180, 14, 8);
                break;
              }
              case 1: {
                ctx.fillRect(30, h - 220, 60, 180); ctx.fillRect(200, h - 180, 50, 140);
                ctx.beginPath(); ctx.moveTo(30, h - 220); ctx.lineTo(60, h - 270); ctx.lineTo(90, h - 220); ctx.fill();
                break;
              }
              case 2: {
                const drawTree = (tx, ty) => {
                  ctx.fillRect(tx + 12, ty, 6, h - ty);
                  ctx.beginPath(); ctx.moveTo(tx, ty + 60); ctx.lineTo(tx + 15, ty); ctx.lineTo(tx + 30, ty + 60); ctx.fill();
                  ctx.beginPath(); tx -= 5; ctx.moveTo(tx, ty + 120); ctx.lineTo(tx + 20, ty + 40); ctx.lineTo(tx + 40, ty + 120); ctx.fill();
                };
                drawTree(40, h - 240); drawTree(w - 90, h - 260);
                break;
              }
              case 3: {
                ctx.beginPath(); ctx.moveTo(w/2 - 120, h - 40); ctx.lineTo(w/2, h - 190); ctx.lineTo(w/2 + 120, h - 40); ctx.closePath(); ctx.fill();
                break;
              }
              case 4: {
                ctx.fillRect(20, h - 160, 20, 120); ctx.fillRect(w - 50, h - 190, 30, 150);
                ctx.fillStyle = '#00e676'; ctx.fillRect(25, h - 120, 4, 4);
                ctx.fillStyle = '#ff1744'; ctx.fillRect(25, h - 100, 4, 4);
                break;
              }
              case 5: {
                ctx.fillRect(0, h - 50, w, 20); ctx.fillRect(40, h - 180, 12, 140); ctx.fillRect(w - 80, h - 200, 14, 160);
                break;
              }
              case 6: {
                ctx.fillRect(20, h - 170, 80, 130); ctx.fillRect(w - 110, h - 190, 90, 150);
                ctx.fillStyle = '#00'; ctx.fillRect(w/2 - 3, h - 100, 6, 40); ctx.fillRect(w/2 - 12, h - 90, 24, 6);
                break;
              }
              case 7: {
                ctx.beginPath(); ctx.arc(80, h - 160, 45, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w - 100, h - 200, 60, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 8: {
                ctx.fillRect(60, h - 120, 40, 80); ctx.fillRect(w - 100, h - 140, 40, 100);
                ctx.beginPath(); ctx.arc(w - 80, h - 160, 15, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 9: {
                ctx.beginPath(); ctx.arc(w/2, h - 150, 70, 0, Math.PI * 2); ctx.strokeStyle = '#000000'; ctx.lineWidth = 6; ctx.stroke();
                ctx.lineWidth = 2;
                for (let a = 0; a < 8; a++) {
                  const angle = (a * Math.PI) / 4;
                  ctx.beginPath(); ctx.moveTo(w/2, h - 150); ctx.lineTo(w/2 + Math.cos(angle) * 70, h - 150 + Math.sin(angle) * 70); ctx.stroke();
                }
                break;
              }
            }
          }, [setting, turn, villain, theme]);

          return (
            <canvas ref={canvasRef} width={500} height={500} className="w-full h-full object-cover transition-opacity duration-1000" style={{ imageRendering: 'pixelated' }} />
          );
        }

        function generateLocalBook(setup) {
          const configSet = setup.gameTheme === 'bubble' ? BUBBLE_CATEGORIES : (setup.gameTheme === 'adventure' ? ADVENTURE_CATEGORIES : ORIGINAL_CATEGORIES);
          const char = configSet.characters[setup.character] || { name: "The Hero" };
          const vill = configSet.villains[setup.villain] || { name: "The Villain" };
          const sett = configSet.settings[setup.setting] || { name: "The Land" };
          const plot = configSet.plots[setup.plot] || { name: "complete the quest" };
          const dil = configSet.dilemmas[setup.dilemma] || { name: "danger" };
          
          const level = setup.readingLevel;
          const pageWordTargets = [90, 300, 400, 500];
          const targetW = pageWordTargets[level] || 300;

          // Peter Brown "The Wild Robot" Inspired observative short-sentence local prose templates:
          const storyProgressionTemplates = [
            {
              title: "The Arrival",
              vania: `A cold wind swept across the jagged spires. The ${char.name} stood at the edge of the ${sett.name}. Leaves rustled like dry paper. The machine had to adjust its sensors. Its primary directive was to ${plot.name}. Ahead lay a dark road, filled with quiet shadows. Step by step, the traveler began the march. There was no going back now.`,
              bubble: `Soft pastel light warmed the clover hills. The ${char.name} hovered gently above the ${sett.name}. Warm trade winds carried the sweet scent of sugar blossoms. The traveler's magic guide was set to ${plot.name}. Everything felt calm, quiet, and happy. It was a beautiful afternoon to begin a grand journey.`
            },
            {
              title: "The First Clue",
              vania: `A rusted iron latch lay hidden beneath a rotting spruce stump. Behind it lay a path, but the threat of the terrifying ${vill.name} was already felt. The path split, demanding a careful choice. A mistake here would lead to total ruin.`,
              bubble: `A hidden door carved out of a giant pink strawberry flower peeked out from the path. Behind it lay a trail of shimmering stardust. The friendly explorer took a deep breath, scanning the beautiful woods. A sign warned that the mischievous ${vill.name} was nearby.`
            },
            {
              title: "Deepening Mystery",
              vania: `The air grew cold. Unseen eyes watched from dark alcoves. The explorer carefully calculated the trajectory of the shifting walls, knowing that any mistake would lead straight to ${vill.name}'s dungeons.`,
              bubble: `Dewdrops glistened on bluebells like small fairy lanterns. The path began to curve upwards toward the clouds. The traveler counted the stars on the map, knowing they must proceed with joy to avoid ${vill.name}'s playful fog traps.`
            },
            {
              title: "The Threat Arrives",
              vania: `A chilling laugh echoed through the corridors. The shadow of ${vill.name} stretched across the walls. The dangerous trap of ${dil.name} was trigger-primed, threatening to swallow the hero whole.`,
              bubble: `A sweet laughter echoed through the pink valleys. A shadow resembling a cute but tricky little troll danced over the hills. The challenge of ${dil.name} was now ready, testing the explorer's brave and magical heart.`
            },
            {
              title: "Caught in the Labyrinth",
              vania: `Spooky iron gates slammed shut behind. The labyrinth of the ${sett.name} shifted constantly. Only strict logical deduction could reveal the escape route before time ran out.`,
              bubble: `Rainbow gates gently closed behind the explorer. The pathways of the ${sett.name} shifted in beautiful patterns like a rotating kaleidoscope. Only pure joy and clear thinking would reveal the star path.`
            },
            {
              title: "Confronting the Minion",
              vania: `A monstrous gargoyle blocked the path. Armed only with their intellect and unique abilities, they prepared to outsmart the creature and continue the epic quest.`,
              bubble: `A big, fluffy cloud guardian sat right in the middle of the trail. Armed only with a melody and magical spells, the traveler prepared to play a happy tune and make a new forest friend.`
            },
            {
              title: "Escaping the Crypt",
              vania: `Fleeing the shifting traps, the hero broke through the crumbling floor. They landed in a hidden vault of ancient lore, catching sight of the final route.`,
              bubble: `Slipping past the sweet marshmallow barriers, the traveler slid down a smooth rainbow slide. They landed inside a sparkling treasure chamber full of maps showing the route ahead.`
            },
            {
              title: "The Narrow Ascent",
              vania: `Stairs of jagged stone wound up into the twilight. Every step brought the hero closer to the ultimate confrontation. The pressure of ${dil.name} weighed heavily upon them.`,
              bubble: `Stairs made of soft, floating clouds wound up toward the sunset sky. Every step carried the traveler higher. The gentle countdown of ${dil.name} ticked away in a soft rhythm.`
            },
            {
              title: "Before the Grand Threshold",
              vania: `Standing before massive iron double-doors, they paused. The evil presence of the terrible ${vill.name} was palpable on the other side. This was the moment of truth.`,
              bubble: `Standing before a pair of giant golden gates, they stopped to adjust their wings. The magic energy of the silly ${vill.name} was warm on the other side. The final door was waiting.`
            },
            {
              title: "Final Triumph",
              vania: `With a burst of courage, they confronted ${vill.name}! Using their remarkable skills, the hero dismantled the villain's plot, escaping the ${sett.name} as a legend.`,
              bubble: `With a big, happy smile, they stepped through the gates and met ${vill.name}! Offering a gift of sugar blossoms, the traveler saved the land, bringing harmony and spring back to the ${sett.name}.`
            }
          ];

          let chapters = [];
          for (let turn = 0; turn < 10; turn++) {
            const template = storyProgressionTemplates[turn];
            const rawStory = setup.gameTheme === 'bubble' ? template.bubble : template.vania;

            let p1, p2, p3, q, choices;

            if (level === 0) { // Early Primary: 30 words per page (exactly 90 words per chapter)
              p1 = `See ${char.name} go. __BLANK__ walk fast. They must run. The sky is very dark. The dark wind can blow. It is very cold. See them find the big red door.`; 
              p2 = `Oh no! The bad ${vill.name} is here. They want to play. You must hide from __BLANK__. Look at the magic key.`; 
              p3 = `Solve the puzzle now. Open the big door. You can do it. Walk into the warm sun. You win the game.`; 
              q = `Who wants to play with you in this happy chapter?`;
              choices = [
                { text: `The bad ${vill.name}`, isCorrect: true, isGameOver: false },
                { text: `A big scary shadow`, isCorrect: false, isGameOver: true, gameOverMessage: "You ran away in fear and fell over a sleeping flower!" },
                { text: `A sleeping bird`, isCorrect: false, isGameOver: true, gameOverMessage: "No, the bird is sleeping! You woke it up and got tickled." }
              ];
              
              // Fallback cloze blanks for Level 0
              let word1 = "They";
              let word2 = "them";

              chapters.push({ 
                pages: [p1, p2, p3], 
                missingWords: [word1, word2], 
                question: q, 
                choices: choices.sort(() => Math.random() - 0.5) 
              });

            } else {
              const expandText = (baseText, targetCount) => {
                let textWords = baseText.split(/\s+/).filter(Boolean);
                let count = textWords.length;
                let padding = [
                  "The surrounding environment is beautiful and full of mystery.",
                  "Carefully observing the landscape is absolutely vital to the mission.",
                  "Step by step, the brave explorer travels closer to safety.",
                  "A feeling of immense focus drives the hero to make wise choices.",
                  "The colorful pathways echo with the sounds of a joyful quest.",
                  "Every single decision made here determines the outcome of the adventure."
                ];
                let padIdx = 0;
                while (count < targetCount) {
                  let nextPadding = padding[padIdx % padding.length];
                  baseText += " " + nextPadding;
                  textWords = baseText.split(/\s+/).filter(Boolean);
                  count = textWords.length;
                  padIdx++;
                }
                return textWords.slice(0, targetCount).join(" ");
              };

              p1 = expandText(rawStory, Math.ceil(targetW / 3));
              p2 = expandText(`The pathways split before you. The danger of ${dil.name} looms. ${char.name} must remain vigilant and stay focused.`, Math.ceil(targetW / 3));
              p3 = expandText(`The moment of decision has arrived. ${vill.name} watches from the distance, hoping you will make a mistake. Prepare to solve the riddle!`, Math.ceil(targetW / 3));
              
              q = `What is the primary objective of your current quest?`;
              choices = [
                { text: `To ${plot.name}`, isCorrect: true, isGameOver: false },
                { text: "To find an unrelated map", isCorrect: false, isGameOver: true, gameOverMessage: "You wandered off the main path and got tangled in sticky cotton candy!" },
                { text: "To stop and take a nap", isCorrect: false, isGameOver: true, gameOverMessage: "You slept too long and fell behind schedule!" }
              ];
              
              // Fallback cloze blanks
              p1 = p1.replace(/hero/i, "__BLANK__");
              p2 = p2.replace(/explorer/i, "__BLANK__");

              chapters.push({ 
                pages: [p1, p2, p3], 
                missingWords: ["hero", "explorer"], 
                question: q, 
                choices: choices.sort(() => Math.random() - 0.5) 
              });
            }
          }
          return chapters;
        }

        // --- EXPLICIT BINDINGS ON THE GLOBAL WINDOW CONTEXT ---
        window.App = App;

        // --- MAIN APP ---

          const [confirmDialog, setConfirmDialog] = useState(null);
          const [activeDeathMessage, setActiveDeathMessage] = useState(""); 
          const [menuImgIndex, setMenuImgIndex] = useState(0);
          
          const [hasReadFullText, setHasReadFullText] = useState(false);
          const [shootingStar, setShootingStar] = useState(null); 

          const [fullBook, setFullBook] = useState([]);
          const [currentBlanks, setCurrentBlanks] = useState({});

          const scrollRef = useRef(null);
          const activeChapterRef = useRef(null);
          const melodyIntervalRef = useRef(null);
          const endOfStoryRef = useRef(null); 

          const isMutedRef = useRef(isMuted);
          const currentTrackRef = useRef(currentTrack);
          const musicVolumeRef = useRef(musicVolume);
          const gameThemeRef = useRef(gameTheme);

          const isBubble = gameTheme === 'bubble';
          const isAdventure = gameTheme === 'adventure';

          // --- SYNCHRONIZED RETRIEVAL/EVENT HELPERS ON APP INITIATION ---

          // --- DYNAMIC INLINE SUNSET BACKGROUND STYLER ---
          const getAppBackgroundStyle = () => {
            if (gameTheme === 'bubble') {

          const playSynthNote = (freq, type, duration, volMod) => {
            initAudioContext();

            if (!ctx || isMutedRef.current || !freq) return;
            try {
              if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator();
              const gainNode = ctx.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, ctx.currentTime);
              gainNode.gain.setValueAtTime(0, ctx.currentTime);
              gainNode.gain.linearRampToValueAtTime(musicVolumeRef.current * volMod, ctx.currentTime + 0.01);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration - 0.01);
              osc.connect(gainNode);
              gainNode.connect(ctx.destination);
              osc.start();
              osc.stop(ctx.currentTime + duration);

          const startSynthEngine = () => {

              if (isMutedRef.current) return;

                if (NOTE_FREQ[bassNote]) playSynthNote(NOTE_FREQ[bassNote], "triangle", stepDuration * 3.8, 0.7);
              }
              let melodySum = 0;
              let currentMelodyNote = null;
              for (let i = 0; i < track.melody.length; i++) {
                const item = track.melody[i];
                if (step % 16 === melodySum) { currentMelodyNote = item; break; }
                melodySum += item.dur;
              }
              if (currentMelodyNote && NOTE_FREQ[currentMelodyNote.note]) {
                playSynthNote(NOTE_FREQ[currentMelodyNote.note], "square", stepDuration * currentMelodyNote.dur * 0.9, 0.3);
              }

          const generateFullBook = async (finalSetup) => {

            let success = false;

            const apiKey = "";

            while (attempts < 3 && !success) {

                const response = await fetchWithRetryLocal(GEMINI_URL, {

                  let words = combinedStoryText.split(/\s+/).filter(Boolean);
                  let balancedPages;

                    ];

                });
