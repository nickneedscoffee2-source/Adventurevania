<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventurevania - Choose Your Own Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
      
      .font-pixel { font-family: 'Press Start 2P', cursive; }
      .font-terminal { font-family: 'VT323', monospace; }
      
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.2),
          0 0 0 4px #4A00E0,
          0 0 0 8px #000;
      }

      .music-border {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.2),
          0 0 0 2px #4ade80,
          0 0 0 4px #000;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(138,43,226,0.2) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.1;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 255, 255, 0); }
        10% { background-color: rgba(255, 255, 255, 0.95); }
        20% { background-color: rgba(255, 255, 255, 0); }
        35% { background-color: rgba(255, 255, 255, 0.7); }
        45% { background-color: rgba(255, 255, 255, 0); }
        100% { background-color: rgba(255, 255, 255, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.6s ease-out;
      }

      /* Flight path animations for Bats and Spiders */
      @keyframes batFlyRight {
        0%   { left: -15vw; transform: translateY(0); }
        100% { left: 115vw; transform: translateY(-8vh); }
      }
      @keyframes batFlyLeft {
        0%   { left: 115vw; transform: translateY(0) scaleX(-1); }
        100% { left: -15vw; transform: translateY(-8vh) scaleX(-1); }
      }
      @keyframes spiderCrawlRight {
        0%   { left: -20vw; }
        40%  { left: 45vw; }
        60%  { left: 45vw; } /* Pause in place */
        100% { left: 120vw; }
      }
      @keyframes spiderCrawlLeft {
        0%   { left: 120vw; transform: scaleX(-1); }
        40%  { left: 45vw; transform: scaleX(-1); }
        60%  { left: 45vw; transform: scaleX(-1); } /* Pause in place */
        100% { left: -20vw; transform: scaleX(-1); }
      }

      /* Rapid wing flutter keyframes */
      @keyframes wingFlapLeft {
        0% { transform: scaleY(1); }
        100% { transform: scaleY(-0.4) translateY(2px); }
      }
      @keyframes wingFlapRight {
        0% { transform: scaleY(1); }
        100% { transform: scaleY(-0.4) translateY(2px); }
      }
      
      .wing-l { transform-origin: 16px 8px; animation: wingFlapLeft 0.08s infinite alternate ease-in-out; }
      .wing-r { transform-origin: 16px 8px; animation: wingFlapRight 0.08s infinite alternate ease-in-out; }

      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        background-color: #8E2DE2;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.4),
          inset 4px 4px 0px 0px rgba(255,255,255,0.3);
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
        box-shadow: 
          inset 4px 4px 0px 0px rgba(0,0,0,0.4),
          inset -4px -4px 0px 0px rgba(255,255,255,0.3);
      }
      .nes-btn.green { background-color: #4ade80; color: #064e3b; }
      .nes-btn.red { background-color: #ef4444; color: #450a0a; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #000; border-left: 2px solid #4A00E0; }
      ::-webkit-scrollbar-thumb { background: #8E2DE2; border: 2px solid #000; }
      
      body { background-color: #050505; margin: 0; overflow-x: hidden; }
      
      /* Music Slider styling */
      input[type=range] { accent-color: #8E2DE2; }
    </style>
</head>
<body>

          }

        const NOTE_FREQ = {
          "C2": 65.41, "C#2": 69.30, "D2": 73.42, "D#2": 77.78, "E2": 82.41, "F2": 87.31, "F#2": 92.50, "G2": 98.00, "G#2": 103.83, "A2": 110.00, "A#2": 116.54, "B2": 123.47,
          "D4": 293.66, "D#4": 311.13, "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88,
          "C5": 523.25, "D5": 587.33, "E5": 659.25, "F5": 698.46, "G5": 783.99, "Ab4": 415.30, "A5": 880.00, "G5": 783.99, "F5": 698.46
        };

            { name: "Castle of Calculus", icon: "🏰", desc: "A fortress built on math." },
            { name: "Primeval Forest", icon: "🌲", desc: "Dark woods full of science." },
            { name: "Ancient Pyramids", icon: "🏜️", desc: "Social studies in the sand." },
            { name: "Abandoned Lab", icon: "🏭", desc: "Where chemistry went wrong." },
            { name: "Spooky Swamp", icon: "🐊", desc: "Murky and full of biology." },
            { name: "Ghost Town", icon: "🏚️", desc: "An empty historical settlement." },
            { name: "Clockwork Tower", icon: "🕰️", desc: "A giant machine of gears." },
            { name: "Forgotten Museum", icon: "🖼️", desc: "Artifacts come alive at night." },

          ],

            { name: "Solve the Mystery", icon: "🧩", desc: "Find out who is haunting town." },

            { name: "Restore the Timeline", icon: "🕰️", desc: "Fix history before it's gone." },
            { name: "Cure the Curse", icon: "💊", desc: "Heal the townsfolk's ailments." },
            { name: "Find Hidden Treasure", icon: "💰", desc: "Follow the clues to the gold." },
            { name: "Defend the Castle", icon: "🛡️", desc: "Hold off the monster invasion." },
            { name: "Expose the Monster", icon: "🔦", desc: "Pull off the villain's mask!" }
          ],
          dilemmas: [
            { name: "Running Out of Time", icon: "⏰", desc: "The clock is ticking down fast." },
            { name: "Hopelessly Lost", icon: "🧭", desc: "You have no idea where you are." },
            { name: "Ignored Warning", icon: "⚠️", desc: "You shouldn't have opened that door." },
            { name: "Lost Magic Tool", icon: "🚫", desc: "Your primary weapon is gone." },
            { name: "Betrayed by Friend", icon: "🐍", desc: "Someone wasn't who they seemed." },
            { name: "Trapped in Room", icon: "🚪", desc: "The walls are closing in." },
            { name: "Sudden Storm", icon: "🌩️", desc: "Extreme weather strikes." },
            { name: "Weakness Revealed", icon: "👁️", desc: "The villain knows how to beat you." },
            { name: "Missing Pieces", icon: "🧩", desc: "You don't have all the clues." },
            { name: "Accused of Crime", icon: "⚖️", desc: "The town thinks YOU did it!" }
          ],
          readingLevels: [
            { name: "Early Primary", icon: "🧸", desc: "Grades 1-2 reading level." },
            { name: "Primary", icon: "🎒", desc: "Grade 3-4 reading level." },
            { name: "Junior", icon: "📚", desc: "Grade 5-6 reading level." },
            { name: "Intermediate", icon: "🎓", desc: "Grade 7-8 reading level." }
          ]
        };

        // --- UTILITIES ---
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Global Synth variables
        let synthCtx = null;
        let melodyInterval = null;

        // Interactive SVG Bat component that toggles wings natively in React state for reliable fluttering
        function RetroBat({ style }) {
          const [wingFrame, setWingFrame] = useState(0);

          useEffect(() => {
            const frameTimer = setInterval(() => {
              setWingFrame(f => (f === 0 ? 1 : 0));
            }, 100);
            return () => clearInterval(frameTimer);
          }, []);

          return (
            <div className="critter" style={style}>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 16" className="w-24 h-12">
                {/* Bat Body */}
                <rect x="14" y="5" width="4" height="6" fill="#151515" />
                <rect x="15" y="3" width="2" height="2" fill="#151515" />
                {/* Red Eyes */}
                <rect x="15" y="6" width="1" height="1" fill="#ff2222" />
                <rect x="17" y="6" width="1" height="1" fill="#ff2222" />
                
                {wingFrame === 0 ? (
                  /* Wings Down Frame */
                  <g>
                    {/* Left Wing */}
                    <rect x="10" y="5" width="4" height="3" fill="#3a3a3a" />
                    <rect x="6" y="6" width="4" height="4" fill="#3a3a3a" />
                    <rect x="2" y="8" width="4" height="4" fill="#2d2d2d" />
                    <rect x="0" y="10" width="2" height="3" fill="#2d2d2d" />
                    {/* Right Wing */}
                    <rect x="18" y="5" width="4" height="3" fill="#3a3a3a" />
                    <rect x="22" y="6" width="4" height="4" fill="#3a3a3a" />
                    <rect x="26" y="8" width="4" height="4" fill="#2d2d2d" />
                    <rect x="30" y="10" width="2" height="3" fill="#2d2d2d" />
                  </g>
                ) : (
                  /* Wings Up Frame */
                  <g>
                    {/* Left Wing */}
                    <rect x="10" y="4" width="4" height="3" fill="#3a3a3a" />
                    <rect x="6" y="2" width="4" height="4" fill="#3a3a3a" />
                    <rect x="2" y="0" width="4" height="4" fill="#2d2d2d" />
                    <rect x="0" y="0" width="2" height="2" fill="#2d2d2d" />
                    {/* Right Wing */}
                    <rect x="18" y="4" width="4" height="3" fill="#3a3a3a" />
                    <rect x="22" y="2" width="4" height="4" fill="#3a3a3a" />
                    <rect x="26" y="0" width="4" height="4" fill="#2d2d2d" />
                    <rect x="30" y="0" width="2" height="2" fill="#2d2d2d" />
                  </g>
                )}
              </svg>
            </div>
          );
        }

        // --- NEW ISOLATED IMAGE PANEL ---
        const ImagePanel = ({ prompt, turnCount }) => {
          const [loaded, setLoaded] = useState(false);
          const [hasError, setHasError] = useState(false);
          const imgRef = useRef(null);
          
          useEffect(() => {
            // Race-condition check: if the image loaded from cache instantly before layout effects
            if (imgRef.current && imgRef.current.complete) {
              setLoaded(true);
            } else {
              setLoaded(false);
            }
            setHasError(false);
          }, [prompt, turnCount]);

          if (!prompt) return <div className="w-full h-full bg-black"></div>;

          return (
            <div className="w-full h-full relative overflow-hidden bg-black">
              {!loaded && !hasError && (
                <div className="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-10">
                  <span className="text-4xl animate-bounce mb-4">🦇</span>
                  <span className="font-pixel text-[10px] md:text-xs text-purple-400 animate-pulse text-center px-4 leading-relaxed">
                    Painting Scene...
                  </span>
                </div>
              )}
              {hasError ? (
                <div className="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-10">
                  <span className="text-4xl mb-4 opacity-50">🖼️</span>
                  <span className="font-pixel text-[10px] text-gray-500 text-center px-4">
                    The magical painting faded.
                  </span>
                </div>
              ) : (
                <img 
                  ref={imgRef}
                  key={`${prompt}-${turnCount}`}
                  src={`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + " 8-bit pixel art style retro video game screenshot castlevania spooky")}?width=800&height=800&nologo=true&seed=${turnCount}`}
                  alt="Scene"
                  className={`w-full h-full object-cover transition-opacity duration-1000 ${loaded ? 'opacity-100' : 'opacity-0'}`}
                  onLoad={() => setLoaded(true)}
                  onError={() => { 
                    setLoaded(true); 
                    setHasError(true);
                  }}
                  style={{ imageRendering: 'pixelated' }}
                />
              )}
            </div>
          );
        };

        // --- INTERACTIVE TEXT HIGHLIGHTER ---
        const HighlightableText = ({ text, textSize }) => {
          const [highlights, setHighlights] = useState([]);

          useEffect(() => {
            setHighlights([]);
          }, [text]); // Clear highlights on new page

          const handleSelection = () => {
            const selection = window.getSelection();
            if (!selection || selection.isCollapsed) return;
            
            const selectedText = selection.toString().trim();
            if (selectedText.length > 1 && !highlights.includes(selectedText)) {
              setHighlights(prev => [...prev, selectedText]);
            }
          };

          const removeHighlight = (phraseToRemove) => {
            setHighlights(prev => prev.filter(h => h !== phraseToRemove));
          };

          const renderText = () => {
            if (highlights.length === 0) return text;
            
            // Sort by length descending to prevent partial match bugs on overlapping phrases
            const escapedHighlights = highlights
              .slice()
              .sort((a, b) => b.length - a.length)
              .map(h => h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
              
            const regex = new RegExp(`(${escapedHighlights.join('|')})`, 'gi');
            const parts = text.split(regex);

            return parts.map((part, i) => {
              const lowerPart = part.toLowerCase();
              const matchedHighlight = highlights.find(h => h.toLowerCase() === lowerPart);
              
              if (matchedHighlight) {
                return (
                  <mark 
                    key={i} 
                    className="bg-yellow-400 text-black px-1 rounded cursor-pointer transition-colors hover:bg-red-400" 
                    title="Click to remove highlight"
                    onClick={() => removeHighlight(matchedHighlight)}
                  >
                    {part}
                  </mark>
                );
              }
              return <span key={i}>{part}</span>;
            });
          };

          return (
            <div className="relative w-full">
              {highlights.length > 0 && (
                <div className="flex justify-end mb-2">
                  <button 
                    onClick={() => setHighlights([])} 
                    className="nes-btn !bg-gray-800 !text-gray-300 hover:!bg-red-900 !px-2 !py-1 !text-[8px]"
                  >
                    Clear Highlights
                  </button>
                </div>
              )}
              <p 
                className="font-terminal text-gray-200 leading-relaxed whitespace-pre-wrap mb-4" 
                style={{ fontSize: `${textSize}px` }}
                onMouseUp={handleSelection}
                onTouchEnd={handleSelection}
              >
                {renderText()}
              </p>
              <p className="font-pixel text-[8px] text-gray-500 mt-2 text-right opacity-70">
                Tip: Highlight text with your mouse or finger to mark keywords!
              </p>
            </div>
          );
        };

        // --- MAIN COMPONENT ---
        function Adventurevania() {
          // --- ALL STATE DECLARATIONS AT TOP ---
          const [gameState, setGameState] = useState('menu'); 
          const [setupData, setSetupData] = useState({ character: 0, villain: 0, setting: 0, plot: 0, dilemma: 0, readingLevel: 1 });
          const [setupStep, setSetupStep] = useState(0); 
          const [setupFocusIndex, setSetupFocusIndex] = useState(0); 
          const [storyHistory, setStoryHistory] = useState([]);
          const [currentNode, setCurrentNode] = useState(null);
          const [currentPageIndex, setCurrentPageIndex] = useState(0);
          const [turnCount, setTurnCount] = useState(0);
          const [sessionInitialNode, setSessionInitialNode] = useState(null); 
          const [sessionSeed, setSessionSeed] = useState("");
          const [playerName, setPlayerName] = useState(localStorage.getItem('adventurevania_player') || "");
          
          const [sessionStartTime, setSessionStartTime] = useState(null);
          const [correctAnswers, setCorrectAnswers] = useState(0);
          const [totalQuestions, setTotalQuestions] = useState(0);

          const [menuImgIndex, setMenuImgIndex] = useState(0);
          const [showLightning, setShowLightning] = useState(false);
          const [musicVolume, setMusicVolume] = useState(0.3);
          const [isMuted, setIsMuted] = useState(true); 
          const [currentTrack, setCurrentTrack] = useState(0);
          const [focusedChoice, setFocusedChoice] = useState(0);
          const [critters, setCritters] = useState([]); 
          const [textSize, setTextSize] = useState(18); 
          const [isSpeaking, setIsSpeaking] = useState(false);

          const [loadingMsg, setLoadingMsg] = useState("");
          const [errorMsg, setErrorMsg] = useState("");

          const endOfStoryRef = useRef(null);

          // Cleanup TTS on unmount
          useEffect(() => {
            return () => {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            }
          }, []);

          // Scroll to bottom
          useEffect(() => {
            if ((gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && endOfStoryRef.current) {
              endOfStoryRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [currentNode, currentPageIndex, gameState]);

          // Rotating Menu Backgrounds
          useEffect(() => {
            if(gameState !== 'menu') return;
            const imgInterval = setInterval(() => {
              setMenuImgIndex(prev => (prev + 1) % MENU_IMAGES.length);
            }, 3000);
            return () => clearInterval(imgInterval);
          }, [gameState]);

          // Critter Spawner (Bats & Spiders)
          useEffect(() => {
            let timeoutId;
            const spawnCritter = () => {
              const id = Date.now();
              const isBat = Math.random() > 0.5;
              const direction = Math.random() > 0.5 ? 'Right' : 'Left';
              
              // Spiders stay lower, Bats stay higher
              const top = isBat ? Math.floor(Math.random() * 30) + 5 : Math.floor(Math.random() * 20) + 60; 
              
              const animation = isBat ? `batFly${direction} 8s ease-in-out forwards` : `spiderCrawl${direction} 12s linear forwards`;
              
              const critterObj = {
                id,
                isBat,
                style: {
                  top: `${top}vh`,
                  animation: animation,
                }
              };

              setCritters(prev => [...prev, critterObj]);

              setTimeout(() => {
                setCritters(prev => prev.filter(c => c.id !== id));
              }, 12500);

              timeoutId = setTimeout(spawnCritter, Math.random() * 15000 + 30000);
            };

            timeoutId = setTimeout(spawnCritter, Math.random() * 5000 + 5000);
            return () => clearTimeout(timeoutId);
          }, []);

          // --- 8-BIT SYNTH MUSIC CHIP ---
          const playSynthNote = (freq, type, duration, volMod) => {
            if (!synthCtx || isMuted || !freq) return;
            try {
              if (synthCtx.state === 'suspended') synthCtx.resume();
              
              const osc = synthCtx.createOscillator();
              const gainNode = synthCtx.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, synthCtx.currentTime);
              
              gainNode.gain.setValueAtTime(0, synthCtx.currentTime);
              gainNode.gain.linearRampToValueAtTime(musicVolume * volMod, synthCtx.currentTime + 0.01);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, synthCtx.currentTime + duration - 0.01);
              
              osc.connect(gainNode);
              gainNode.connect(synthCtx.destination);
              osc.start();
              osc.stop(synthCtx.currentTime + duration);
            } catch (e) {
              console.warn("Synth error:", e);
            }
          };

          const startSynthEngine = () => {
            if (melodyInterval) clearInterval(melodyInterval);
            if (!synthCtx) {
              synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const track = SYNTH_TRACKS[currentTrack];
            const stepDuration = 60 / track.tempo / 2; // eighth notes
            let step = 0;

            melodyInterval = setInterval(() => {
              if (isMuted) return;

              // Play Bassline
              if (step % 4 === 0) {
                const bassNote = track.bass[Math.floor(step / 4) % track.bass.length];
                if (NOTE_FREQ[bassNote]) {
                  playSynthNote(NOTE_FREQ[bassNote], "triangle", stepDuration * 3.8, 0.7);
                }
              }

              // Play Melody Sequence
              let melodySum = 0;
              let currentMelodyNote = null;
              for (let i = 0; i < track.melody.length; i++) {
                const item = track.melody[i];
                if (step % 16 === melodySum) {
                  currentMelodyNote = item;
                  break;
                }
                melodySum += item.dur;
              }

              if (currentMelodyNote && NOTE_FREQ[currentMelodyNote.note]) {
                playSynthNote(NOTE_FREQ[currentMelodyNote.note], "square", stepDuration * currentMelodyNote.dur * 0.9, 0.3);
              }

              step = (step + 1) % 16;
            }, stepDuration * 1000);
          };

          const playThunderSynth = () => {
            if (!synthCtx || isMuted) return;
            try {
              const bufferSize = synthCtx.sampleRate * 1.5;
              const buffer = synthCtx.createBuffer(1, bufferSize, synthCtx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
              }
              const noiseNode = synthCtx.createBufferSource();
              noiseNode.buffer = buffer;
              
              const filterNode = synthCtx.createBiquadFilter();
              filterNode.type = 'lowpass';
              filterNode.frequency.setValueAtTime(600, synthCtx.currentTime);
              filterNode.frequency.exponentialRampToValueAtTime(30, synthCtx.currentTime + 1.2);
              
              const gainNode = synthCtx.createGain();
              gainNode.gain.setValueAtTime(musicVolume * 1.2, synthCtx.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, synthCtx.currentTime + 1.4);
              
              noiseNode.connect(filterNode);
              filterNode.connect(gainNode);
              gainNode.connect(synthCtx.destination);
              noiseNode.start();
            } catch(e) {
              console.warn(e);
            }
          };

          // Synthesized Ghostly Howl
          const playGhostHowl = () => {
            if (!synthCtx || isMuted) return;
            try {
              const osc = synthCtx.createOscillator();
              const gain = synthCtx.createGain();
              osc.type = 'sine';

              const now = synthCtx.currentTime;
              
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(450, now + 1.5);
              
              const lfo = synthCtx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.setValueAtTime(5, now);
              const lfoGain = synthCtx.createGain();
              lfoGain.gain.setValueAtTime(10, now);
              lfo.connect(lfoGain);
              lfoGain.connect(osc.frequency);
              lfo.start(now + 1.0);
              lfo.stop(now + 4.0);
              
              osc.frequency.exponentialRampToValueAtTime(280, now + 3.5);

              gain.gain.setValueAtTime(0.0001, now);
              gain.gain.exponentialRampToValueAtTime(musicVolume * 0.8, now + 1.5);
              gain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);

              osc.connect(gain);
              gain.connect(synthCtx.destination);
              osc.start(now);
              osc.stop(now + 4.0);
            } catch(e) { 
              console.warn(e); 
            }
          };

          // Professional Synthesized Realistic Wolf Howl
          const playRealisticWolfHowl = () => {
            if (!synthCtx || isMuted) return;
            try {
              if (synthCtx.state === 'suspended') synthCtx.resume();
              
              const now = synthCtx.currentTime;
              
              const voiceOsc = synthCtx.createOscillator();
              const subOsc = synthCtx.createOscillator();
              const finalGain = synthCtx.createGain();
              
              voiceOsc.type = 'triangle';
              subOsc.type = 'sine';

              // Majestic soaring pitch envelope of a wild wolf howling at the moon
              voiceOsc.frequency.setValueAtTime(160, now);
              voiceOsc.frequency.exponentialRampToValueAtTime(390, now + 0.8);
              voiceOsc.frequency.exponentialRampToValueAtTime(440, now + 2.0);
              voiceOsc.frequency.exponentialRampToValueAtTime(280, now + 4.5);
              voiceOsc.frequency.exponentialRampToValueAtTime(110, now + 5.5);

              subOsc.frequency.setValueAtTime(80, now);
              subOsc.frequency.exponentialRampToValueAtTime(195, now + 0.8);
              subOsc.frequency.exponentialRampToValueAtTime(220, now + 2.0);
              subOsc.frequency.exponentialRampToValueAtTime(140, now + 4.5);
              subOsc.frequency.exponentialRampToValueAtTime(55, now + 5.5);

              const vibratoLFO = synthCtx.createOscillator();
              const vibratoGain = synthCtx.createGain();
              vibratoLFO.type = 'sine';
              vibratoLFO.frequency.setValueAtTime(5.8, now); 
              vibratoGain.gain.setValueAtTime(12, now); 
              vibratoLFO.connect(vibratoGain);
              vibratoGain.connect(voiceOsc.frequency);
              vibratoGain.connect(subOsc.frequency);

              const filter = synthCtx.createBiquadFilter();
              filter.type = 'bandpass';
              filter.Q.setValueAtTime(3.5, now);
              filter.frequency.setValueAtTime(400, now);
              filter.frequency.exponentialRampToValueAtTime(800, now + 1.2);
              filter.frequency.exponentialRampToValueAtTime(350, now + 4.5);

              finalGain.gain.setValueAtTime(0.0001, now);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.9, now + 1.0);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.7, now + 3.0);
              finalGain.gain.exponentialRampToValueAtTime(0.0001, now + 5.5);

              voiceOsc.connect(filter);
              subOsc.connect(filter);
              filter.connect(finalGain);
              finalGain.connect(synthCtx.destination);

              vibratoLFO.start(now);
              voiceOsc.start(now);
              subOsc.start(now);
              
              vibratoLFO.stop(now + 5.6);
              voiceOsc.stop(now + 5.6);
              subOsc.stop(now + 5.6);
            } catch(e) {
              console.warn("Synth Wolf Howl failed:", e);
            }
          };

          useEffect(() => {
            if (!isMuted) {
              startSynthEngine();
            } else {
              if (melodyInterval) {
                clearInterval(melodyInterval);
                melodyInterval = null;
              }
            }
            return () => {
              if (melodyInterval) clearInterval(melodyInterval);
            };
          }, [isMuted, currentTrack, musicVolume]);

          // Lightning Effect & Mixed Howls
          const triggerLightning = () => {
             setShowLightning(true);
             playThunderSynth();
             setTimeout(() => setShowLightning(false), 500);
             
             if (Math.random() > 0.5) {
               setTimeout(playRealisticWolfHowl, 1000);
             } else {
               setTimeout(playGhostHowl, 800);
             }
          };

          useEffect(() => {
            const lightningInterval = setInterval(() => {
              if (Math.random() > 0.6) triggerLightning();
            }, 8000);
            return () => clearInterval(lightningInterval);
          }, [isMuted, musicVolume]);

          // --- TTS FUNCTIONALITY ---
          const handleReadAloud = (text) => {
            if (!window.speechSynthesis) return;
            
            if (isSpeaking) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
              return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; 
            utterance.onend = () => setIsSpeaking(false);
            utterance.onerror = () => setIsSpeaking(false);
            
            setIsSpeaking(true);
            window.speechSynthesis.speak(utterance);
          };

          // Keyboard Navigation controls
          useEffect(() => {
            const handleKeyDown = (e) => {
              if(document.activeElement.tagName === "INPUT") return;

              if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                e.preventDefault();
              }

              if (gameState === 'setup') {
                 const setupKeysList = ['characters', 'villains', 'settings', 'plots', 'dilemmas', 'readingLevels'];
                 const stateKeysList = ['character', 'villain', 'setting', 'plot', 'dilemma', 'readingLevel'];
                 
                 const currentDataKey = setupKeysList[setupStep];
                 const numOptions = CATEGORIES[currentDataKey].length;

                 if (e.key === 'ArrowRight') {
                   setSetupFocusIndex(prev => Math.min(prev + 1, numOptions - 1));
                 } else if (e.key === 'ArrowLeft') {
                   setSetupFocusIndex(prev => Math.max(prev - 1, 0));
                 } else if (e.key === 'ArrowDown') {
                   setSetupFocusIndex(prev => Math.min(prev + 5, numOptions - 1));
                 } else if (e.key === 'ArrowUp') {
                   setSetupFocusIndex(prev => Math.max(prev - 5, 0));
                 } else if (e.key === 'Enter') {
                   const currentKey = stateKeysList[setupStep];
                   setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                   setSetupFocusIndex(0); 
                   if (setupStep < 5) {
                     setSetupStep(prev => prev + 1);
                   } else {
                     startGame();
                   }
                 }
              } else if (gameState === 'story' && !errorMsg) {
                 const isAtLastPage = currentPageIndex === (currentNode?.pages?.length || 0) - 1;
                 
                 if (e.key === 'ArrowLeft' && currentPageIndex > 0) {
                     setCurrentPageIndex(p => p - 1);
                     if (window.speechSynthesis) window.speechSynthesis.cancel();
                     setIsSpeaking(false);
                 } else if (!isAtLastPage && (e.key === 'Enter' || e.key === 'ArrowRight')) {
                   setCurrentPageIndex(p => p + 1);
                   if (window.speechSynthesis) window.speechSynthesis.cancel();
                   setIsSpeaking(false);
                 } else if (isAtLastPage && currentNode?.choices?.length > 0) {
                   if (e.key === 'ArrowDown') {
                     setFocusedChoice(prev => Math.min(prev + 1, currentNode.choices.length - 1));
                   } else if (e.key === 'ArrowUp') {
                     setFocusedChoice(prev => Math.max(prev - 1, 0));
                   } else if (e.key === 'Enter') {
                     handleChoice(currentNode.choices[focusedChoice]);
                   }
                 }
              } else if (gameState === 'menu') {
                 if (e.key === 'Enter') {
                    setSetupStep(0); 
                    setSetupFocusIndex(0);
                    setGameState('setup');
                 }
              } else if (gameState === 'gameover' || gameState === 'victory') {
                 if (e.key === 'Enter') setGameState('menu');
              }
            };

            window.addEventListener('keydown', handleKeyDown, { passive: false });
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [gameState, setupStep, setupData, setupFocusIndex, currentNode, currentPageIndex, focusedChoice, errorMsg, isMuted]);

          // --- ANALYTICS FUNCTION ---
          const recordEngagement = async (outcome) => {
            if (!SPREADSHEET_WEB_APP_URL) return; 
            
            const timeSpentSecs = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
            const compScore = totalQuestions > 0 ? (correctAnswers / totalQuestions * 100).toFixed(2) : 0;

            const trackingData = {
              timestamp: new Date().toISOString(),
              playerName: playerName || "Anonymous Player",
              character: CATEGORIES.characters[setupData.character].name,
              villain: CATEGORIES.villains[setupData.villain].name,
              outcome: outcome,
              turnsSurvived: turnCount,
              totalQuestionsAttempted: totalQuestions,
              correctAnswers: correctAnswers,
              comprehensionScore: compScore + "%",
              timeSpentSeconds: timeSpentSecs
            };

            try {
              await fetch(SPREADSHEET_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(trackingData)
              });
            } catch (err) { console.error("Error sending analytics:", err); }
          };

          // --- DYNAMIC API ENGINE ---
          const generateStoryNode = async (actionText = null) => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            setIsSpeaking(false);

            setGameState('loading');
            setFocusedChoice(0); 
            setCurrentPageIndex(0);
            setLoadingMsg("Summoning AI Game Master...");
            setErrorMsg("");
            
            const char = CATEGORIES.characters[setupData.character];
            const vill = CATEGORIES.villains[setupData.villain];
            const sett = CATEGORIES.settings[setupData.setting];
            const plot = CATEGORIES.plots[setupData.plot];
            const dil = CATEGORIES.dilemmas[setupData.dilemma];

            const wordCounts = [
              "between 40 and 50 words per page",
              "between 75 and 100 words per page",
              "between 100 and 120 words per page",
              "between 130 and 150 words per page"
            ];

            const levelInstructions = [
              `Difficulty: Grades 1-2 (Early Primary). CRITICAL: Use extremely simple, highly decodable words (e.g., big, run, dark, sad). Sentences must be very short and phonetic. Length: ${wordCounts[0]}. Reading Comprehension: Ask a direct recall question about a clear fact from the final page.`,
              `Difficulty: Grades 3-4 (Primary). CRITICAL: Use standard 3rd-grade sentences and intermediate vocabulary. Length: ${wordCounts[1]}. Reading Comprehension: Ask a question connecting two details or basic character motivations from the text.`,
              `Difficulty: Grades 5-6 (Junior). CRITICAL: Use descriptive language and varied sentence structures. Length: ${wordCounts[2]}. Reading Comprehension: Ask an inferential question where the answer is implied but not explicit.`,
              `Difficulty: Grades 7-8 (Intermediate). CRITICAL: Use extensive, atmospheric narrative with advanced, sophisticated vocabulary. Length: ${wordCounts[3]}. Reading Comprehension: Ask a complex analytical question about themes or subtle clues.`
            ];

            let historyContext = "";
            if (storyHistory.length > 0) {
              historyContext = storyHistory.map((h, i) => `Turn ${i + 1}: Player faced plot puzzle "${h.node.question}". Player chose "${h.chosenAction}".`).join('\n');
            }

            let promptText = `
              Current Game State:
              - Player Character: ${char.name} (${char.desc})
              - Villain: ${vill.name} (${vill.desc})
              - Setting: ${sett.name} (${sett.desc})
              - Main Plot: ${plot.name}
              - Central Dilemma: ${dil.name}
              - Turn Count: ${turnCount} out of 10.
              - Reading Level constraints: ${levelInstructions[setupData.readingLevel]}
              - Randomizer Seed: ${sessionSeed}_${turnCount} (Ensure deterministic but unique generation per turn)
            `;

            if (turnCount === 0) {
              promptText += "\nThis is the BEGINNING of the story. Introduce the character, the setting, the villain's plot, and the central dilemma. Set the spooky but kid-friendly tone.";
            } else {
              promptText += `\nPast History:\n${historyContext}\n\nDO NOT repeat any previous challenges, concepts, or questions. Create an entirely new obstacle.\nThe player previously chose this action: "${actionText}". Continue the story based on this choice.`;
            }

            if (turnCount >= 10) {
              promptText += "\nThis is the FINAL TURN. Provide a satisfying, victorious conclusion where the character defeats the villain and resolves the plot. Set isVictory to true. Do not provide further choices.";
            } else {
              promptText += `
              \nREQUIREMENTS FOR THIS TURN:
              1. Write a continuous story segment that progresses the plot forward.
              2. Divide this continuous narrative into an array of EXACTLY 4 distinct 'pages' (strings). CRITICAL: Each page MUST contain different text. Do NOT repeat paragraphs. Page 1 should setup the situation. Page 2 should escalate the tension. Page 3 should introduce a specific obstacle. Page 4 should present the puzzle.
              3. EACH individual page MUST be exactly ${wordCounts[setupData.readingLevel]}. Use pacing and descriptions to strictly reach this count.
              4. Create a reading comprehension question based STRICTLY on the story you just wrote on the FINAL page. The question's difficulty must match the Reading Level constraint. DO NOT ask external math or science questions; it must be about the text.
              5. State the question or puzzle clearly in the "question" field.
              6. Provide 2 or 3 "choices" representing answers to the reading comprehension question.
                 - At least one choice MUST be the correct reading comprehension answer (set 'isCorrect' to true).
                 - At least one choice MUST be an incorrect answer (set 'isCorrect' to false). If the incorrect choice ends the game, set 'isGameOver' to true and write a funny 'gameOverMessage'. 
              7. Provide an "imagePrompt" field containing a short visual description of the scene to generate an 8-bit image.
              `;
            }

            const systemInstruction = `You are a verbose, highly descriptive fantasy author writing a CYOA game. You must strictly output a valid, raw JSON object. Do not use markdown tags like \`\`\`json. Ensure all quotes are escaped. Tone: Spooky, funny, 80s retro, educational. ALWAYS check your word counts and strictly adhere to reading level complexity.`;

            // POST WORKAROUND: Safely transmits complex prompt data in JSON payload to bypass school-level WAF/firewall GET request query blockages.
            try {
              const response = await fetch(POLLINATIONS_TEXT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  messages: [
                    { role: "system", content: "You must only respond with raw, valid JSON. Do not wrap your response in markdown code blocks like \`\`\`json." },
                    { role: "user", content: `System instructions: ${systemInstruction}\n\nUser request: ${promptText}` }
                  ],
                  jsonMode: true
                })
              });

              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }

              let jsonText = await response.text();
              
              // Clean markdown if it leaked
              jsonText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
              
              const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
              if (jsonMatch) {
                jsonText = jsonMatch[0];
              } else {
                throw new Error("Invalid JSON structure returned by pollination services.");
              }
              
              const nodeData = JSON.parse(jsonText);
              
              if (!nodeData.pages && nodeData.storyText) {
                 nodeData.pages = [nodeData.storyText];
              }
              
              setCurrentNode(nodeData);
              if (turnCount === 0) setSessionInitialNode(nodeData); 
              setCurrentPageIndex(0); 
              setGameState('story');
            } catch (err) {
              console.warn("Pollination Engine Error:", err.message);
              setErrorMsg(`The magical connection was lost: ${err.message}. Please click 'Try Again' to reconnect.`);
              setGameState('story');
            }
          };

          const handleChoice = (choice) => {
            if (currentNode.question) {
              setTotalQuestions(prev => prev + 1);
              if (choice.isCorrect) setCorrectAnswers(prev => prev + 1);
            }

            setStoryHistory([...storyHistory, { node: currentNode, chosenAction: choice.text }]);
            setTurnCount(turnCount + 1);

            if (choice.isGameOver) {
              setCurrentNode({
                ...currentNode,
                pages: [currentNode.pages[currentNode.pages.length - 1] + "\n\n" + (choice.gameOverMessage || "You made a grave mistake!")],
                choices: []
              });
              setCurrentPageIndex(0);
              setGameState('gameover');
              recordEngagement('GameOver');
            } else {
              generateStoryNode(choice.text);
            }
          };

          const startGame = () => {
            setTurnCount(0);
            setStoryHistory([]);
            setSessionStartTime(Date.now());
            setCorrectAnswers(0);
            setTotalQuestions(0);
            setSessionSeed(Math.random().toString(36).substring(2, 10));
            generateStoryNode();
          };

          // --- RENDERERS ---

          const renderMenu = () => (
            <div className="flex flex-col items-center justify-center h-full text-center p-4 md:p-8 space-y-6 md:space-y-8 relative">
              
              <div className="w-full max-w-2xl h-48 sm:h-56 md:h-64 border-4 border-purple-800 music-border bg-black overflow-hidden relative mb-2">
                 <img 
                   src={MENU_IMAGES[menuImgIndex]} 
                   className="w-full h-full object-cover transition-opacity duration-1000 ease-in-out" 
                   style={{ imageRendering: 'pixelated' }}
                   alt="Retro Castlevania Background"
                 />
                 <div className="absolute inset-0 bg-black/40"></div>
                 <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2 w-full">
                    <h1 className="font-pixel text-lg sm:text-2xl md:text-3xl lg:text-4xl text-purple-500 tracking-wider drop-shadow-[0_0_15px_rgba(138,43,226,1)] w-full text-center break-words leading-tight">
                      ADVENTUREVANIA
                    </h1>
                    <p className="font-terminal text-green-400 text-lg sm:text-xl md:text-2xl mt-2 font-bold drop-shadow-[0_0_10px_rgba(74,222,128,1)]">A Reading Quest</p>
                 </div>
              </div>

              <div className="flex flex-col gap-4 md:gap-6 w-full max-w-md relative z-10">
                <button className="nes-btn animate-pulse text-xs sm:text-sm" onClick={() => { setSetupStep(0); setGameState('setup'); }}>
                  ▶️ Press Enter to Start
                </button>

                <div className="flex flex-col gap-2 w-full text-left mt-2">
                    <label className="font-pixel text-[8px] md:text-[10px] text-gray-400 text-center">Student Identification:</label>
                    <input 
                      type="text" 
                      placeholder="Enter Player Name..." 
                      value={playerName}
                      onChange={(e) => {
                        setPlayerName(e.target.value);
                        localStorage.setItem('adventurevania_player', e.target.value);
                      }}
                      className="w-full bg-black border-2 border-purple-900 text-purple-400 font-pixel text-[10px] text-center p-3 outline-none focus:border-purple-500"
                    />
                </div>

              </div>
            </div>
          );

          const renderSetup = () => {
            const steps = [
              { title: "Select Your Hero", key: "character", data: CATEGORIES.characters },
              { title: "Choose the Villain", key: "villain", data: CATEGORIES.villains },
              { title: "Pick a Setting", key: "setting", data: CATEGORIES.settings },
              { title: "Select the Plot", key: "plot", data: CATEGORIES.plots },
              { title: "Choose a Dilemma", key: "dilemma", data: CATEGORIES.dilemmas },
              { title: "Reading Difficulty", key: "readingLevel", data: CATEGORIES.readingLevels }
            ];
            const current = steps[setupStep];

            return (
              <div className="flex flex-col h-full p-4 md:p-8">
                <div className="flex justify-between items-center mb-6 border-b-4 border-purple-900 pb-4 shrink-0">
                  <h2 className="font-pixel text-xl md:text-2xl text-green-400">{current.title}</h2>
                  <span className="font-pixel text-xs text-gray-500">Step {setupStep + 1}/6</span>
                </div>

                <div className="flex-grow grid grid-cols-2 md:grid-cols-5 gap-4 overflow-y-auto pb-24 pr-2">
                  {current.data.map((item, idx) => {
                    const isSelected = setupData[current.key] === idx;
                    const isFocused = setupFocusIndex === idx;
                    return (
                      <div 
                        key={idx}
                        onClick={() => {
                          setSetupFocusIndex(idx);
                          setSetupData({...setupData, [current.key]: idx});
                        }}
                        className={`pixel-border p-4 cursor-pointer flex flex-col items-center text-center transition-all ${isFocused ? 'bg-purple-900 border-green-400 scale-105 shadow-[0_0_25px_rgba(74,222,128,0.7)]' : isSelected ? 'bg-purple-950 border-purple-500' : 'bg-black hover:bg-gray-800'}`}
                        style={isFocused ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.2), 0 0 0 4px #4ade80, 0 0 0 8px #000' } : isSelected ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.2), 0 0 0 4px #8E2DE2, 0 0 0 8px #000' } : {}}
                      >
                        <div className="text-4xl mb-2">{item.icon}</div>
                        <h3 className="font-pixel text-[10px] md:text-xs text-white mb-2 leading-tight h-8 flex items-center justify-center">{item.name}</h3>
                        <p className="font-terminal text-gray-400 text-sm md:text-lg leading-tight hidden md:block">{item.desc}</p>
                      </div>
                    );
                  })}
                </div>

                <div className="flex justify-between mt-6 pt-4 items-center shrink-0">
                  <div className="font-pixel text-[8px] text-gray-500 hidden md:block">Use Arrow Keys & Enter</div>
                  <div className="flex gap-4">
                    {setupStep > 0 ? <button className="nes-btn" onClick={() => setSetupStep(setupStep - 1)}>Back</button> : <div></div>}
                    {setupStep < 5 ? 
                      <button className="nes-btn green" onClick={() => {
                        const currentKey = Object.keys(setupData)[setupStep];
                        setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                        setSetupFocusIndex(0);
                        setSetupStep(setupStep + 1);
                      }}>Next</button> : 
                      <button className="nes-btn green animate-pulse" onClick={startGame}>Start Quest</button>
                    }
                  </div>
                </div>
              </div>
            );
          };

          const renderStoryNode = (node, isHistory = false, chosenAction = null) => {
            if (!node || !node.pages) return null;
            
            const isAtLastPage = currentPageIndex === node.pages.length - 1;
            const textToDisplay = isHistory ? node.pages.join('\n\n') : node.pages[currentPageIndex];
            const showChallenge = isHistory || isAtLastPage;

            return (
              <div className={`mb-12 ${isHistory ? 'opacity-60' : 'animate-[fadeIn_0.5s_ease-in]'}`}>
                <div className="pixel-border bg-black p-4 md:p-6 relative">
                  
                  {/* Decorative Corners */}
                  <div className="absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-purple-600"></div>
                  <div className="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-purple-600"></div>
                  <div className="absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-purple-600"></div>
                  <div className="absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-purple-600"></div>

                  <div className="w-full">
                     <HighlightableText text={textToDisplay} textSize={textSize} />
                  </div>

                  <div className="mt-4 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                    {showChallenge && node.question && (
                      <div className="p-3 bg-purple-900 border-l-4 border-green-400 break-inside-avoid w-full">
                        <p className="font-pixel text-[11px] text-green-300 leading-loose">
                          <span className="text-yellow-400">CHALLENGE:</span> {node.question}
                        </p>
                      </div>
                    )}
                    
                    {/* TTS Read Aloud Button */}
                    {!isHistory && (
                      <button 
                        onClick={() => handleReadAloud(textToDisplay + (showChallenge && node.question ? ". The challenge is: " + node.question : ""))} 
                        className="nes-btn shrink-0"
                      >
                        {isSpeaking ? '⏹️ Stop Reading' : '🗣️ Read Aloud'}
                      </button>
                    )}
                  </div>
                </div>

                {isHistory && chosenAction && (
                  <div className="flex items-center justify-end mt-4 text-green-500 font-pixel text-xs">
                    <span className="bg-gray-900 px-4 py-2 pixel-border">You chose: {chosenAction}</span>
                  </div>
                )}
              </div>
            );
          };

          const renderGameArea = () => {
            // Elegant fallback error screen
            if (!currentNode) {
              return (
                <div className="flex flex-col items-center justify-center h-full text-center p-8 space-y-6">
                  <div className="text-6xl animate-bounce">⚠️</div>
                  <h2 className="font-pixel text-lg text-red-500 leading-relaxed">Connection Interrupted</h2>
                  <p className="font-terminal text-xl text-gray-300 max-w-md leading-relaxed">
                    {errorMsg || "The Game Master could not compile your chapter request."}
                  </p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button className="nes-btn green" onClick={() => generateStoryNode(storyHistory.length > 0 ? storyHistory[storyHistory.length-1].chosenAction : null)}>
                      🔄 Try Again
                    </button>
                    <button className="nes-btn" onClick={() => setGameState('menu')}>
                      ↩️ Back to Menu
                    </button>
                  </div>
                </div>
              );
            }
            
            const isAtLastPage = currentPageIndex === (currentNode?.pages?.length || 0) - 1;

            return (
              <div className="flex flex-col md:flex-row h-full w-full bg-[#050505] relative overflow-hidden">
                
                {/* LEFT PANE - Text & Controls */}
                <div className="flex-1 flex flex-col relative h-full overflow-hidden order-2 md:order-1">
                  <div className="flex justify-between items-center bg-gray-900 p-2 md:p-4 pixel-border mb-0 shrink-0 z-10">
                    <div className="font-pixel text-[10px] md:text-sm text-purple-400 flex items-center gap-2">
                       🗺️ Turn: {turnCount}/10
                    </div>
                    <div className="flex items-center gap-2 md:gap-4">
                      {/* Responsive Text Size Slider */}
                      <div className="flex items-center gap-1 md:gap-2 bg-black px-1 md:px-2 py-1 music-border mr-1 md:mr-2">
                        <span className="font-pixel text-[8px] text-gray-400">A</span>
                        <input 
                          type="range" min="14" max="24" 
                          value={textSize} 
                          onChange={(e) => setTextSize(parseInt(e.target.value))} 
                          className="w-16 md:w-20 cursor-pointer"
                        />
                        <span className="font-pixel text-[12px] text-gray-400">A</span>
                      </div>

                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => {
                        if(window.confirm("Are you sure you want to restart this adventure from the beginning?")) {
                          setTurnCount(0);
                          setStoryHistory([]);
                          setCurrentPageIndex(0);
                          setCorrectAnswers(0);
                          setTotalQuestions(0);
                          setGameState('story');
                          generateStoryNode();
                        }
                      }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">⏮️</span> <span className="hidden md:inline">Restart</span>
                      </button>

                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => {if(confirm("Quit to menu?")) setGameState('menu')}}>
                        <span className="text-xl md:text-2xl drop-shadow-md">🔄</span> <span className="hidden md:inline">Quit</span>
                      </button>
                    </div>
                  </div>

                  <div className="flex-grow overflow-y-auto px-4 md:px-8 pb-48 pt-4">
                    {storyHistory.map((hist, idx) => (
                      <React.Fragment key={idx}>
                        {renderStoryNode(hist.node, true, hist.chosenAction)}
                      </React.Fragment>
                    ))}
                    
                    {renderStoryNode(currentNode, false)}

                    {errorMsg && (
                      <div className="bg-red-900 border-2 border-red-500 p-4 my-4 font-terminal text-xl text-white text-center flex flex-col gap-4">
                        <div>
                          {errorMsg}
                        </div>
                        <button className="nes-btn mt-2 mx-auto" onClick={() => generateStoryNode(storyHistory.length > 0 ? storyHistory[storyHistory.length-1].chosenAction : null)}>Try Again</button>
                      </div>
                    )}

                    <div ref={endOfStoryRef} />
                  </div>

                  {/* Active Page Control / Choices Area */}
                  {(gameState === 'story') && !errorMsg && currentNode?.pages && (
                    <div className="absolute bottom-0 left-0 right-0 bg-gray-900/95 p-3 md:p-4 border-t-4 border-purple-600 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.8)] flex flex-col items-center">
                      {!isAtLastPage ? (
                        <div className="flex w-full max-w-md gap-4">
                          {currentPageIndex > 0 && (
                            <button 
                               className="nes-btn w-1/3 py-4 text-sm font-bold shadow-[0_0_15px_rgba(255,255,255,0.2)]"
                               onClick={() => {
                                 setCurrentPageIndex(p => p - 1);
                                 if (window.speechSynthesis) window.speechSynthesis.cancel();
                                 setIsSpeaking(false);
                               }}
                            >
                               ⬅️ Back
                            </button>
                          )}
                          <button 
                             className={`nes-btn green py-4 text-sm font-bold shadow-[0_0_15px_rgba(74,222,128,0.5)] ${currentPageIndex > 0 ? 'w-2/3' : 'w-full'}`}
                             onClick={() => {
                               setCurrentPageIndex(p => p + 1);
                               if (window.speechSynthesis) window.speechSynthesis.cancel();
                               setIsSpeaking(false);
                             }}
                          >
                             Next 📖 (Enter)
                          </button>
                        </div>
                      ) : (
                        <>
                          <div className="flex w-full max-w-4xl justify-start mb-2">
                             <button 
                               className="nes-btn !bg-gray-800 !text-gray-300 hover:!bg-gray-700 !px-2 !py-1 text-[8px]"
                               onClick={() => {
                                 setCurrentPageIndex(p => p - 1);
                                 if (window.speechSynthesis) window.speechSynthesis.cancel();
                                 setIsSpeaking(false);
                               }}
                             >
                               ⬅️ Back to Page {currentPageIndex}
                             </button>
                          </div>
                          <p className="font-pixel text-[9px] text-gray-400 mb-2 text-center">What will you do next? (Arrows + Enter)</p>
                          <div className="flex flex-col gap-2 max-w-4xl mx-auto w-full">
                            {currentNode?.choices?.map((choice, idx) => {
                              const isFocused = focusedChoice === idx;
                              return (
                                <button 
                                  key={idx} 
                                  className={`nes-btn text-left flex justify-between items-center group py-2 transition-transform duration-100 ${isFocused ? 'bg-purple-800 ring-2 ring-green-400 scale-[1.02]' : 'hover:bg-purple-800'}`}
                                  onClick={() => handleChoice(choice)}
                                  onMouseEnter={() => setFocusedChoice(idx)}
                                >
                                  <span className={`text-[10px] md:text-[11px] leading-relaxed pr-4 ${isFocused ? 'text-green-300' : ''}`}>{choice.text}</span>
                                  <span className={`${isFocused ? 'opacity-100 text-green-400' : 'opacity-0'} shrink-0`}>▶</span>
                                </button>
                              );
                            })}
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  {gameState === 'gameover' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-red-900/95 p-6 border-t-4 border-red-600 z-10 text-center flex flex-col items-center gap-4">
                       <h2 className="font-pixel text-2xl md:text-3xl text-red-400 flex items-center justify-center gap-4">
                         💀 GAME OVER 💀
                       </h2>
                       <div className="flex flex-col md:flex-row gap-4">
                         <button className="nes-btn text-xs md:text-sm green" onClick={() => {
                            if(window.confirm("Are you sure you want to restart this adventure?")) {
                              setCurrentNode(sessionInitialNode);
                              setTurnCount(0);
                              setStoryHistory([]);
                              setCurrentPageIndex(0);
                              setCorrectAnswers(0);
                              setTotalQuestions(0);
                              setGameState('story');
                            }
                         }}>Restart This Adventure</button>
                         <button className="nes-btn text-xs md:text-sm" onClick={() => setGameState('menu')}>Main Menu</button>
                       </div>
                    </div>
                  )}

                  {gameState === 'victory' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-green-900/95 p-8 border-t-4 border-green-600 z-10 text-center">
                       <h2 className="font-pixel text-3xl text-yellow-400 mb-6 flex items-center justify-center gap-4 animate-bounce">
                         🏆 VICTORY! 🏆
                       </h2>
                       <p className="font-terminal text-2xl text-white mb-6">You solved the mysteries and conquered Adventurevania!</p>
                       <button className="nes-btn text-xl" onClick={() => setGameState('menu')}>Main Menu</button>
                    </div>
                  )}
                </div>
                
                {/* RIGHT PANE - Visual Content */}
                <div className="w-full md:w-[40%] lg:w-[45%] h-48 md:h-full flex-shrink-0 border-b-4 md:border-b-0 md:border-l-4 border-purple-800 relative order-1 md:order-2">
                    <ImagePanel prompt={currentNode?.imagePrompt} turnCount={turnCount} />
                </div>
              </div>
            );
          };

          const renderLoading = () => (
            <div className="flex flex-col items-center justify-center h-full text-center space-y-6 flex-grow py-12">
              <div className="text-6xl animate-bounce">👻</div>
              <h2 className="font-pixel text-xl text-purple-400 leading-relaxed">{loadingMsg || "Summoning Game Engine..."}</h2>
              <div className="w-64 h-4 bg-gray-900 pixel-border mt-4 overflow-hidden relative mx-auto">
                <div className="absolute top-0 left-0 h-full bg-green-500 animate-[loading_2s_ease-in-out_infinite]" style={{width: '50%'}}></div>
              </div>
            </div>
          );

          // Audio Player Overlay UI
          const renderAudioPlayer = () => (
             <div className="absolute top-2 right-2 md:top-4 md:right-4 z-50 bg-black music-border p-2 md:p-3 flex flex-col gap-2 shadow-[0_4px_10px_rgba(0,0,0,0.8)] opacity-70 hover:opacity-100 transition-opacity">
                <div className="flex items-center gap-3 justify-between">
                  <button 
                    onClick={() => {
                      if(isMuted) {
                        if (synthCtx && synthCtx.state === 'suspended') synthCtx.resume();
                      }
                      setIsMuted(!isMuted);
                    }} 
                    className="text-xl hover:scale-110 transition-transform focus:outline-none"
                    title={isMuted ? "Unmute Music" : "Mute Music"}
                  >
                    {isMuted ? '🔇' : '🔊'}
                  </button>
                  <input 
                    type="range" min="0" max="1" step="0.05" 
                    value={musicVolume} 
                    onChange={(e) => setMusicVolume(parseFloat(e.target.value))} 
                    className="w-20 md:w-24 cursor-pointer"
                  />
                </div>
                <select 
                  className="bg-gray-900 text-green-400 font-pixel text-[8px] p-1 border border-purple-800 outline-none cursor-pointer" 
                  value={currentTrack} 
                  onChange={(e) => setCurrentTrack(parseInt(e.target.value))}
                >
                  {SYNTH_TRACKS.map((t, i) => <option key={i} value={i}>{t.name}</option>)}
                </select>
             </div>
          );

          return (
            <React.Fragment>
              <div className="crt fixed inset-0 z-50 pointer-events-none"></div>
              <div className="scanline fixed inset-0 z-40 pointer-events-none"></div>
              
              {/* Dynamic Animated Critters Layer */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {critters.map(crit => {
                  if (crit.isBat) {
                    return <RetroBat key={crit.id} style={crit.style} />;
                  }
                  return (
                    <div key={crit.id} className="critter font-pixel text-red-500" style={crit.style}>
                      🕷️
                    </div>
                  );
                })}
              </div>

              {showLightning && <div className="lightning-overlay"></div>}
              
              <div className="h-[100dvh] bg-[#050505] md:p-6 flex items-center justify-center relative">
                <div className="w-full max-w-6xl h-full md:h-[95vh] bg-black md:pixel-border relative overflow-hidden flex flex-col justify-between">
                  {renderAudioPlayer()}

                  <div className="flex-grow overflow-hidden relative">
                    {gameState === 'menu' && renderMenu()}
                    {gameState === 'setup' && renderSetup()}
                    {gameState === 'loading' && renderLoading()}
                    {(gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && renderGameArea()}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Adventurevania />);
    </script>
</body>
</html>
