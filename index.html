<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventurevania - Choose Your Own Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat Bundles (Stable Globals) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
      
      .font-pixel { font-family: 'Press Start 2P', cursive; }
      .font-terminal { font-family: 'VT323', monospace; }
      
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border-vania {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.15),
          0 0 0 4px #D32F2F,
          0 0 0 8px #000;
      }

      .pixel-border-bubble {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.3),
          0 0 0 4px #FF4081,
          0 0 0 8px #00E5FF;
      }

      .music-border-vania {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.15),
          0 0 0 2px #E65100,
          0 0 0 4px #000;
      }

      .music-border-bubble {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.3),
          0 0 0 2px #00E5FF,
          0 0 0 4px #000;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(230,81,0,0.1) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.15;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 235, 204, 0); }
        10% { background-color: rgba(255, 240, 217, 0.7); }
        20% { background-color: rgba(255, 235, 204, 0); }
        35% { background-color: rgba(255, 240, 217, 0.5); }
        45% { background-color: rgba(255, 235, 204, 0); }
        100% { background-color: rgba(255, 235, 204, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.7s ease-out;
      }

      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
      }

      .nes-btn-vania {
        background-color: #B71C1C;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.25);
      }
      .nes-btn-vania.green { background-color: #E65100; color: #fff; }
      .nes-btn-vania.red { background-color: #3e2723; color: #ffab91; }

      .nes-btn-bubble {
        background-color: #00E5FF;
        color: #001133;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.6);
      }
      .nes-btn-bubble.green { background-color: #76FF03; color: #001133; }
      .nes-btn-bubble.red { background-color: #FF4081; color: #fff; }

      /* Custom Scrollbar Vania */
      .scrollbar-vania::-webkit-scrollbar { width: 12px; }
      .scrollbar-vania::-webkit-scrollbar-track { background: #1a0f0d; border-left: 2px solid #E65100; }
      .scrollbar-vania::-webkit-scrollbar-thumb { background: #B71C1C; border: 2px solid #000; }

      /* Custom Scrollbar Bubble */
      .scrollbar-bubble::-webkit-scrollbar { width: 12px; }
      .scrollbar-bubble::-webkit-scrollbar-track { background: #001133; border-left: 2px solid #00E5FF; }
      .scrollbar-bubble::-webkit-scrollbar-thumb { background: #FF4081; border: 2px solid #000; }

      /* Floating Bubble Animation */
      @keyframes floatBubble {
        0% { transform: translateY(110vh) scale(1); opacity: 0.8; }
        50% { transform: translateY(50vh) scale(1.1) translateX(15px); }
        100% { transform: translateY(-10vh) scale(1) translateX(-15px); opacity: 0; }
      }

      .floating-bubble {
        position: fixed;
        bottom: -50px;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(0,229,255,0.4) 50%, rgba(255,64,129,0.2) 100%);
        border: 2px solid rgba(255,255,255,0.6);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0,229,255,0.5);
        pointer-events: auto;
        cursor: pointer;
        z-index: 80;
      }
      
      body { 
        margin: 0; 
        overflow-x: hidden; 
      }
      
      input[type=range] { accent-color: #E65100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GLOBAL AUDIO REFERENCE SCOPE ---
        window.synthCtx = null;

        // --- GLOBAL ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMessage: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMessage: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("React Crash:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#180907] p-8 text-center border-4 border-red-600">
                  <h1 className="font-pixel text-4xl text-red-500 mb-6">SYSTEM CRASH</h1>
                  <p className="font-terminal text-2xl text-white mb-6">A magical anomaly broke the timeline:</p>
                  <div className="bg-black p-4 text-red-400 font-terminal text-xl pixel-border-vania w-full max-w-2xl break-words">
                    {this.state.errorMessage}
                  </div>
                  <button className="nes-btn nes-btn-vania green mt-8" onClick={() => window.location.reload()}>Reboot System</button>
                </div>
              );
            }
            return this.props.children; 
          }
        }

        // --- CONFIGURATION & CONSTANTS ---
        const POLLINATIONS_TEXT_URL = "https://text.pollinations.ai/";
        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx0V7hWS2O4mjqtII6sW3NvWXE927uhvjXtIKrAe1V8R9SmMDp2QhUwEaC1HP_N4q2XDQ/exec"; 

        const MENU_IMAGES = [

          "https://image.pollinations.ai/prompt/creepy%20haunted%20graveyard%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20spooky%20lightning?width=600&height=300&nologo=true&seed=2",
          "https://image.pollinations.ai/prompt/dark%20dungeon%20interior%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20torches%20skeletons?width=600&height=300&nologo=true&seed=3"

        const SYNTH_TRACKS = [

            ],

          },
          {

              { note: "C5", dur: 2 }, { note: "E5", dur: 2 }, { note: "G5", dur: 2 }, { note: "C6", dur: 2 },
              { note: "A5", dur: 4 }, { note: "F5", dur: 4 },
              { note: "G5", dur: 2 }, { note: "E5", dur: 2 }, { note: "D5", dur: 4 }, { note: "C5", dur: 8 }
            ],

            melody: [
              { note: "A4", dur: 2 }, { note: "B4", dur: 2 }, { note: "C5", dur: 4 }, { note: "B4", dur: 2 }, { note: "A4", dur: 2 },
              { note: "G#4", dur: 4 }, { note: "E4", dur: 4 }, { note: "A4", dur: 2 }, { note: "B4", dur: 2 }, 
              { note: "C5", dur: 4 }, { note: "D5", dur: 4 }, { note: "E5", dur: 8 }
            ],
            bass: ["A2", "E2", "F2", "G2"]
          }
        ];

        const NOTE_FREQ = {
          "C2": 65.41, "D2": 73.42, "E2": 82.41, "F2": 87.31, "G2": 98.00, "A2": 110.00,
          "D4": 293.66, "E4": 329.63, "F4": 349.23, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "B4": 493.88,
          "C5": 523.25, "D5": 587.33, "E5": 659.25, "F5": 698.46, "G5": 783.99, "A5": 880.00,
          "C6": 1046.50
        };

        const CATEGORIES = {
          characters: [
            { name: "The Mathlete", icon: "⚡", desc: "Calculates at the speed of light!" },
            { name: "Word Weaver", icon: "📖", desc: "Casts spells using vocabulary." },
            { name: "Eco-Ranger", icon: "🌿", desc: "Controls plants and knows nature." },
            { name: "Time Traveler", icon: "⏳", desc: "Expert on historical events." },
            { name: "Gravity Kid", icon: "🍎", desc: "Manipulates physics and forces." },
            { name: "Great Lakes Explorer", icon: "🌊", desc: "Expert navigator of the Great Lakes." },
            { name: "The Alchemist", icon: "🧪", desc: "Mixes matter and states of chemistry." },
            { name: "Cartographer", icon: "🗺️", desc: "Never gets lost, reads any map." },
            { name: "The Tinkerer", icon: "⚙️", desc: "Builds simple machines on the fly." },
            { name: "Codebreaker", icon: "🔍", desc: "Solves logic puzzles and ciphers." }
          ],
          villains: [
            { name: "Fraction Phantom", icon: "👻", desc: "Splits everything into pieces." },
            { name: "Count Misspell", icon: "🧛", desc: "Steals vowels in the night." },
            { name: "Sludge Monster", icon: "🧟", desc: "Pollutes rivers and habitats." },

            { name: "Grammar Gargoyle", icon: "🗿", desc: "Turns bad sentences to stone." },
            { name: "Dr. Deforestation", icon: "🚜", desc: "Destroys the local ecosystems." },
            { name: "Map-Mangler", icon: "🌪️", desc: "Scrambles the continents." },
            { name: "Multiplication Mummy", icon: "🧻", desc: "Traps you in tangles of times tables." },
