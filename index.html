          ],
          settings: [
            { name: "Haunted Library", icon: "🏛️", desc: "Books fly off the shelves here." },
            { name: "Castle of Calculus", icon: "🏰", desc: "A fortress built on math." },
            { name: "Primeval Forest", icon: "🌲", desc: "Dark woods full of science." },
            { name: "Ancient Pyramids", icon: "🏜️", desc: "Social studies in the sand." },
            { name: "Abandoned Lab", icon: "🏭", desc: "Where chemistry went wrong." },
            { name: "Spooky Swamp", icon: "🐊", desc: "Murky and full of biology." },
            { name: "Ghost Town", icon: "🏚️", desc: "An empty historical settlement." },
            { name: "Clockwork Tower", icon: "🕰️", desc: "A giant machine of gears." },
            { name: "Forgotten Museum", icon: "🖼️", desc: "Artifacts come alive at night." },
            { name: "Creepy Carnival", icon: "🎪", desc: "Rollercoasters of physics." }
          ],
          plots: [
            { name: "Find the Lost Artifact", icon: "💎", desc: "Recover the ancient treasure." },
            { name: "Rescue the Mayor", icon: "👑", desc: "The town leader is kidnapped!" },
            { name: "Stop the Machine", icon: "💣", desc: "Halt the villain's contraption." },
            { name: "Solve the Mystery", icon: "🧩", desc: "Find out who is haunting town." },
            { name: "Escape the Maze", icon: "🌀", desc: "Find your way out of the labyrinth." },
            { name: "Restore the Timeline", icon: "🕰️", desc: "Fix history before it's gone." },
            { name: "Cure the Curse", icon: "💊", desc: "Heal the townsfolk's ailments." },
            { name: "Find Hidden Treasure", icon: "💰", desc: "Follow the clues to the gold." },
            { name: "Defend the Castle", icon: "🛡️", desc: "Hold off the monster invasion." },
            { name: "Expose the Monster", icon: "🔦", desc: "Pull off the villain's mask!" }
          ],
          dilemmas: [
            { name: "Running Out of Time", icon: "⏰", desc: "The clock is ticking down fast." },
            { name: "Hopelessly Lost", icon: "🧭", desc: "You have no idea where you are." },
            { name: "Ignored Warning", icon: "⚠️", desc: "You shouldn't have opened that door." },
            { name: "Lost Magic Tool", icon: "🚫", desc: "Your primary weapon is gone." },
            { name: "Betrayed by Friend", icon: "🐍", desc: "Someone wasn't who they seemed." },
            { name: "Trapped in Room", icon: "🚪", desc: "The walls are closing in." },
            { name: "Sudden Storm", icon: "🌩️", desc: "Extreme weather strikes." },
            { name: "Weakness Revealed", icon: "👁️", desc: "The villain knows how to beat you." },
            { name: "Missing Pieces", icon: "🧩", desc: "You don't have all the clues." },
            { name: "Accused of Crime", icon: "⚖️", desc: "The town thinks YOU did it!" }
          ],
          readingLevels: [
            { name: "Early Primary", icon: "🧸", desc: "Grades 1-2 reading level." },
            { name: "Primary", icon: "🎒", desc: "Grade 3-4 reading level." },
            { name: "Junior", icon: "📚", desc: "Grade 5-6 reading level." },
            { name: "Intermediate", icon: "🎓", desc: "Grade 7-8 reading level." }
          ]
        };

        const STEPS_KEYS = ["character", "villain", "setting", "plot", "dilemma", "readingLevel"];
        const CATEGORIES_KEYS = ["characters", "villains", "settings", "plots", "dilemmas", "readingLevels"];

        const getActiveCategoryList = (step) => {
          return CATEGORIES[CATEGORIES_KEYS[step]];
        };

        // --- UTILITIES ---
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function splitStoryIntoPages(pagesInput, fallbackText, targetWordsPerPage) {
          let text = "";
          if (Array.isArray(pagesInput)) {
            text = pagesInput.join("\n\n").trim();
          } else if (typeof pagesInput === 'string') {
            text = pagesInput.trim();
          }
          if (!text) {
            text = fallbackText;
          }

          // Balanced splitting algorithm that splits cleanly into 3 pages
          let words = text.split(/\s+/).filter(Boolean);
          if (words.length < 10) {
            // String is too short, multiply fallback templates
            return [text, "You proceed forward with extreme caution.", "The path is clear. Prepare to face your challenge."];
          }

          let size = Math.ceil(words.length / 3);
          return [
            words.slice(0, size).join(" "),
            words.slice(size, size * 2).join(" "),
            words.slice(size * 2).join(" ")
          ];
        }

        // --- FIREBASE AND AUDIO CONTEXT GLOBALS ---
        let fbApp = null, fbAuth = null, fbDb = null, fbAppId = 'adventurevania-default';

        // Compat Wrappers to bridge Global Compatibility variables cleanly without ES module imports
        const initializeFirebaseApp = (config) => {
          if (typeof firebase !== 'undefined' && firebase.initializeApp) {
            return firebase.initializeApp(config);
          }
          return null;
        };
        const getFirebaseAuth = () => {
          if (typeof firebase !== 'undefined' && firebase.auth) {
            return firebase.auth();
          }
          return null;
        };
        const getFirebaseFirestore = () => {
          if (typeof firebase !== 'undefined' && firebase.firestore) {
            return firebase.firestore();
          }
          return null;
        };

        const doc = (database, ...paths) => database ? database.doc(paths.join('/')) : null;
        const collection = (database, ...paths) => database ? database.collection(paths.join('/')) : null;
        const setDoc = (docRef, data) => docRef ? docRef.set(data) : Promise.reject(new Error("No Database Connection"));
        const getDoc = async (docRef) => {
          if (!docRef) return { exists: () => false };
          const snap = await docRef.get();
          return {
            exists: () => snap.exists,
            data: () => snap.data()
          };
        };

        // --- FIREBASE GLOBALS MAP WITH LOCAL BINDING FIXES ---
        const signInAnonymously = (authRef) => {
          return authRef ? authRef.signInAnonymously() : Promise.reject(new Error("Auth Unavailable"));
        };
        const signInWithCustomToken = (authRef, token) => {
          return authRef ? authRef.signInWithCustomToken(token) : Promise.reject(new Error("Auth Unavailable"));
        };
        const onAuthStateChanged = (authRef, callback) => {
          return authRef ? authRef.onAuthStateChanged(callback) : () => {};
        };

        try {
          const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};
          if (Object.keys(firebaseConfig).length > 0 && typeof firebase !== 'undefined') {
            fbApp = initializeFirebaseApp(firebaseConfig);
            fbAuth = getFirebaseAuth();
            fbDb = getFirebaseFirestore();
            fbAppId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'adventurevania-default';
          }
        } catch (e) {
          console.error("Firebase init failed:", e);
        }

        // --- DUAL-ENGINE COHERENT FALLBACK STORY GENERATOR ---
        const generateLocalBook = (setup) => {
          const char = CATEGORIES.characters[setup.character];
          const vill = CATEGORIES.villains[setup.villain];
          const sett = CATEGORIES.settings[setup.setting];
          const plot = CATEGORIES.plots[setup.plot];
          const dil = CATEGORIES.dilemmas[setup.dilemma];
          const level = setup.readingLevel;

          let chapters = [];
          for (let turn = 0; turn < 10; turn++) {
            let p1, p2, p3, q, choices;

            if (setup.readingLevel === 0) { // Toddler logic
              p1 = `Ch ${turn + 1}. The sky is dark. ${char.name} walks. It is scary.`;
              p2 = `There is a big noise! The bad ${vill.name} is here.`;
              p3 = `Oh no! The bad ${vill.name} wants to stop you.`;
              q = `Who made the loud noise?`;
              choices = [
                { text: `The ${vill.name}`, isCorrect: true, isGameOver: false },
                { text: `A little bug`, isCorrect: false, isGameOver: true, gameOverMessage: "No, the bug was quiet. You lose!" },
                { text: `A quiet shadow`, isCorrect: false, isGameOver: true, gameOverMessage: "No, shadows are silent! You lose!" }
              ];
            } else { // Standard logic
              p1 = `Ch ${turn + 1}. With a sudden crash of lightning, ${char.name} moves forward into the ancient shadows of the ${sett.name}. The atmosphere is heavy with the trace of ${dil.name}.`;
              p2 = `The path ahead divides. Spooky winds whisper through the crumbling structures of the ${sett.name}. You must stay vigilant to proceed with your quest to ${plot.name}.`;
              p3 = `A sudden rustle behind the pillars! ${char.name} catches a glimpse of the terrifying ${vill.name} weaving complex puzzles in the twilight.`;
              q = `What primary force or dilemma was weighing heavily upon ${char.name} during this exploration?`;
              choices = [
                { text: `${dil.name}`, isCorrect: true, isGameOver: false },
                { text: "Finding a snack", isCorrect: false, isGameOver: true, gameOverMessage: "You became distracted by food and fell into a trapdoor!" },
                { text: "Deciding to take a nap", isCorrect: false, isGameOver: true, gameOverMessage: "You fell asleep and were captured!" }
              ];
            }

            chapters.push({ pages: [p1, p2, p3], question: q, choices: choices.sort(() => Math.random() - 0.5) });
          }
          return chapters;
        };

        // --- FLAPPY BAT MINIGAME COMPONENT ---
        const FlappyBatMinigame = () => {
          const canvasRef = useRef(null);
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            let bat = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 };
            let pipes = [];
            let score = 0; let gameOver = false; let frameCount = 0;

            const drawBat = (x, y, size) => {
              ctx.fillStyle = '#ffb300'; ctx.fillRect(x, y + size/3, size, size/3);
              if (Math.floor(frameCount / 8) % 2 === 0) {
                ctx.fillRect(x - size/2, y, size/2, size/2); ctx.fillRect(x + size, y, size/2, size/2); 
              } else {
                ctx.fillRect(x - size/2, y + size/2, size/2, size/2); ctx.fillRect(x + size, y + size/2, size/2, size/2); 
              }
              ctx.fillStyle = '#ff2222'; ctx.fillRect(x + size - 4, y + size/3 + 2, 2, 2);
            };

            const update = () => {
              if (gameOver) return;
              bat.velocity += bat.gravity; bat.y += bat.velocity;
              if (bat.y > canvas.height - bat.size || bat.y < 0) gameOver = true;
              if (frameCount % 110 === 0) pipes.push({ x: canvas.width, topHeight: Math.random() * (canvas.height - 160) + 20, gap: 120, passed: false, width: 45 });
              pipes.forEach(p => {
                p.x -= 2.5;
                if (bat.x < p.x + p.width && bat.x + bat.size > p.x) { if (bat.y < p.topHeight || bat.y + bat.size > p.topHeight + p.gap) gameOver = true; }
                if (!p.passed && bat.x > p.x + p.width) { p.passed = true; score++; }
              });
              pipes = pipes.filter(p => p.x + p.width > 0);
              frameCount++;
            };

            const draw = () => {
              ctx.fillStyle = '#1c0f0d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
              pipes.forEach(p => {
                ctx.fillStyle = '#d84315'; ctx.fillRect(p.x, 0, p.width, p.topHeight); ctx.fillRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
                ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 3; ctx.strokeRect(p.x, 0, p.width, p.topHeight); ctx.strokeRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
              });
              drawBat(bat.x, bat.y, bat.size);
              ctx.fillStyle = 'white'; ctx.font = '16px "Press Start 2P", monospace'; ctx.fillText(`SCORE:${score}`, 10, 30);
              if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444'; ctx.textAlign = 'center'; ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = 'white'; ctx.font = '10px "Press Start 2P", monospace'; ctx.fillText("Tap or Space to Restart", canvas.width/2, canvas.height/2 + 20); ctx.textAlign = 'left';
              }
            };

            const loop = () => { update(); draw(); animationFrameId = window.requestAnimationFrame(loop); };
            loop();

            const handleInput = (e) => {
              if (e.type === 'keydown' && e.code === 'Space') e.preventDefault();
              if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
              if (gameOver) { bat = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 }; pipes = []; score = 0; gameOver = false; frameCount = 0; } 
              else { bat.velocity = bat.jump; }
            };

            window.addEventListener('keydown', handleInput, { passive: false });
            canvas.addEventListener('touchstart', handleInput, { passive: false });
            canvas.addEventListener('mousedown', handleInput);

            return () => {
              window.cancelAnimationFrame(animationFrameId);
              window.removeEventListener('keydown', handleInput);
              if (canvas) { canvas.removeEventListener('touchstart', handleInput); canvas.removeEventListener('mousedown', handleInput); }
            };
          }, []);

          return (
            <div className="flex flex-col items-center w-full max-w-full mx-auto h-full justify-center">
              <p className="font-pixel text-[10px] text-amber-500 mb-4 animate-pulse text-center leading-relaxed">
                Play Flappy Bat while the AI writes your book!
              </p>
              <canvas ref={canvasRef} width={480} height={280} className="pixel-border-vania cursor-pointer bg-black touch-none shadow-[0_0_20px_rgba(230,81,0,0.4)] max-w-full" />
              <p className="font-terminal text-sm text-gray-400 mt-4 text-center">Spacebar, Up Arrow, or Tap to jump.</p>
            </div>
          );
        };

        // --- MAIN APP ---
        function Adventurevania() {
          const [user, setUser] = useState(null); 
          const [gameState, setGameState] = useState('menu'); 
          const [gameTheme, setGameTheme] = useState('vania'); // vania or bubble
          
          const [setupData, setSetupData] = useState({ character: 0, villain: 0, setting: 0, plot: 0, dilemma: 0, readingLevel: 1 });
          const [setupStep, setSetupStep] = useState(0); 
          const [setupFocusIndex, setSetupFocusIndex] = useState(0); 
          const [currentNode, setCurrentNode] = useState(null);
          const [currentPageIndex, setCurrentPageIndex] = useState(0); 
          const [turnCount, setTurnCount] = useState(0); 
          const [storyHistory, setStoryHistory] = useState([]);
          const [sessionInitialNode, setSessionInitialNode] = useState(null); 
          const [sessionSeed, setSessionSeed] = useState("");
          const [playerName, setPlayerName] = useState(localStorage.getItem('adventurevania_player') || "");
          const [showLightning, setShowLightning] = useState(false);
          const [musicVolume, setMusicVolume] = useState(0.3);
          const [isMuted, setIsMuted] = useState(true); 
          const [currentTrack, setCurrentTrack] = useState(0);
          const [focusedChoice, setFocusedChoice] = useState(0);
          const [critters, setCritters] = useState([]); 
          const [textSize, setTextSize] = useState(18); 
          const [isSpeaking, setIsSpeaking] = useState(false);
          const [loadingMsg, setLoadingMsg] = useState("");
          const [loadingProgress, setLoadingProgress] = useState(0);
          const [errorMsg, setErrorMsg] = useState("");
          const [confirmDialog, setConfirmDialog] = useState(null);
          const [activeDeathMessage, setActiveDeathMessage] = useState(""); // Track gameOver overlay cleanly

          // Holds the dynamically generated 10-chapter structure
          const [fullBook, setFullBook] = useState([]);

          const endOfStoryRef = useRef(null);
          const melodyIntervalRef = useRef(null);
          const synthCtxRef = useRef(null);

          // --- FIXED LOCALIZED AUDIO FUNCTIONS TO SOLVE UNDEFINED SCOPE ERRORS ---
          function initAudioContext() {
            if (!synthCtxRef.current) {
              synthCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
              window.synthCtx = synthCtxRef.current; // Sync window compat global pointer safely
            }
            if (synthCtxRef.current && synthCtxRef.current.state === 'suspended') {
              synthCtxRef.current.resume();
            }
          }

          function playThunderSynth() {
            initAudioContext();
            const ctx = synthCtxRef.current;
            if (!ctx || isMuted) return;
            try {
              const bufferSize = ctx.sampleRate * 1.5;
              const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
              const noiseNode = ctx.createBufferSource();
              noiseNode.buffer = buffer;
              const filterNode = ctx.createBiquadFilter();
              filterNode.type = 'lowpass';
              filterNode.frequency.setValueAtTime(600, ctx.currentTime);
              filterNode.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 1.2);
              const gainNode = ctx.createGain();
              gainNode.gain.setValueAtTime(musicVolume * 1.2, ctx.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.4);
              noiseNode.connect(filterNode);
              filterNode.connect(gainNode);
              gainNode.connect(ctx.destination);
              noiseNode.start();
            } catch(e) { console.warn(e); }
          }

          function playGhostHowl() {
            initAudioContext();
            const ctx = synthCtxRef.current;
            if (!ctx || isMuted) return;
            try {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              const now = ctx.currentTime;
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(450, now + 1.5);
              const lfo = ctx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.setValueAtTime(5, now);
              const lfoGain = ctx.createGain();
              lfoGain.gain.setValueAtTime(10, now);
              lfo.connect(lfoGain);
              lfoGain.connect(osc.frequency);
              lfo.start(now + 1.0);
              lfo.stop(now + 4.0);
              osc.frequency.exponentialRampToValueAtTime(280, now + 3.5);
              gain.gain.setValueAtTime(0.0001, now);
              gain.gain.exponentialRampToValueAtTime(musicVolume * 0.8, now + 1.5);
              gain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(now);
              osc.stop(now + 4.0);
            } catch(e) { console.warn(e); }
          }

          function playRealisticWolfHowl() {
            initAudioContext();
            const ctx = synthCtxRef.current;
            if (!ctx || isMuted) return;
            try {
              const now = ctx.currentTime;
              const voiceOsc = ctx.createOscillator();
              const subOsc = ctx.createOscillator();
              const finalGain = ctx.createGain();
              voiceOsc.type = 'triangle';
              subOsc.type = 'sine';
              voiceOsc.frequency.setValueAtTime(160, now);
              voiceOsc.frequency.exponentialRampToValueAtTime(390, now + 0.8);
              voiceOsc.frequency.exponentialRampToValueAtTime(440, now + 2.0);
              voiceOsc.frequency.exponentialRampToValueAtTime(280, now + 4.5);
              voiceOsc.frequency.exponentialRampToValueAtTime(110, now + 5.5);
              subOsc.frequency.setValueAtTime(80, now);
              subOsc.frequency.exponentialRampToValueAtTime(195, now + 0.8);
              subOsc.frequency.exponentialRampToValueAtTime(220, now + 2.0);
              subOsc.frequency.exponentialRampToValueAtTime(140, now + 4.5);
              subOsc.frequency.exponentialRampToValueAtTime(55, now + 5.5);
              const vibratoLFO = ctx.createOscillator();
              const vibratoGain = ctx.createGain();
              vibratoLFO.type = 'sine';
              vibratoLFO.frequency.setValueAtTime(5.8, now); 
              vibratoGain.gain.setValueAtTime(12, now); 
              vibratoLFO.connect(vibratoGain);
              vibratoGain.connect(voiceOsc.frequency);
              vibratoGain.connect(subOsc.frequency);
              const filter = ctx.createBiquadFilter();
              filter.type = 'bandpass';
              filter.Q.setValueAtTime(3.5, now);
              filter.frequency.setValueAtTime(400, now);
              filter.frequency.exponentialRampToValueAtTime(800, now + 1.2);
              filter.frequency.exponentialRampToValueAtTime(350, now + 4.5);
              finalGain.gain.setValueAtTime(0.0001, now);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.9, now + 1.0);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.7, now + 3.0);
              finalGain.gain.exponentialRampToValueAtTime(0.0001, now + 5.5);
              voiceOsc.connect(filter);
              subOsc.connect(filter);
              filter.connect(finalGain);
              finalGain.connect(ctx.destination);
              vibratoLFO.start(now);
              voiceOsc.start(now);
              subOsc.start(now);
              vibratoLFO.stop(now + 5.6);
              voiceOsc.stop(now + 5.6);
              subOsc.stop(now + 5.6);
            } catch(e) { console.warn("Synth Wolf Howl failed:", e); }
          }

          function triggerLightning() {
             setShowLightning(true);
             playThunderSynth();
             setTimeout(() => setShowLightning(false), 500);
             if (Math.random() > 0.5) {
               setTimeout(playRealisticWolfHowl, 1000);
             } else {
               setTimeout(playGhostHowl, 800);
             }
          }

          // Initialize Firebase Auth compat listener safely
          useEffect(() => {
            const initAuth = async () => {
              if(!fbAuth) return;
              try {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                  await signInWithCustomToken(fbAuth, window.__initial_auth_token);
                } else {
                  await signInAnonymously(fbAuth);
                }
              } catch (err) { console.error("Auth Error", err); }
            };
            initAuth();
            if (fbAuth) {
              const unsubscribe = onAuthStateChanged(fbAuth, setUser);
              return () => unsubscribe();
            }
          }, []);

          // Scroll to bottom
          useEffect(() => {
            if ((gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && endOfStoryRef.current) {
              endOfStoryRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [currentPageIndex, gameState]);

          // Rotating Menu
          useEffect(() => {
            if(gameState !== 'menu') return;
            const imgInterval = setInterval(() => { setMenuImgIndex(prev => (prev + 1) % MENU_IMAGES.length); }, 3000);
            return () => clearInterval(imgInterval);
          }, [gameState]);

          // Simulated Progress Bar
          useEffect(() => {
            let interval;
            if (gameState === 'loading') {
              interval = setInterval(() => {
                setLoadingProgress(prev => {
                  if (prev >= 95) return 95;
                  const increment = (100 - prev) * 0.08; 
                  return prev + increment;
                });
              }, 400);
            }
            return () => clearInterval(interval);
          }, [gameState]);

          // --- SYNTH AUDIO ---
          const playSynthNote = (freq, type, duration, volMod) => {
            const ctx = synthCtxRef.current;
            if (!ctx || isMuted || !freq) return;
            try {
              if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator();
              const gainNode = ctx.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, ctx.currentTime);
              gainNode.gain.setValueAtTime(0, ctx.currentTime);
              gainNode.gain.linearRampToValueAtTime(musicVolume * volMod, ctx.currentTime + 0.01);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration - 0.01);
              osc.connect(gainNode);
              gainNode.connect(ctx.destination);
              osc.start();
              osc.stop(ctx.currentTime + duration);
            } catch (e) { console.warn("Synth error:", e); }
          };

          const startSynthEngine = () => {
            if (melodyIntervalRef.current) clearInterval(melodyIntervalRef.current);
            if (!synthCtxRef.current) {
              synthCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
              window.synthCtx = synthCtxRef.current; 
            }
            const track = SYNTH_TRACKS[currentTrack];
            const stepDuration = 60 / track.tempo / 2; 
            let step = 0;
            melodyIntervalRef.current = setInterval(() => {
              if (isMuted) return;
              if (step % 4 === 0) {
                const bassNote = track.bass[Math.floor(step / 4) % track.bass.length];
                if (NOTE_FREQ[bassNote]) playSynthNote(NOTE_FREQ[bassNote], "triangle", stepDuration * 3.8, 0.7);
              }
              let melodySum = 0;
              let currentMelodyNote = null;
              for (let i = 0; i < track.melody.length; i++) {
                const item = track.melody[i];
                if (step % 16 === melodySum) { currentMelodyNote = item; break; }
                melodySum += item.dur;
              }
              if (currentMelodyNote && NOTE_FREQ[currentMelodyNote.note]) {
                playSynthNote(NOTE_FREQ[currentMelodyNote.note], "square", stepDuration * currentMelodyNote.dur * 0.9, 0.3);
              }
              step = (step + 1) % 16;
            }, stepDuration * 1000);
          };

          useEffect(() => {
            if (!isMuted) startSynthEngine();
            else if (melodyIntervalRef.current) { clearInterval(melodyIntervalRef.current); melodyIntervalRef.current = null; }
            return () => { if (melodyIntervalRef.current) clearInterval(melodyIntervalRef.current); };
          }, [isMuted, currentTrack, musicVolume]);

          // Ambient lightning interval loop
          useEffect(() => {
            const lightningInterval = setInterval(() => { if (Math.random() > 0.6) triggerLightning(); }, 8000);
            return () => clearInterval(lightningInterval);
          }, [isMuted, musicVolume]);

          // Critter Spawner / Bubble Spawner
          useEffect(() => {
            let timeoutId;
            const spawnCritter = () => {
              const id = Date.now();
              const isBat = Math.random() > 0.5;
              const direction = Math.random() > 0.5 ? 'Right' : 'Left';
              
              if (gameTheme === 'bubble') {
                // Spawn a floaty bubble
                const leftPercent = Math.floor(Math.random() * 80) + 10;
                const sizePx = Math.floor(Math.random() * 30) + 20;
                const animDuration = Math.floor(Math.random() * 4) + 6;
                setCritters(prev => [...prev, {
                  id,
                  isBubble: true,
                  style: {
                    left: `${leftPercent}vw`,
                    width: `${sizePx}px`,
                    height: `${sizePx}px`,
                    animation: `floatBubble ${animDuration}s linear forwards`
                  }
                }]);
                setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, animDuration * 1000 + 500);
              } else {
                const top = isBat ? Math.floor(Math.random() * 30) + 5 : Math.floor(Math.random() * 20) + 60; 
                const animation = isBat ? `batFly${direction} 8s ease-in-out forwards` : `spiderCrawl${direction} 12s linear forwards`;
                setCritters(prev => [...prev, { id, isBat, style: { top: `${top}vh`, animation } }]);
                setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, 12500);
              }
              timeoutId = setTimeout(spawnCritter, Math.random() * 4000 + 4000);
            };
            timeoutId = setTimeout(spawnCritter, 3000);
            return () => clearTimeout(timeoutId);
          }, [gameTheme]);

          // Keyboard Listeners
          useEffect(() => {
            const handleKeyDown = (e) => {
              if(document.activeElement.tagName === "INPUT" || confirmDialog !== null) return;
              if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) { e.preventDefault(); }

              if (gameState === 'setup') {
                 const currentDataList = getActiveCategoryList(setupStep);
                 if (!currentDataList) return;
                 const numOptions = currentDataList.length;

                 if (e.key === 'ArrowRight') {
                   setSetupFocusIndex(prev => Math.min(prev + 1, numOptions - 1));
                 } else if (e.key === 'ArrowLeft') {
                   setSetupFocusIndex(prev => Math.max(prev - 1, 0));
                 } else if (e.key === 'ArrowDown') {
                   setSetupFocusIndex(prev => Math.min(prev + 5, numOptions - 1));
                 } else if (e.key === 'ArrowUp') {
                   setSetupFocusIndex(prev => Math.max(prev - 5, 0));
                 } else if (e.key === 'Enter') {
                   const currentKey = STEPS_KEYS[setupStep];
                   const nextSetup = { ...setupData, [currentKey]: setupFocusIndex };
                   setSetupData(nextSetup);
                   
                   if (setupStep === 5) {
                      startGameWithData(nextSetup);
                   } else {
                     setSetupStep(prev => prev + 1);
                     setSetupFocusIndex(0); 
                   }
                 }
              } else if (gameState === 'story' && !errorMsg) {
                 const currentChapter = fullBook[turnCount];
                 if (!currentChapter) return;
                 const isAtLastPage = currentPageIndex === currentChapter.pages.length - 1;
                 
                 if (e.key === 'ArrowLeft' && currentPageIndex > 0) {
                     setCurrentPageIndex(p => p - 1);
                     if (window.speechSynthesis) window.speechSynthesis.cancel();
                     setIsSpeaking(false);
                 } else if (!isAtLastPage && (e.key === 'Enter' || e.key === 'ArrowRight')) {
                   setCurrentPageIndex(p => p + 1);
                   if (window.speechSynthesis) window.speechSynthesis.cancel();
                   setIsSpeaking(false);
                 } else if (isAtLastPage && currentChapter.choices?.length > 0) {
                   if (e.key === 'ArrowDown') setFocusedChoice(prev => Math.min(prev + 1, currentChapter.choices.length - 1));
                   else if (e.key === 'ArrowUp') setFocusedChoice(prev => Math.max(prev - 1, 0));
                   else hackerChoiceEnter(currentChapter);
                 }
              } else if (gameState === 'menu') {
                 if (e.key === 'Enter') {
                    setSetupStep(0); 
                    setSetupFocusIndex(0);
                    setGameState('setup');
                 }
              }
            };

            const hackerChoiceEnter = (currentChapter) => {
              handleChoice(currentChapter.choices[focusedChoice]);
            };

            window.addEventListener('keydown', handleKeyDown, { passive: false });
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [gameState, setupStep, setupFocusIndex, fullBook, turnCount, currentPageIndex, focusedChoice, errorMsg, confirmDialog, setupData]);

          const startGameWithData = (finalSetup) => {
            setTurnCount(0);
            setCurrentPageIndex(0);
            setActiveDeathMessage("");
            setGameState('loading');
            setLoadingMsg("Summoning a cohesive 30-Page Book...");
            setErrorMsg("");
            generateFullBook(finalSetup);
          };

          // --- CORE COHESION AND PROGRESSIVE SYSTEM ---
          const generateFullBook = async (finalSetup) => {
            const char = CATEGORIES.characters[finalSetup.character];
            const vill = CATEGORIES.villains[finalSetup.villain];
            const sett = CATEGORIES.settings[finalSetup.setting];
            const plot = CATEGORIES.plots[finalSetup.plot];
            const dil = CATEGORIES.dilemmas[finalSetup.dilemma];

            const pageWordTargets = [30, 100, 133, 166];
            const chapterWordTargets = [90, 300, 400, 500];

            const getReadingLevelInstruction = (level) => {
              if (level === 0) return "Write like an early primary book. Sentences MUST be 3 to 5 words max. Use ONLY basic sight words (big, red, run, fast, see, cat). EXACTLY 30 words per page (exactly 90 words per chapter). No big words allowed.";
              if (level === 1) return "Write for a standard primary grade. Use simple compound sentences. EXACTLY 100 words per page (exactly 300 words per chapter).";
              if (level === 2) return "Write for a junior grade. Use descriptive words and standard formatting. EXACTLY 133 words per page (exactly 400 words per chapter).";
              return "Write for an intermediate grade. Use highly advanced, dark, atmospheric, and spooky vocabulary. EXACTLY 166 words per page (exactly 500 words per chapter).";
            };

            // Aggressively force LLM cohesion by instructing a single sequential prompt flow
            let promptText = `
              Write a complete, highly cohesive 10-chapter Choose Your Own Adventure book.
              - Hero: ${char.name} (${char.desc})
              - Villain: ${vill.name} (${vill.desc})
              - Setting: ${sett.name} (${sett.desc})
              - Plot: ${plot.name}
              - Central Danger: ${dil.name}
              
              STRICT COHESION & FLOW RULES:
              1. The story MUST progress linearly from Chapter 1 to Chapter 10 without repeating past events or duplicating descriptions. Each chapter must represent a totally new stage of the plot journey!
              2. Chapter 1 is the Arrival. Chapter 2-4 is the search and exploration of clues. Chapter 5-7 is a trap laid by ${vill.name}. Chapter 8-9 is the narrow escape. Chapter 10 is the final boss clash!
              3. EACH Chapter MUST have exactly 3 "pages" (an array of exactly 3 text strings).
              4. The length of text on EACH page MUST follow this rule: ${getReadingLevelInstruction(finalSetup.readingLevel)}
              5. At the end of each chapter, provide a reading comprehension question based on that chapter, with exactly 3 choices (one correct, two incorrect with a 'gameOverMessage').
            `;

            const systemInstruction = `You are a strict children's book author. You MUST output a single valid JSON block containing an array of 10 chapters. Use SINGLE QUOTES (') inside strings. Schema: { "chapters": [ { "pages": ["page 1", "page 2", "page 3"], "question": "Question?", "choices": [{"text":"", "isCorrect":true/false, "gameOverMessage":""}] } ] }`;

            let success = false;
            let attempts = 0;
            let lastError = "";

            while (attempts < 3 && !success) {
              attempts++;
              try {
                if (attempts > 1) await sleep(attempts * 2000); 

                const pollinationUrl = `${POLLINATIONS_TEXT_URL}${encodeURIComponent(promptText)}?model=openai&jsonMode=true&system=${encodeURIComponent(systemInstruction)}&seed=${Math.random()}`;
                const response = await fetch(pollinationUrl);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                
                let jsonText = await response.text();
                jsonText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const startIdx = jsonText.indexOf('{');
                const endIdx = jsonText.lastIndexOf('}');
                if (startIdx !== -1 && endIdx !== -1) {
                  jsonText = jsonText.substring(startIdx, endIdx + 1);
                } else {
                  throw new Error("Formatting Bounds Error");
                }
                
                const nodeData = JSON.parse(jsonText);
                
                if (!nodeData.chapters || nodeData.chapters.length === 0) {
                   throw new Error("Invalid array structure.");
                }

                // --- ROBUST CHAPTER, COHESION & PAGE BALANCER ---
                const targetW = pageWordTargets[finalSetup.readingLevel];
                const sanitizedChapters = nodeData.chapters.map((ch, turnIdx) => {
                  const fallbackText = `Chapter ${turnIdx + 1} begins. You venture further into ${sett.name}.`;
                  let pages = splitStoryIntoPages(ch.pages || ch.storyText, fallbackText, targetW);

                  // Ensure question exists
                  let question = ch.question ? ch.question.trim() : "What is the best way to bypass this challenge?";

                  // Ensure we always have at least 3 choices
                  let choices = ch.choices;
                  if (!choices || !Array.isArray(choices) || choices.length === 0) {
                    choices = [
                      { text: "Solve the challenge carefully", isCorrect: true, isGameOver: false },
                      { text: "Rush forward blindly", isCorrect: false, isGameOver: true, gameOverMessage: `You ran into ${vill.name}'s trap!` },
                      { text: "Ignore the signs", isCorrect: false, isGameOver: true, gameOverMessage: "You ignored the warning and fell into a pit!" }
                    ];
                  }

                  if (choices.length < 3) {
                    const backupIncorrect = [
                      { text: "Take the wrong turn", isCorrect: false, isGameOver: true, gameOverMessage: "You took a wrong turn and got lost in the shadows!" },
                      { text: "Stop and rest too long", isCorrect: false, isGameOver: true, gameOverMessage: `You rested too long and ${vill.name} caught you!` }
                    ];
                    while (choices.length < 3) {
                      choices.push(backupIncorrect[choices.length % backupIncorrect.length]);
                    }
                  }

                  // Verify correct/incorrect flags are logically consistent
                  let hasCorrect = choices.some(c => c.isCorrect);
                  if (!hasCorrect) {
                    choices[0].isCorrect = true;
                    choices[0].isGameOver = false;
                  }

                  return { pages, question, choices };
                });

                setFullBook(sanitizedChapters);
                setLoadingProgress(100);
                setTimeout(() => setGameState('story'), 500);
                success = true;
                
              } catch (err) {
                console.warn(`Engine Error (Attempt ${attempts}):`, err.message);
                lastError = err.message;
              }
            }

            if (!success) {
              console.warn("API failed. Booting local offline fallback engine...");
              try {
                const localBook = generateLocalBook(finalSetup);
                setFullBook(localBook);
                setLoadingProgress(100);
                setTimeout(() => setGameState('story'), 500);
              } catch (localErr) {
                setErrorMsg(`Critical Fallback Error: ${localErr.message}`);
                setGameState('story');
              }
            }
          };

          // Added the missing startGame definition inside React Scope to clear setup transitions
          const startGame = () => {
            const currentKey = STEPS_KEYS[setupStep];
            const finalSetup = { ...setupData, [currentKey]: setupFocusIndex };
            setSetupData(finalSetup);
            startGameWithData(finalSetup);
          };

          const handleChoice = (choice) => {
            if (choice.isGameOver || choice.isCorrect === false) {
              setActiveDeathMessage(choice.gameOverMessage || "You made a grave mistake!");
              setCurrentPageIndex(2); // Jump to last page of the chapter to read the custom overlay
              setGameState('gameover');
            } else {
              if (turnCount + 1 >= fullBook.length || turnCount + 1 >= 10) {
                 setGameState('story'); // safety fallback
                 setTimeout(() => { setGameState('victory'); }, 100);
              } else {
                 setTurnCount(turnCount + 1);
                 setCurrentPageIndex(0);
                 setActiveDeathMessage(""); // Clear out the error/death message block
              }
            }
          };

          const popBubble = (critId) => {
            // Cheerful synth pop sound
            playSynthNote(880, 'sine', 0.08, 0.4);
            playSynthNote(1200, 'sine', 0.05, 0.3);
            setCritters(prev => prev.filter(c => c.id !== critId));
          };

          const renderMenu = () => (
            <div className={`flex flex-col items-center justify-center h-full text-center p-4 md:p-8 space-y-6 md:space-y-8 relative ${gameTheme === 'bubble' ? 'bg-[#001133]/40' : 'bg-[#1c0f0d]/40'}`}>
              <div className={`w-full max-w-2xl h-48 sm:h-56 md:h-64 border-4 bg-black overflow-hidden relative mb-2 ${gameTheme === 'bubble' ? 'border-[#00E5FF] music-border-bubble' : 'border-[#B71C1C] music-border-vania'}`}>
                 <img src={MENU_IMAGES[menuImgIndex]} className="w-full h-full object-cover transition-opacity duration-1000 ease-in-out" style={{ imageRendering: 'pixelated' }} alt="Retro Castlevania Background" />
                 <div className={`absolute inset-0 mix-blend-color-burn ${gameTheme === 'bubble' ? 'bg-[#00e5ff]/25' : 'bg-[#E65100]/25'}`}></div>
                 <div className="absolute inset-0 bg-black/40"></div>
                 <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2 w-full">
                    <h1 className={`font-pixel text-lg sm:text-2xl md:text-3xl lg:text-4xl tracking-wider w-full text-center break-words leading-tight ${gameTheme === 'bubble' ? 'text-[#00E5FF] drop-shadow-[0_0_15px_rgba(0,229,255,1)]' : 'text-amber-500 drop-shadow-[0_0_15px_rgba(230,81,0,1)]'}`}>
                      ADVENTUREVANIA
                    </h1>
                    <p className={`font-terminal text-lg sm:text-xl md:text-2xl mt-2 font-bold ${gameTheme === 'bubble' ? 'text-[#FF4081] drop-shadow-[0_0_10px_rgba(255,64,129,1)]' : 'text-orange-400 drop-shadow-[0_0_10px_rgba(230,81,0,1)]'}`}>
                      {gameTheme === 'bubble' ? '🫧 Cheerful Bubble Bobble Quest 🫧' : '🦇 A Grade 3 Spooky Quest 🦇'}
                    </p>
                 </div>
              </div>

              {/* Theme Toggle Button Slider */}
              <div className="flex items-center gap-4 relative z-10">
                <span className="font-pixel text-[8px] sm:text-[10px] text-orange-400">🦇 Gothic</span>
                <button 
                  onClick={() => {
                    initAudioContext();
                    const nextTheme = gameTheme === 'vania' ? 'bubble' : 'vania';
                    setGameTheme(nextTheme);
                    setCurrentTrack(nextTheme === 'bubble' ? 1 : 0);
                    playSynthNote(440, 'square', 0.2, 0.4);
                  }}
                  className={`w-16 h-8 rounded-full p-1 transition-colors duration-300 flex items-center ${gameTheme === 'bubble' ? 'bg-[#00E5FF]' : 'bg-[#B71C1C]'}`}
                >
                  <div className={`w-6 h-6 rounded-full bg-white shadow-md transform transition-transform duration-300 flex items-center justify-center ${gameTheme === 'bubble' ? 'translate-x-8' : 'translate-x-0'}`}>
                    <span className="text-[10px]">{gameTheme === 'bubble' ? '🫧' : '😈'}</span>
                  </div>
                </button>
                <span className="font-pixel text-[8px] sm:text-[10px] text-[#00E5FF]">Bobble 🫧</span>
              </div>

              <div className="flex flex-col gap-4 md:gap-6 w-full max-w-md relative z-10">
                <button 
                  className={`nes-btn animate-pulse text-xs sm:text-sm ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} 
                  onClick={() => { initAudioContext(); setSetupStep(0); setGameState('setup'); }}
                >
                  ▶️ Press Enter to Start
                </button>

                <div className="flex flex-col gap-2 w-full text-left mt-2">
                    <label className={`font-pixel text-[8px] md:text-[10px] text-center ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                      Student Identification:
                    </label>
                    <input 
                      type="text" 
                      placeholder="Enter Player Name..." 
                      value={playerName} 
                      onChange={(e) => { setPlayerName(e.target.value); localStorage.setItem('adventurevania_player', e.target.value); }} 
                      className={`w-full bg-[#1c0f0d] border-2 text-[10px] text-center p-3 outline-none font-pixel ${gameTheme === 'bubble' ? 'border-[#00E5FF] text-[#00E5FF] focus:border-[#FF4081]' : 'border-red-950 text-orange-400 focus:border-orange-500'}`} 
                    />
                </div>
              </div>
            </div>
          );

          const renderSetup = () => {
            const currentDataList = getActiveCategoryList(setupStep);
            if (!currentDataList) return null;
            const currentKey = STEPS_KEYS[setupStep];

            return (
              <div className="flex flex-col h-full p-4 md:p-6 overflow-hidden bg-black/30">
                <div className="flex justify-between items-center mb-4 border-b-4 border-red-950 pb-2 shrink-0">
                  <h2 className={`font-pixel text-xs md:text-sm leading-relaxed ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                    {["Select Your Hero", "Choose the Villain", "Pick a Setting", "Select the Plot", "Choose a Dilemma", "Reading Difficulty"][setupStep]}
                  </h2>
                  <span className={`font-pixel text-[9px] ${gameTheme === 'bubble' ? 'text-[#FF4081]' : 'text-orange-500/70'}`}>Step {setupStep + 1}/6</span>
                </div>

                {/* Scroll Grid: Ensures all items are fully scrollable and visible */}
                <div className={`flex-grow overflow-y-auto min-h-0 pr-2 pb-4 ${gameTheme === 'bubble' ? 'scrollbar-bubble' : 'scrollbar-vania'}`}>
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 py-2">
                    {currentDataList.map((item, idx) => {
                      const isSelected = setupData[currentKey] === idx;
                      const isFocused = setupFocusIndex === idx;
                      return (
                        <div 
                          key={idx} 
                          onClick={() => { setSetupFocusIndex(idx); setSetupData({...setupData, [currentKey]: idx}); }} 
                          className={`p-3 cursor-pointer flex flex-col items-center text-center transition-all ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'} ${isFocused ? 'bg-amber-950 scale-105 shadow-[0_0_25px_rgba(0,229,255,0.4)]' : isSelected ? 'bg-red-950 border-red-500' : 'bg-black/40 border-stone-800 hover:bg-stone-900/60'}`} 
                          style={isFocused ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.15), 0 0 0 4px #00E5FF, 0 0 0 8px #000' } : isSelected ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.15), 0 0 0 4px #B71C1C, 0 0 0 8px #000' } : {}}
                        >
                          <div className="text-3xl mb-1">{item.icon}</div>
                          <h3 className="font-pixel text-[8px] md:text-[9px] text-white mb-1 leading-tight h-8 flex items-center justify-center">{item.name}</h3>
                          <p className="font-terminal text-orange-200/80 text-xs md:text-sm leading-tight hidden md:block">{item.desc}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="flex justify-between mt-4 pt-2 border-t-2 border-red-950 items-center shrink-0">
                  <div className="font-pixel text-[8px] text-orange-600/70 hidden md:block">Use Arrow Keys & Enter</div>
                  <div className="flex gap-4">
                    {setupStep > 0 ? (
                      <button className={`nes-btn ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => setSetupStep(setupStep - 1)}>
                        Back
                      </button>
                    ) : <div></div>}
                    {setupStep < 5 ? (
                      <button 
                        className={`nes-btn green ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} 
                        onClick={() => { 
                          setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                          setSetupStep(setupStep + 1); 
                          setSetupFocusIndex(0);
                        }}
                      >
                        Next
                      </button>
                    ) : (
                      <button className={`nes-btn green animate-pulse ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={startGame}>
                        Start Quest
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const renderLoading = () => (
            <div className={`flex flex-col h-full w-full ${gameTheme === 'bubble' ? 'bg-[#001133]' : 'bg-[#180907]'}`}>
              {/* Top/Middle Minigame */}
              <div className="flex-1 p-4 flex flex-col items-center justify-center bg-[#130807] overflow-hidden">
                <FlappyBatMinigame />
              </div>
              
              {/* Bottom Progress Bar */}
              <div className="w-full p-6 flex flex-col items-center justify-center border-t-4 border-red-950 bg-stone-950 shrink-0">
                <h2 className={`font-pixel text-[10px] md:text-xs leading-relaxed text-center mb-1 ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                  {loadingMsg}
                </h2>
                {/* Vetted Waiting Instruction Note */}
                <p className="font-terminal text-yellow-500 text-lg md:text-xl mb-4 text-center animate-pulse">
                  This could take several scary minutes.
                </p>
                <div className={`w-full max-w-md h-6 bg-black relative overflow-hidden ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                  <div className={`absolute top-0 left-0 h-full transition-all duration-500 ${gameTheme === 'bubble' ? 'bg-[#00E5FF]' : 'bg-orange-600'}`} style={{width: `${Math.min(loadingProgress, 99)}%`}}></div>
                </div>
                <p className="font-terminal text-xl text-orange-400 mt-2">{Math.floor(Math.min(loadingProgress, 99))}%</p>
              </div>
            </div>
          );

          const renderGameArea = () => {
            const currentChapter = fullBook[turnCount];
            if (!currentChapter && !errorMsg) return renderLoading();
            const isAtLastPage = currentPageIndex === (currentChapter?.pages?.length || 0) - 1;

            return (
              <div className="flex flex-col md:flex-row h-full w-full bg-[#180907] relative overflow-hidden">
                <div className="flex-1 flex flex-col relative h-full overflow-hidden order-2 md:order-1">
                  <div className={`flex justify-between items-center p-2 md:p-4 mb-0 shrink-0 z-10 ${gameTheme === 'bubble' ? 'bg-[#001133] pixel-border-bubble' : 'bg-[#2d140f] pixel-border-vania'}`}>
                    <div className={`font-pixel text-[10px] md:text-sm flex items-center gap-2 animate-pulse ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-amber-500'}`}>
                       🗺️ Chapter: {turnCount + 1}/10
                    </div>
                    <div className="flex items-center gap-2 md:gap-4">
                      <div className={`flex items-center gap-1 md:gap-2 bg-black px-1 md:px-2 py-1 mr-1 md:mr-2 ${gameTheme === 'bubble' ? 'music-border-bubble' : 'music-border-vania'}`}>
                        <span className="font-pixel text-[8px] text-gray-400">A</span>
                        <input type="range" min="14" max="24" value={textSize} onChange={(e) => setTextSize(parseInt(e.target.value))} className="w-16 md:w-20 cursor-pointer" />
                        <span className="font-pixel text-[12px] text-gray-400">A</span>
                      </div>
                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => { setConfirmDialog({ type: 'restart', message: "Are you sure you want to restart this adventure from the beginning?" }); }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">⏮️</span> <span className="hidden md:inline">Restart</span>
                      </button>
                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => { setConfirmDialog({ type: 'quit', message: "Are you sure you want to quit to the main menu?" }); }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">🔄</span> <span className="hidden md:inline">Quit</span>
                      </button>
                    </div>
                  </div>

                  <div className="flex-grow overflow-y-auto px-4 md:px-8 pb-48 pt-4">
                    {/* Display current page */}
                    {currentChapter && (
                      <div className="animate-[fadeIn_0.5s_ease-in]">
                        <div className={`p-4 md:p-6 relative bg-black ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                          <div className={`absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>

                          <div className="w-full">
                             {/* FIXED: text size now applies properly to current pages */}
                             <InteractiveText text={currentChapter.pages[currentPageIndex] + (isAtLastPage && activeDeathMessage ? "\n\n" + activeDeathMessage : "")} textSize={textSize} />
                          </div>

                          <div className="mt-4 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                            {isAtLastPage && currentChapter.question && !activeDeathMessage && (
                              <div className={`p-3 border-l-4 break-inside-avoid w-full ${gameTheme === 'bubble' ? 'bg-[#001133] border-[#FF4081]' : 'bg-purple-900 border-green-400'}`}>
                                <p className={`font-pixel text-[11px] leading-loose ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-green-300'}`}>
                                  <span className="text-yellow-400">CHALLENGE:</span> {currentChapter.question}
                                </p>
                              </div>
                            )}
                            <button 
                              onClick={() => handleReadAloud((currentChapter.pages[currentPageIndex] + (isAtLastPage && activeDeathMessage ? ". " + activeDeathMessage : "")) + (isAtLastPage && currentChapter.question && !activeDeathMessage ? ". The challenge is: " + currentChapter.question : ""))} 
                              className={`nes-btn shrink-0 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`}
                            >
                              {isSpeaking ? '⏹️ Stop' : '🗣️ Read Aloud'}
                            </button>
                          </div>
                        </div>
                      </div>
                    )}

                    {errorMsg && (
                      <div className="bg-[#5d120d] border-2 border-red-500 p-4 my-4 font-terminal text-xl text-white text-center flex flex-col gap-4">
                        <div>{errorMsg}</div>
                        <button className={`nes-btn mt-2 mx-auto ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => startGameWithData(setupData)}>Try Again</button>
                      </div>
                    )}
                    <div ref={endOfStoryRef} />
                  </div>

                  {(gameState === 'story') && !errorMsg && currentChapter && (
                    <div className={`absolute bottom-0 left-0 right-0 p-3 md:p-4 border-t-4 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.8)] flex flex-col items-center ${gameTheme === 'bubble' ? 'bg-[#001133]/95 border-[#00E5FF]' : 'bg-[#2D140F]/95 border-red-950'}`}>
                      {!isAtLastPage ? (
                        <div className="flex w-full max-w-md gap-4">
                          {currentPageIndex > 0 && (
                            <button className={`nes-btn w-1/3 py-4 text-sm font-bold shadow-[0_0_15px_rgba(255,255,255,0.2)] ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => { setCurrentPageIndex(p => p - 1); if (window.speechSynthesis) window.speechSynthesis.cancel(); setIsSpeaking(false); }}>
                               ⬅️ Back
                            </button>
                          )}
                          <button className={`nes-btn green py-4 text-sm font-bold shadow-[0_0_15px_rgba(230,81,0,0.5)] ${currentPageIndex > 0 ? 'w-2/3' : 'w-full'} ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => { setCurrentPageIndex(p => p + 1); if (window.speechSynthesis) window.speechSynthesis.cancel(); setIsSpeaking(false); }}>
                             Next Page 📖 (Enter)
                          </button>
                        </div>
                      ) : (
                        <>
                          <div className="flex w-full max-w-4xl justify-start mb-2">
                             <button className={`nes-btn !bg-stone-900 hover:!bg-stone-800 !px-2 !py-1 text-[8px] ${gameTheme === 'bubble' ? '!text-[#00E5FF]' : '!text-orange-400'}`} onClick={() => { setCurrentPageIndex(p => p - 1); if (window.speechSynthesis) window.speechSynthesis.cancel(); setIsSpeaking(false); }}>
                               ⬅️ Back to Page {currentPageIndex}
                             </button>
                          </div>
                          <p className="font-pixel text-[9px] text-amber-500/80 mb-2 text-center">What will you do next? (Arrows + Enter)</p>
                          <div className="flex flex-col gap-2 max-w-4xl mx-auto w-full">
                            {currentChapter.choices?.map((choice, idx) => {
                              const isFocused = focusedChoice === idx;
                              return (
                                <button key={idx} className={`nes-btn text-left flex justify-between items-center group py-2 transition-transform duration-100 ${isFocused ? 'bg-amber-950 ring-2 ring-orange-500 scale-[1.02]' : 'hover:bg-amber-950/40'} ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => handleChoice(choice)} onMouseEnter={() => setFocusedChoice(idx)}>
                                  <span className={`text-[10px] md:text-[11px] leading-relaxed pr-4 ${isFocused ? 'text-amber-300 font-bold' : ''}`}>{choice.text}</span>
                                  <span className={`${isFocused ? 'opacity-100 text-orange-500' : 'opacity-0'} shrink-0`}>▶</span>
                                </button>
                              );
                            })}
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  {gameState === 'gameover' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-[#3e2723]/95 p-6 border-t-4 border-[#B71C1C] z-10 text-center flex flex-col items-center gap-4">
                       <h2 className="font-pixel text-2xl md:text-3xl text-red-500 flex items-center justify-center gap-4 animate-bounce">💀 GAME OVER 💀</h2>
                       <div className="flex flex-col md:flex-row gap-4">
                         {/* Clear out death overlay when restarting so choice cards are displayed instantly */}
                         <button className={`nes-btn text-xs md:text-sm green ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => { setTurnCount(0); setCurrentPageIndex(0); setActiveDeathMessage(""); setGameState('story'); }}>Restart Adventure</button>
                         <button className={`nes-btn text-xs md:text-sm ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => { setGameState('menu'); setActiveDeathMessage(""); }}>Main Menu</button>
                       </div>
                    </div>
                  )}

                  {gameState === 'victory' && (
                    <div className="absolute bottom-0 left-0 right-0 bg-[#1b5e20]/95 p-8 border-t-4 border-yellow-500 z-10 text-center">
                       <h2 className="font-pixel text-3xl text-yellow-400 mb-6 flex items-center justify-center gap-4 animate-bounce">🏆 VICTORY! 🏆</h2>
                       <p className="font-terminal text-2xl text-white mb-6">You solved the mysteries and conquered Adventurevania!</p>
                       <button className={`nes-btn text-xl ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => setGameState('menu')}>Play Again</button>
                    </div>
                  )}
                </div>
                
                {/* RIGHT PANE - Custom procedural Sunset scene (Offline ready, zero AI delay!) */}
                <div className="w-full md:w-[40%] lg:w-[45%] h-64 md:h-full flex-shrink-0 border-b-4 md:border-b-0 md:border-l-4 border-red-950 relative order-1 md:order-2">
                    <SunsetPixelArt setting={setupData.setting} turn={turnCount} villain={setupData.villain} />
                </div>
              </div>
            );
          };

          const renderAudioPlayer = () => (
             <div className={`absolute top-2 right-2 md:top-4 md:right-4 z-50 bg-black p-2 md:p-3 flex flex-col gap-2 shadow-[0_4px_10px_rgba(0,0,0,0.8)] opacity-70 hover:opacity-100 transition-opacity ${gameTheme === 'bubble' ? 'music-border-bubble' : 'music-border-vania'}`}>
                <div className="flex items-center gap-3 justify-between">
                  {/* FIXED: Turning on the sound will no longer crash the game with undefined variable reference errors */}
                  <button onClick={() => { initAudioContext(); if(isMuted) { startSynthEngine(); } setIsMuted(!isMuted); }} className="text-xl hover:scale-110 transition-transform focus:outline-none" title={isMuted ? "Unmute Music" : "Mute Music"}>
                    {isMuted ? '🔇' : '🔊'}
                  </button>
                  <input type="range" min="0" max="1" step="0.05" value={musicVolume} onChange={(e) => setMusicVolume(parseFloat(e.target.value))} className="w-20 md:w-24 cursor-pointer" />
                </div>
                <select className="bg-gray-950 text-orange-400 font-pixel text-[8px] p-1 border border-red-950 outline-none cursor-pointer" value={currentTrack} onChange={(e) => setCurrentTrack(parseInt(e.target.value))}>
                  {SYNTH_TRACKS.map((t, i) => <option key={i} value={i}>{t.name}</option>)}
                </select>
             </div>
          );

          return (
            <React.Fragment>
              <div className="crt fixed inset-0 z-50 pointer-events-none"></div>
              <div className="scanline fixed inset-0 z-40 pointer-events-none"></div>
              
              {/* Dynamic Animated Critters / Floaty Bubbles Layer */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {critters.map(crit => {
                  if (crit.isBubble) {
                    return (
                      <div 
                        key={crit.id} 
                        className="floating-bubble" 
                        style={crit.style} 
                        onClick={() => popBubble(crit.id)} 
                      />
                    );
                  }
                  if (crit.isBat) return <RetroBat key={crit.id} style={crit.style} />;
                  return <div key={crit.id} className="critter font-pixel text-red-500" style={crit.style}>🕷️</div>;
                })}
              </div>

              {showLightning && <div className="lightning-overlay"></div>}
              
              <div className="h-[100dvh] p-2 md:p-6 flex items-center justify-center relative">
                
                {confirmDialog && (
                  <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 p-4">
                    <div className={`p-6 md:p-8 text-center max-w-sm w-full bg-[#2d140f] ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                      <h3 className="font-pixel text-orange-400 mb-4 text-xl">Are you sure?</h3>
                      <p className="font-terminal text-xl text-white mb-8 leading-relaxed">
                        {confirmDialog.message}
                      </p>
                      <div className="flex gap-4 justify-center">
                        {/* FIXED: Clicking YES now correctly restarts from turn 0 instantly without hanging */}
                        <button className={`nes-btn green flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => {
                          if (confirmDialog.type === 'restart') {
                            setCurrentPageIndex(0);
                            setTurnCount(0);
                            setStoryHistory([]);
                            setCorrectAnswers(0);
                            setTotalQuestions(0);
                            setActiveDeathMessage("");
                            setGameState('story');
                          } else if (confirmDialog.type === 'quit') {
                            setGameState('menu');
                            setActiveDeathMessage("");
                          }
                          setConfirmDialog(null);
                        }}>Yes</button>
                        <button className={`nes-btn red flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => setConfirmDialog(null)}>No</button>
                      </div>
                    </div>
                  </div>
                )}

                <div className={`w-full max-w-6xl h-full md:h-[95vh] bg-[#1c0f0d] relative overflow-hidden flex flex-col justify-between ${gameTheme === 'bubble' ? 'pixel-border-bubble bg-[#001133]/90' : 'pixel-border-vania'}`}>
                  {renderAudioPlayer()}

                  <div className="flex-grow h-full flex flex-col overflow-hidden relative">
                    {gameState === 'menu' && renderMenu()}
                    {gameState === 'setup' && renderSetup()}
                    {gameState === 'loading' && renderLoading()}
                    {(gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && renderGameArea()}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><Adventurevania /></ErrorBoundary>);
    </script>
</body>
</html>
