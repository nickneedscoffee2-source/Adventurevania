      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border-vania {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.15),
          0 0 0 4px #D32F2F,
          0 0 0 8px #000;
      }

      .pixel-border-bubble {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.3),
          0 0 0 4px #FF4081,
          0 0 0 8px #00E5FF;
      }

      .music-border-vania {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.15),
          0 0 0 2px #E65100,
          0 0 0 4px #000;
      }

      .music-border-bubble {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.3),
          0 0 0 2px #00E5FF,
          0 0 0 4px #000;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(230,81,0,0.1) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.15;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 235, 204, 0); }
        10% { background-color: rgba(255, 240, 217, 0.7); }
        20% { background-color: rgba(255, 235, 204, 0); }
        35% { background-color: rgba(255, 240, 217, 0.5); }
        45% { background-color: rgba(255, 235, 204, 0); }
        100% { background-color: rgba(255, 235, 204, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.7s ease-out;
      }

      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
      }

      .nes-btn-vania {
        background-color: #B71C1C;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.25);
      }
      .nes-btn-vania.green { background-color: #E65100; color: #fff; }
      .nes-btn-vania.red { background-color: #3e2723; color: #ffab91; }

      .nes-btn-bubble {
        background-color: #00E5FF;
        color: #001133;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.6);
      }
      .nes-btn-bubble.green { background-color: #76FF03; color: #001133; }
      .nes-btn-bubble.red { background-color: #FF4081; color: #fff; }

      /* Custom Scrollbar Vania */
      .scrollbar-vania::-webkit-scrollbar { width: 12px; }
      .scrollbar-vania::-webkit-scrollbar-track { background: #1a0f0d; border-left: 2px solid #E65100; }
      .scrollbar-vania::-webkit-scrollbar-thumb { background: #B71C1C; border: 2px solid #000; }

      /* Custom Scrollbar Bubble */
      .scrollbar-bubble::-webkit-scrollbar { width: 12px; }
      .scrollbar-bubble::-webkit-scrollbar-track { background: #001133; border-left: 2px solid #00E5FF; }
      .scrollbar-bubble::-webkit-scrollbar-thumb { background: #FF4081; border: 2px solid #000; }

      /* Floating Bubble Animation */
      @keyframes floatBubble {
        0% { transform: translateY(110vh) scale(1); opacity: 0.8; }
        50% { transform: translateY(50vh) scale(1.1) translateX(15px); }
        100% { transform: translateY(-10vh) scale(1) translateX(-15px); opacity: 0; }
      }

      .floating-bubble {
        position: fixed;
        bottom: -50px;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(0,229,255,0.4) 50%, rgba(255,64,129,0.2) 100%);
        border: 2px solid rgba(255,255,255,0.6);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0,229,255,0.5);
        pointer-events: auto;
        cursor: pointer;
        z-index: 81;
      }

      /* Falling and Pulsing Shooting Star Animation */
      @keyframes fallStar {
        0% { transform: translateY(-10vh) scale(0.4); opacity: 0; }
        15% { opacity: 1; transform: translateY(15vh) scale(1.4); }
        30% { transform: translateY(35vh) scale(0.6); }
        45% { transform: translateY(55vh) scale(1.3); }
        65% { transform: translateY(75vh) scale(0.5); }
        85% { opacity: 1; transform: translateY(95vh) scale(1.2); }
        100% { transform: translateY(115vh) scale(0.2); opacity: 0; }
      }
      .shooting-star-animated {
        position: fixed;
        top: 0;
        animation: fallStar 2.2s linear forwards;
        z-index: 85;
      }

        margin: 0;

        background: linear-gradient(to bottom, #E65100 0%, #4D1A0F 35%, #2D140F 70%, #180907 100%); 
      }
      
      input[type=range] { accent-color: #E65100; }
    </style>
</head>

        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMessage: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMessage: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("React Crash:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#180907] p-8 text-center border-4 border-red-600">
                  <h1 className="font-pixel text-4xl text-red-500 mb-6">SYSTEM CRASH</h1>

                  <div className="bg-black p-4 text-red-400 font-terminal text-xl pixel-border-vania w-full max-w-2xl break-words">
                    {this.state.errorMessage}
                  </div>
                  <button className="nes-btn nes-btn-vania green mt-8" onClick={() => window.location.reload()}>Reboot System</button>

              );

        // --- UTILITIES ---
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Deterministic padder that guarantees exact progressive story word counts
        function padStoryTextToTarget(baseText, targetCount) {
          let words = baseText.split(/\s+/).filter(Boolean);
          let count = words.length;
          
          let descriptiveSentences = [
            "Ancient dust dancing in the dim, warm light of the high chamber painted pictures of past ages.",
            "A sudden structural breeze swirled through the dark arches, whispering secrets of forgotten lore.",
            "You took another cautious step forward, carefully checking the structural stability of the path.",
            "Your instincts screamed at you to remain extremely focused on the challenging puzzle directly ahead.",
            "A shimmering mist hung silently above the stones, refracting the sunset into beautiful arrays.",
            "Determined to complete your epic quest, you took a deep breath and prepared for what lay next."
          ];
          
          let idx = 0;
          while (count < targetCount) {
            let sentence = descriptiveSentences[idx % descriptiveSentences.length];
            baseText += " " + sentence;
            words = baseText.split(/\s+/).filter(Boolean);
            count = words.length;
            idx++;
          }
          
          return words.slice(0, targetCount).join(" ");
        }

        function InteractiveText({ text, textSize }) {
          const [highlights, setHighlights] = useState([]);
          useEffect(() => { setHighlights([]); }, [text]); 

          const handleSelection = () => {
            const selection = window.getSelection();
            if (!selection || selection.isCollapsed) return;
            const selectedText = selection.toString().trim();
            if (selectedText.length > 1 && !highlights.includes(selectedText)) setHighlights(prev => [...prev, selectedText]);
          };
          const removeHighlight = (phrase) => { setHighlights(prev => prev.filter(h => h !== phrase)); };

          const renderText = () => {
            if (!text) return null;
            if (highlights.length === 0) return text;
            const sorted = highlights.slice().sort((a, b) => b.length - a.length).map(h => h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
            const regex = new RegExp(`(${sorted.join('|')})`, 'gi');
            const parts = text.split(regex);
            return parts.map((part, i) => {
              const matched = highlights.find(h => h.toLowerCase() === part.toLowerCase());
              if (matched) return (<mark key={i} className="bg-amber-400 text-black px-1 rounded cursor-pointer" onClick={() => removeHighlight(matched)}>{part}</mark>);
              return <span key={i}>{part}</span>;
            });
          };

          return (
            <div onMouseUp={handleSelection} onTouchEnd={handleSelection}>
              <p className="font-terminal text-gray-200 leading-relaxed whitespace-pre-wrap" style={{ fontSize: `${textSize}px` }}>{renderText()}</p>
            </div>
          );
        }

        function FlappyBatMinigame({ theme }) {
          const canvasRef = useRef(null);
          const isBubble = theme === 'bubble';

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            let player = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 };
            let pipes = [];
            let score = 0; let gameOver = false; let frameCount = 0;

            const drawPlayer = (x, y, size) => {
              if (isBubble) {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x + size/3, y + size/3, size/6, 0, Math.PI * 2);
                ctx.fill();
              } else {
                ctx.fillStyle = '#ffb300'; ctx.fillRect(x, y + size/3, size, size/3);
                if (Math.floor(frameCount / 8) % 2 === 0) {
                  ctx.fillRect(x - size/2, y, size/2, size/2); ctx.fillRect(x + size, y, size/2, size/2); 
                } else {
                  ctx.fillRect(x - size/2, y + size/2, size/2, size/2); ctx.fillRect(x + size, y + size/2, size/2, size/2); 
                }
                ctx.fillStyle = '#ff2222'; ctx.fillRect(x + size - 4, y + size/3 + 2, 2, 2);
              }
            };

            const update = () => {
              if (gameOver) return;
              player.velocity += player.gravity; player.y += player.velocity;
              if (player.y > canvas.height - player.size || player.y < 0) gameOver = true;
              if (frameCount % 110 === 0) pipes.push({ x: canvas.width, topHeight: Math.random() * (canvas.height - 160) + 20, gap: 120, passed: false, width: 45 });
              pipes.forEach(p => {
                p.x -= 2.5;
                if (player.x < p.x + p.width && player.x + player.size > p.x) { if (player.y < p.topHeight || player.y + player.size > p.topHeight + p.gap) gameOver = true; }
                if (!p.passed && player.x > p.x + p.width) { p.passed = true; score++; }
              });
              pipes = pipes.filter(p => p.x + p.width > 0);
              frameCount++;
            };

            const draw = () => {
              ctx.fillStyle = isBubble ? '#001133' : '#1c0f0d'; 
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              
              pipes.forEach(p => {
                ctx.fillStyle = isBubble ? '#FF4081' : '#d84315'; 
                ctx.fillRect(p.x, 0, p.width, p.topHeight); ctx.fillRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
                ctx.strokeStyle = isBubble ? '#fff' : '#3e2723'; 
                ctx.lineWidth = 3; 
                ctx.strokeRect(p.x, 0, p.width, p.topHeight); ctx.strokeRect(p.x, p.topHeight + p.gap, p.width, canvas.height);
              });
              drawPlayer(player.x, player.y, player.size);
              ctx.fillStyle = 'white'; ctx.font = '16px "Press Start 2P", monospace'; ctx.fillText(`SCORE:${score}`, 10, 30);
              if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444'; ctx.textAlign = 'center'; ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = 'white'; ctx.font = '10px "Press Start 2P", monospace'; ctx.fillText("Tap or Space to Restart", canvas.width/2, canvas.height/2 + 20); ctx.textAlign = 'left';
              }
            };

            const loop = () => { update(); draw(); animationFrameId = window.requestAnimationFrame(loop); };
            loop();

            const handleInput = (e) => {
              if (e.type === 'keydown' && e.code === 'Space') e.preventDefault();
              if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
              if (gameOver) { player = { x: 50, y: 120, velocity: 0, gravity: 0.35, jump: -6.0, size: 16 }; pipes = []; score = 0; gameOver = false; frameCount = 0; } 
              else { player.velocity = player.jump; }
            };

            window.addEventListener('keydown', handleInput, { passive: false });
            canvas.addEventListener('touchstart', handleInput, { passive: false });
            canvas.addEventListener('mousedown', handleInput);

            return () => {
              window.cancelAnimationFrame(animationFrameId);
              window.removeEventListener('keydown', handleInput);
              if (canvas) { canvas.removeEventListener('touchstart', handleInput); canvas.removeEventListener('mousedown', handleInput); }
            };
          }, [isBubble]);

          return (
            <div className="flex flex-col items-center w-full max-w-full mx-auto h-full justify-center">
              <p className={`font-pixel text-[10px] mb-4 animate-pulse text-center leading-relaxed ${isBubble ? 'text-[#00E5FF]' : 'text-amber-500'}`}>
                Play {isBubble ? 'Flappy Bubble' : 'Flappy Bat'} while the AI writes your book!
              </p>
              <canvas ref={canvasRef} width={480} height={280} className={`cursor-pointer touch-none max-w-full ${isBubble ? 'pixel-border-bubble bg-[#001133]' : 'pixel-border-vania bg-black'}`} />
              <p className="font-terminal text-sm text-gray-400 mt-4 text-center">Spacebar, Up Arrow, or Tap to jump.</p>
            </div>
          );
        }

        function SunsetPixelArt({ setting, turn, villain, theme }) {

            const canvas = canvasRef.current;

            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            // 1. SKY GRADIENT (10 phases of sunset)
            let skyColors = [];
            if (theme === 'bubble') {
              if (turn === 0 || turn === 1) skyColors = ['#00E5FF', '#00BFFF', '#0099FF'];
              else if (turn >= 2 && turn <= 4) skyColors = ['#00BFFF', '#0099FF', '#0066CC', '#0044AA'];
              else if (turn >= 5 && turn <= 7) skyColors = ['#0099FF', '#0066CC', '#003388', '#001144'];
              else skyColors = ['#0044AA', '#002266', '#000A22', '#000000'];
            } else {
              if (turn === 0 || turn === 1) skyColors = ['#fc9838', '#fc7460', '#bc447c']; 
              else if (turn >= 2 && turn <= 4) skyColors = ['#f85800', '#e40058', '#a800a8', '#5800a8']; 
              else if (turn >= 5 && turn <= 7) skyColors = ['#e40058', '#a800a8', '#400080', '#000040']; 
              else skyColors = ['#180040', '#000028', '#000010', '#000000']; 
            }

            const step = h / skyColors.length;
            skyColors.forEach((color, i) => {
              ctx.fillStyle = color;
              ctx.fillRect(0, i * step, w, step);
            });

            // 2. CELESTIAL BODIES
            if (turn < 7) {
              const sunY = 60 + turn * 22;
              ctx.fillStyle = theme === 'bubble' ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 235, 59, 0.2)';
              ctx.beginPath(); ctx.arc(w/2, sunY, 48, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = theme === 'bubble' ? '#ffffff' : '#ffeb3b';
              ctx.beginPath(); ctx.arc(w/2, sunY, 32, 0, Math.PI * 2); ctx.fill();
            } else {
              ctx.fillStyle = '#ffffff';
              for (let i = 0; i < 20; i++) {
                ctx.fillRect(Math.floor((Math.sin(i * 99) * 0.5 + 0.5) * w), Math.floor((Math.cos(i * 33) * 0.5 + 0.5) * (h - 100)), 2, 2);
              }
              const moonColor = theme === 'bubble' ? '#88EEFF' : (turn === 9 ? '#d32f2f' : '#fff9c4');
              const moonGlow = theme === 'bubble' ? 'rgba(0, 229, 255, 0.3)' : (turn === 9 ? 'rgba(211, 47, 47, 0.3)' : 'rgba(255, 249, 196, 0.2)');
              ctx.fillStyle = moonGlow;
              ctx.beginPath(); ctx.arc(w - 70, 60, 26, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = moonColor;
              ctx.beginPath(); ctx.arc(w - 70, 60, 18, 0, Math.PI * 2); ctx.fill();
            }

            // 2.5 THE NEGABOR GREEN OGRE FACE
            if (villain === 3) {
              const ogreX = w * 0.15; const ogreY = 45;

              ctx.fillRect(ogreX - 8, ogreY + 6, 8, 8); ctx.fillRect(ogreX + 40, ogreY + 6, 8, 8);
              ctx.fillStyle = theme === 'bubble' ? '#FF4081' : '#f57c00'; ctx.fillRect(ogreX + 6, ogreY + 12, 6, 6); ctx.fillRect(ogreX + 28, ogreY + 12, 6, 6);
              ctx.fillStyle = '#ff1744'; ctx.fillRect(ogreX + 8, ogreY + 14, 2, 2); ctx.fillRect(ogreX + 30, ogreY + 14, 2, 2);
              ctx.fillStyle = '#1b5e20'; ctx.fillRect(ogreX + 16, ogreY + 22, 8, 6);
              ctx.fillStyle = '#ffffff'; ctx.fillRect(ogreX + 8, ogreY + 30, 4, 4); ctx.fillRect(ogreX + 28, ogreY + 30, 4, 4);
              ctx.fillStyle = '#000000'; ctx.fillRect(ogreX + 12, ogreY + 32, 16, 2);
            }

            // 3. MOUNTAIN SILHOUETTE
            ctx.fillStyle = theme === 'bubble' ? 'rgba(0, 17, 51, 0.65)' : 'rgba(24, 9, 7, 0.65)';
            ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(0, h - 80); ctx.lineTo(w * 0.2, h - 120);
            ctx.lineTo(w * 0.4, h - 70); ctx.lineTo(w * 0.6, h - 105); ctx.lineTo(w * 0.8, h - 80);
            ctx.lineTo(w, h - 130); ctx.lineTo(w, h); ctx.closePath(); ctx.fill();

            // 4. SETTING SILHOUETTES
            ctx.fillStyle = theme === 'bubble' ? '#000A1A' : '#100504'; ctx.fillRect(0, h - 40, w, 40);
            ctx.fillStyle = theme === 'bubble' ? '#00E5FF' : '#3e2723'; ctx.fillRect(0, h - 40, w, 4);
            ctx.fillStyle = '#000000';

            switch(setting) {
              case 0: {
                ctx.fillRect(10, 0, 30, h); ctx.fillRect(w - 40, 0, 30, h);
                ctx.fillStyle = theme === 'bubble' ? '#FF4081' : '#ffeb3b'; ctx.fillRect(120, h - 140, 12, 6); ctx.fillRect(w - 150, h - 180, 14, 8);
                break;
              }
              case 1: {
                ctx.fillRect(30, h - 220, 60, 180); ctx.fillRect(200, h - 180, 50, 140);
                ctx.beginPath(); ctx.moveTo(30, h - 220); ctx.lineTo(60, h - 270); ctx.lineTo(90, h - 220); ctx.fill();
                break;
              }
              case 2: {
                const drawTree = (tx, ty) => {
                  ctx.fillRect(tx + 12, ty, 6, h - ty);
                  ctx.beginPath(); ctx.moveTo(tx, ty + 60); ctx.lineTo(tx + 15, ty); ctx.lineTo(tx + 30, ty + 60); ctx.fill();
                  ctx.beginPath(); tx -= 5; ctx.moveTo(tx, ty + 120); ctx.lineTo(tx + 20, ty + 40); ctx.lineTo(tx + 40, ty + 120); ctx.fill();
                };
                drawTree(40, h - 240); drawTree(w - 90, h - 260);
                break;
              }
              case 3: {
                ctx.beginPath(); ctx.moveTo(w/2 - 120, h - 40); ctx.lineTo(w/2, h - 190); ctx.lineTo(w/2 + 120, h - 40); ctx.closePath(); ctx.fill();
                break;
              }
              case 4: {
                ctx.fillRect(20, h - 160, 20, 120); ctx.fillRect(w - 50, h - 190, 30, 150);
                ctx.fillStyle = '#00e676'; ctx.fillRect(25, h - 120, 4, 4);
                ctx.fillStyle = '#ff1744'; ctx.fillRect(25, h - 100, 4, 4);
                break;
              }
              case 5: {
                ctx.fillRect(0, h - 50, w, 20); ctx.fillRect(40, h - 180, 12, 140); ctx.fillRect(w - 80, h - 200, 14, 160);
                break;
              }
              case 6: {
                ctx.fillRect(20, h - 170, 80, 130); ctx.fillRect(w - 110, h - 190, 90, 150);
                ctx.fillStyle = '#000'; ctx.fillRect(w/2 - 3, h - 100, 6, 40); ctx.fillRect(w/2 - 12, h - 90, 24, 6);
                break;
              }
              case 7: {
                ctx.beginPath(); ctx.arc(80, h - 160, 45, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w - 100, h - 200, 60, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 8: {
                ctx.fillRect(60, h - 120, 40, 80); ctx.fillRect(w - 100, h - 140, 40, 100);
                ctx.beginPath(); ctx.arc(w - 80, h - 160, 15, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 9: {
                ctx.beginPath(); ctx.arc(w/2, h - 150, 70, 0, Math.PI * 2); ctx.strokeStyle = '#000000'; ctx.lineWidth = 6; ctx.stroke();
                ctx.lineWidth = 2;
                for (let a = 0; a < 8; a++) {
                  const angle = (a * Math.PI) / 4;
                  ctx.beginPath(); ctx.moveTo(w/2, h - 150); ctx.lineTo(w/2 + Math.cos(angle) * 70, h - 150 + Math.sin(angle) * 70); ctx.stroke();
                }
                break;
              }
            }
          }, [setting, turn, villain, theme]);

          return (
            <canvas ref={canvasRef} width={500} height={500} className="w-full h-full object-cover transition-opacity duration-1000" style={{ imageRendering: 'pixelated' }} />
          );
        }

        // --- MAIN APP ---

          }, [gameTheme]);

          // --- FIXED LOCALIZED AUDIO FUNCTIONS TO SOLVE UNDEFINED SCOPE ERRORS ---
          function initAudioContext() {
            if (!window.synthCtx) {
              window.synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (window.synthCtx && window.synthCtx.state === 'suspended') {
              window.synthCtx.resume();
            }
          }

          function playThunderSynth() {
            initAudioContext();
            const ctx = window.synthCtx;
            if (!ctx || isMuted) return;
            try {
              const bufferSize = ctx.sampleRate * 1.5;
              const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
              const noiseNode = ctx.createBufferSource();
              noiseNode.buffer = buffer;
              const filterNode = ctx.createBiquadFilter();
              filterNode.type = 'lowpass';
              filterNode.frequency.setValueAtTime(600, ctx.currentTime);
              filterNode.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 1.2);
              const gainNode = ctx.createGain();
              gainNode.gain.setValueAtTime(musicVolume * 1.2, ctx.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.4);
              noiseNode.connect(filterNode);
              filterNode.connect(gainNode);
              gainNode.connect(ctx.destination);
              noiseNode.start();
            } catch(e) { console.warn(e); }
          }

          function playGhostHowl() {
            initAudioContext();
            const ctx = window.synthCtx;
            if (!ctx || isMuted) return;
            try {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'sine';
              const now = ctx.currentTime;
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(450, now + 1.5);
              const lfo = ctx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.setValueAtTime(5, now);
              const lfoGain = ctx.createGain();
              lfoGain.gain.setValueAtTime(10, now);
              lfo.connect(lfoGain);
              lfoGain.connect(osc.frequency);
              lfo.start(now + 1.0);
              lfo.stop(now + 4.0);
              osc.frequency.exponentialRampToValueAtTime(280, now + 3.5);
              gain.gain.setValueAtTime(0.0001, now);
              gain.gain.exponentialRampToValueAtTime(musicVolume * 0.8, now + 1.5);
              gain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(now);
              osc.stop(now + 4.0);
            } catch(e) { console.warn(e); }
          }

          function playRealisticWolfHowl() {
            initAudioContext();
            const ctx = window.synthCtx;
            if (!ctx || isMuted) return;
            try {
              const now = ctx.currentTime;
              const voiceOsc = ctx.createOscillator();
              const subOsc = ctx.createOscillator();
              const finalGain = ctx.createGain();
              voiceOsc.type = 'triangle';
              subOsc.type = 'sine';
              voiceOsc.frequency.setValueAtTime(160, now);
              voiceOsc.frequency.exponentialRampToValueAtTime(390, now + 0.8);
              voiceOsc.frequency.exponentialRampToValueAtTime(440, now + 2.0);
              voiceOsc.frequency.exponentialRampToValueAtTime(280, now + 4.5);
              voiceOsc.frequency.exponentialRampToValueAtTime(110, now + 5.5);
              subOsc.frequency.setValueAtTime(80, now);
              subOsc.frequency.exponentialRampToValueAtTime(195, now + 0.8);
              subOsc.frequency.exponentialRampToValueAtTime(220, now + 2.0);
              subOsc.frequency.exponentialRampToValueAtTime(140, now + 4.5);
              subOsc.frequency.exponentialRampToValueAtTime(55, now + 5.5);
              const vibratoLFO = ctx.createOscillator();
              const vibratoGain = ctx.createGain();
              vibratoLFO.type = 'sine';
              vibratoLFO.frequency.setValueAtTime(5.8, now); 
              vibratoGain.gain.setValueAtTime(12, now); 
              vibratoLFO.connect(vibratoGain);
              vibratoGain.connect(voiceOsc.frequency);
              vibratoGain.connect(subOsc.frequency);
              const filter = ctx.createBiquadFilter();
              filter.type = 'bandpass';
              filter.Q.setValueAtTime(3.5, now);
              filter.frequency.setValueAtTime(400, now);
              filter.frequency.exponentialRampToValueAtTime(800, now + 1.2);
              filter.frequency.exponentialRampToValueAtTime(350, now + 4.5);
              finalGain.gain.setValueAtTime(0.0001, now);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.9, now + 1.0);
              finalGain.gain.exponentialRampToValueAtTime(musicVolume * 0.7, now + 3.0);
              finalGain.gain.exponentialRampToValueAtTime(0.0001, now + 5.5);
              voiceOsc.connect(filter);
              subOsc.connect(filter);
              filter.connect(finalGain);
              finalGain.connect(ctx.destination);
              vibratoLFO.start(now);
              voiceOsc.start(now);
              subOsc.start(now);
              vibratoLFO.stop(now + 5.6);
              voiceOsc.stop(now + 5.6);
              subOsc.stop(now + 5.6);
            } catch(e) { console.warn("Synth Wolf Howl failed:", e); }
          }

          function triggerLightning() {
             setShowLightning(true);
             playThunderSynth();
             setTimeout(() => setShowLightning(false), 500);
             if (Math.random() > 0.5) {
               setTimeout(playRealisticWolfHowl, 1000);
             } else {
               setTimeout(playGhostHowl, 800);
             }
          }

          const triggerShootingStar = () => {
            const id = Date.now();
            const startX = Math.random() * 60 + 20; 
            const startY = Math.random() * 20 + 10; 
            setShootingStar({ id, x: startX, y: startY });
            
            // Magical twinkle sounds
            playSynthNote(1200, 'sine', 0.1, 0.25);
            setTimeout(() => playSynthNote(1500, 'sine', 0.1, 0.15), 100);
            setTimeout(() => playSynthNote(1800, 'sine', 0.1, 0.2), 200);
            
            setTimeout(() => setShootingStar(null), 2200);
          };

          // --- FIXED TTS SYSTEM ---
          const handleReadAloud = (text) => {
            if (!window.speechSynthesis) return;
            if (isSpeaking) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
              return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95; 
            utterance.onend = () => setIsSpeaking(false);
            utterance.onerror = () => setIsSpeaking(false);
            setIsSpeaking(true);
            window.speechSynthesis.speak(utterance);
          };

          // Clear speaking states on component unmount
          useEffect(() => {
            return () => {
              if (window.speechSynthesis) window.speechSynthesis.cancel();
            };
          }, []);

          // Ambient event loop
          useEffect(() => {
            const ambientInterval = setInterval(() => {
              if (Math.random() > 0.6) {
                if (gameTheme === 'bubble') {
                  triggerShootingStar();
                } else {
                  triggerLightning();
                }
              }
            }, 8000);
            return () => clearInterval(ambientInterval);
          }, [isMuted, musicVolume, gameTheme]);

          // Critter Spawner / Bubble Spawner
          useEffect(() => {
            let timeoutId;
            const spawnCritter = () => {
              const id = Date.now();
              const isBat = Math.random() > 0.5;
              const direction = Math.random() > 0.5 ? 'Right' : 'Left';
              
              if (gameTheme === 'bubble') {
                // Spawn a floaty bubble
                const leftPercent = Math.floor(Math.random() * 80) + 10;
                const sizePx = Math.floor(Math.random() * 30) + 20;
                const animDuration = Math.floor(Math.random() * 4) + 6;
                setCritters(prev => [...prev, {
                  id,
                  isBubble: true,
                  style: {
                    left: `${leftPercent}vw`,
                    width: `${sizePx}px`,
                    height: `${sizePx}px`,
                    animation: `floatBubble ${animDuration}s linear forwards`
                  }
                }]);
                setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, animDuration * 1000 + 500);
              } else {
                const top = isBat ? Math.floor(Math.random() * 30) + 5 : Math.floor(Math.random() * 20) + 60; 
                const animation = isBat ? `batFly${direction} 8s ease-in-out forwards` : `spiderCrawl${direction} 12s linear forwards`;
                setCritters(prev => [...prev, { id, isBat, style: { top: `${top}vh`, animation } }]);
                setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, 12500);
              }
              timeoutId = setTimeout(spawnCritter, Math.random() * 4000 + 4000);
            };
            timeoutId = setTimeout(spawnCritter, 3000);
            return () => clearTimeout(timeoutId);
          }, [gameTheme]);

          // Keyboard Listeners
          useEffect(() => {
            const handleKeyDown = (e) => {
              if(document.activeElement.tagName === "INPUT" || confirmDialog !== null) return;
              if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) { e.preventDefault(); }

              if (gameState === 'setup') {
                 const currentDataList = getActiveCategoryList(setupStep);
                 if (!currentDataList) return;
                 const numOptions = currentDataList.length;

                 if (e.key === 'ArrowRight') {
                   setSetupFocusIndex(prev => Math.min(prev + 1, numOptions - 1));
                 } else if (e.key === 'ArrowLeft') {
                   setSetupFocusIndex(prev => Math.max(prev - 1, 0));
                 } else if (e.key === 'ArrowDown') {
                   setSetupFocusIndex(prev => Math.min(prev + 5, numOptions - 1));
                 } else if (e.key === 'ArrowUp') {
                   setSetupFocusIndex(prev => Math.max(prev - 5, 0));
                 } else if (e.key === 'Enter') {
                   const currentKey = STEPS_KEYS[setupStep];
                   const nextSetup = { ...setupData, [currentKey]: setupFocusIndex };
                   setSetupData(nextSetup);
                   
                   if (setupStep === 5) {
                      startGameWithData(nextSetup);
                   } else {
                     setSetupStep(prev => prev + 1);
                     setSetupFocusIndex(0); 
                   }
                 }
              } else if (gameState === 'story' && !errorMsg && hasReadFullText) {
                 if (currentChapter && currentChapter.choices?.length > 0) {
                   if (e.key === 'ArrowDown') setFocusedChoice(prev => Math.min(prev + 1, currentChapter.choices.length - 1));
                   else if (e.key === 'ArrowUp') setFocusedChoice(prev => Math.max(prev - 1, 0));
                   else handleChoice(currentChapter.choices[focusedChoice]);
                 }
              } else if (gameState === 'menu') {
                 if (e.key === 'Enter') {
                    setSetupStep(0); 
                    setSetupFocusIndex(0);
                    setGameState('setup');
                 }
              }
            };

            window.addEventListener('keydown', handleKeyDown, { passive: false });
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [gameState, setupStep, setupFocusIndex, currentChapter, focusedChoice, errorMsg, confirmDialog, setupData, hasReadFullText]);

          const startGameWithData = (finalSetup) => {
            setTurnCount(0);
            setCurrentPageIndex(0);
            setActiveDeathMessage("");
            setGameState('loading');
            setLoadingMsg("Summoning progressive Chapter 1...");
            setErrorMsg("");
            generateNextChapterOnDemand(0, finalSetup);
          };

          // --- IMMERSIVE PROGRESSIVE CHAPTER GENERATION ENGINE ---
          const generateNextChapterOnDemand = async (nextTurn, finalSetup = setupData) => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            setIsSpeaking(false);
            setHasReadFullText(false); // Lock the comprehension portal until read

            const char = CATEGORIES.characters[finalSetup.character];
            const vill = CATEGORIES.villains[finalSetup.villain];
            const sett = CATEGORIES.settings[finalSetup.setting];
            const plot = CATEGORIES.plots[finalSetup.plot];
            const dil = CATEGORIES.dilemmas[finalSetup.dilemma];

            const readingLevelWordTargets = [90, 300, 400, 500];
            const targetWords = readingLevelWordTargets[finalSetup.readingLevel] || 300;

            const getReadingLevelInstruction = (level) => {
              if (level === 0) return "Write like an early primary book. Sentences MUST be 3 to 5 words max. Use ONLY basic sight words (big, red, run, fast, see, cat). EXACTLY 90 words total. No complex vocabulary.";
              if (level === 1) return "Write for a standard primary grade. Use simple compound sentences. EXACTLY 300 words total.";
              if (level === 2) return "Write for a junior grade. Use descriptive words and standard formatting. EXACTLY 400 words total.";
              return "Write for an intermediate grade. Use highly advanced, dark, atmospheric, and spooky vocabulary. EXACTLY 500 words total.";
            };

            // Build accumulated story log to guarantee 100% linear story arc without repetitions
            let storyHistoryLog = storyHistory.map((h, idx) => `Chapter ${idx+1} Action Chosen: "${h.chosenAction}"`).join(". ");

            let promptText = `
              Generate Chapter ${nextTurn + 1} of 10.
              - Hero: ${char.name} (${char.desc})
              - Villain: ${vill.name} (${vill.desc})
              - Setting: ${sett.name} (${sett.desc})
              - Quest Objective: ${plot.name}
              - Danger Level: ${dil.name}
              
              LINEAR PLOT STAGE CHRONOLOGY:
              - Chapter 1: The Arrival and exploration of the entrance.
              - Chapter 2-4: Discovering initial secrets, solving mechanical puzzles.
              - Chapter 5-7: Facing a localized trap set by ${vill.name}.
              - Chapter 8-9: Escalating narrow escape, ascending to the final hall.
              - Chapter 10: The Grand Climax clashing with ${vill.name}.
              
              Turn Count context: This is Chapter ${nextTurn + 1} of 10.
              Session history choices so far: ${storyHistoryLog ? storyHistoryLog : "No previous choices. Introduce the setting."}
              
              STRICT NARRATIVE RULES:
              1. Continue the story linearly based on history. DO NOT repeat descriptions, vocabulary, or exact events from prior chapters. 
              2. Keep word length perfectly consistent with: ${getReadingLevelInstruction(finalSetup.readingLevel)}
              3. Create a reading comprehension question based strictly on this Chapter's text.
              4. Return 3 multiple choice options. One correct answer. Two incorrect choices that cause a funny, spooky GAME OVER with a unique 'gameOverMessage'.
            `;

            const systemInstruction = `You are an educational progressive CYOA story writer. You MUST output a single valid JSON block. Use SINGLE QUOTES (') inside strings. Do NOT repeat paragraphs. Schema: { "pages": ["paragraph 1", "paragraph 2", "paragraph 3"], "question": "Question?", "choices": [{"text":"", "isCorrect":true/false, "gameOverMessage":""}] }`;

            let success = false;
            let attempts = 0;

            while (attempts < 3 && !success) {
              attempts++;
              try {
                if (attempts > 1) await sleep(attempts * 2000); 

                const pollinationUrl = `${POLLINATIONS_TEXT_URL}${encodeURIComponent(promptText)}?model=openai&jsonMode=true&system=${encodeURIComponent(systemInstruction)}&seed=${Math.random()}`;
                const response = await fetch(pollinationUrl);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                
                let jsonText = await response.text();
                jsonText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const startIdx = jsonText.indexOf('{');
                const endIdx = jsonText.lastIndexOf('}');
                if (startIdx !== -1 && endIdx !== -1) {
                  jsonText = jsonText.substring(startIdx, endIdx + 1);
                } else {
                  throw new Error("Formatting Bounds Error");
                }
                
                const nodeData = JSON.parse(jsonText);
                
                let combinedStoryText = Array.isArray(nodeData.pages) ? nodeData.pages.join("\n\n") : (nodeData.storyText || "");
                let paddedText = padStoryTextToTarget(combinedStoryText, targetWords);
                let balancedPages = splitStoryIntoPages(paddedText, "", Math.ceil(targetWords / 3));

                let chQuestion = nodeData.question ? nodeData.question.trim() : "What is your next move?";
                let chChoices = nodeData.choices;
                if (!chChoices || !Array.isArray(chChoices) || chChoices.length < 3) {
                  chChoices = [
                    { text: "Move forward with great logic", isCorrect: true, isGameOver: false },
                    { text: "Take an uncalculated shortcut", isCorrect: false, isGameOver: true, gameOverMessage: `You took a wrong turn and ran into ${vill.name}'s snare!` },
                    { text: "Ignore your surroundings", isCorrect: false, isGameOver: true, gameOverMessage: "You became distracted and stepped through a loose trapdoor!" }
                  ];
                }

                setCurrentChapter({
                  pages: balancedPages,
                  question: chQuestion,
                  choices: chChoices.sort(() => Math.random() - 0.5)
                });

                setLoadingProgress(100);
                setTimeout(() => {
                  setGameState('story');
                  if (scrollRef.current) scrollRef.current.scrollTop = 0;
                }, 400);
                
                success = true;
                
              } catch (err) {
                console.warn(`Generation Attempt failed:`, err.message);
              }
            }

            if (!success) {
              console.warn("API failed. Booting local offline fallback progressive chapter...");
              try {
                const localChapters = generateLocalBook({ ...finalSetup, gameTheme });
                const localCh = localChapters[nextTurn];
                
                let fallbackPages = splitStoryIntoPages(localCh.pages, "", Math.ceil(targetWords / 3));
                setCurrentChapter({
                  pages: fallbackPages,
                  question: localCh.question,
                  choices: localCh.choices
                });
                
                setLoadingProgress(100);
                setTimeout(() => {
                  setGameState('story');
                  if (scrollRef.current) scrollRef.current.scrollTop = 0;
                }, 400);
              } catch (localErr) {
                setErrorMsg(`Critical Fallback Error: ${localErr.message}`);
                setGameState('story');
              }
            }
          };

          const handleChoice = (choice) => {
            if (choice.isGameOver || choice.isCorrect === false) {
              setActiveDeathMessage(choice.gameOverMessage || "You made a grave mistake!");
              setGameState('gameover');
            } else {
              setStoryHistory([...storyHistory, { chosenAction: choice.text }]);
              const nextTurn = turnCount + 1;
              setTurnCount(nextTurn);
              
              if (nextTurn >= 10) {
                 setGameState('victory');
              } else {
                 setGameState('loading');
                 setLoadingProgress(0);
                 setLoadingMsg(`Summoning progressive Chapter ${nextTurn + 1}...`);
                 generateNextChapterOnDemand(nextTurn);
              }
            }
          };

          const popBubble = (critId) => {
            playSynthNote(880, 'sine', 0.08, 0.4);
            playSynthNote(1200, 'sine', 0.05, 0.3);
            setCritters(prev => prev.filter(c => c.id !== critId));
          };

          const renderMenu = () => {
            const activeMenuImages = gameTheme === 'bubble' ? MENU_IMAGES_BUBBLE : MENU_IMAGES_VANIA;
            return (
              <div className={`flex flex-col items-center justify-center h-full text-center p-4 md:p-8 space-y-6 md:space-y-8 relative ${gameTheme === 'bubble' ? 'bg-[#001133]/40' : 'bg-[#1c0f0d]/40'}`}>
                <div className={`w-full max-w-2xl h-48 sm:h-56 md:h-64 border-4 bg-black overflow-hidden relative mb-2 ${gameTheme === 'bubble' ? 'border-[#00E5FF] music-border-bubble' : 'border-[#B71C1C] music-border-vania'}`}>
                   <img src={activeMenuImages[menuImgIndex]} className="w-full h-full object-cover transition-opacity duration-1000 ease-in-out" style={{ imageRendering: 'pixelated' }} alt="Retro Background" />
                   <div className={`absolute inset-0 mix-blend-color-burn ${gameTheme === 'bubble' ? 'bg-[#00e5ff]/25' : 'bg-[#E65100]/25'}`}></div>
                   <div className="absolute inset-0 bg-black/40"></div>
                   <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2 w-full">
                      <h1 className={`font-pixel text-lg sm:text-2xl md:text-3xl lg:text-4xl tracking-wider w-full text-center break-words leading-tight ${gameTheme === 'bubble' ? 'text-[#00E5FF] drop-shadow-[0_0_15px_rgba(0,229,255,1)]' : 'text-amber-500 drop-shadow-[0_0_15px_rgba(230,81,0,1)]'}`}>
                        ADVENTUREVANIA
                      </h1>
                      <p className={`font-terminal text-lg sm:text-xl md:text-2xl mt-2 font-bold ${gameTheme === 'bubble' ? 'text-[#FF4081] drop-shadow-[0_0_10px_rgba(255,64,129,1)]' : 'text-orange-400 drop-shadow-[0_0_10px_rgba(230,81,0,1)]'}`}>
                        {gameTheme === 'bubble' ? '🫧 Choose Your Own Narrative Quest 🫧' : '🦇 A Grade 3 Spooky Quest 🦇'}
                      </p>
                   </div>
                </div>

                {/* Theme Toggle Button Slider */}
                <div className="flex items-center gap-4 relative z-10">
                  <span className="font-pixel text-[8px] sm:text-[10px] text-orange-400">🦇 Original</span>
                  <button 
                    onClick={() => {
                      initAudioContext();
                      const nextTheme = gameTheme === 'vania' ? 'bubble' : 'vania';
                      setGameTheme(nextTheme);
                      setCurrentTrack(0);
                      playSynthNote(440, 'square', 0.2, 0.4);
                    }}
                    className={`w-16 h-8 rounded-full p-1 transition-colors duration-300 flex items-center ${gameTheme === 'bubble' ? 'bg-[#00E5FF]' : 'bg-[#B71C1C]'}`}
                  >
                    <div className={`w-6 h-6 rounded-full bg-white shadow-md transform transition-transform duration-300 flex items-center justify-center ${gameTheme === 'bubble' ? 'translate-x-8' : 'translate-x-0'}`}>
                      <span className="text-[10px]">{gameTheme === 'bubble' ? '🫧' : '😈'}</span>
                    </div>
                  </button>
                  <span className="font-pixel text-[8px] sm:text-[10px] text-[#00E5FF]">Bubble 🫧</span>
                </div>

                <div className="flex flex-col gap-4 md:gap-6 w-full max-w-md relative z-10">
                  <button 
                    className={`nes-btn animate-pulse text-xs sm:text-sm ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} 
                    onClick={() => { initAudioContext(); setSetupStep(0); setGameState('setup'); }}
                  >
                    ▶️ Press Enter to Start
                  </button>

                  <div className="flex flex-col gap-2 w-full text-left mt-2">
                      <label className={`font-pixel text-[8px] md:text-[10px] text-center ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                        Student Identification:
                      </label>
                      <input 
                        type="text" 
                        placeholder="Enter Player Name..." 
                        value={playerName} 
                        onChange={(e) => { setPlayerName(e.target.value); localStorage.setItem('adventurevania_player', e.target.value); }} 
                        className={`w-full bg-[#1c0f0d] border-2 text-[10px] text-center p-3 outline-none font-pixel ${gameTheme === 'bubble' ? 'border-[#00E5FF] text-[#00E5FF] focus:border-[#FF4081]' : 'border-red-950 text-orange-400 focus:border-orange-500'}`} 
                      />
                  </div>
                </div>
              </div>
            );
          };

          const renderSetup = () => {
            const currentDataList = getActiveCategoryList(setupStep);
            if (!currentDataList) return null;
            const currentKey = STEPS_KEYS[setupStep];

            return (
              <div className="flex flex-col h-full p-4 md:p-6 overflow-hidden bg-black/30">
                <div className="flex justify-between items-center mb-4 border-b-4 border-red-950 pb-2 shrink-0">
                  <h2 className={`font-pixel text-xs md:text-sm leading-relaxed ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                    {["Select Your Hero", "Choose the Villain", "Pick a Setting", "Select the Plot", "Choose a Dilemma", "Reading Difficulty"][setupStep]}
                  </h2>
                  <span className={`font-pixel text-[9px] ${gameTheme === 'bubble' ? 'text-[#FF4081]' : 'text-orange-500/70'}`}>Step {setupStep + 1}/6</span>
                </div>

                {/* Scroll Grid: Ensures all items are fully scrollable and visible */}
                <div className={`flex-grow overflow-y-auto min-h-0 pr-2 pb-4 ${gameTheme === 'bubble' ? 'scrollbar-bubble' : 'scrollbar-vania'}`}>
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 py-2">
                    {currentDataList.map((item, idx) => {
                      const isSelected = setupData[currentKey] === idx;
                      const isFocused = setupFocusIndex === idx;
                      return (
                        <div 
                          key={idx} 
                          onClick={() => { setSetupFocusIndex(idx); setSetupData({...setupData, [currentKey]: idx}); }} 
                          className={`p-3 cursor-pointer flex flex-col items-center text-center transition-all ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'} ${isFocused ? 'bg-amber-950 scale-105 shadow-[0_0_25px_rgba(0,229,255,0.4)]' : isSelected ? 'bg-red-950 border-red-500' : 'bg-black/40 border-stone-800 hover:bg-stone-900/60'}`} 
                          style={isFocused ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.15), 0 0 0 4px #00E5FF, 0 0 0 8px #000' } : isSelected ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.15), 0 0 0 4px #B71C1C, 0 0 0 8px #000' } : {}}
                        >
                          <div className="text-3xl mb-1">{item.icon}</div>
                          <h3 className="font-pixel text-[8px] md:text-[9px] text-white mb-1 leading-tight h-8 flex items-center justify-center">{item.name}</h3>
                          <p className="font-terminal text-orange-200/80 text-xs md:text-sm leading-tight hidden md:block">{item.desc}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="flex justify-between mt-4 pt-2 border-t-2 border-red-950 items-center shrink-0">
                  <div className="font-pixel text-[8px] text-orange-600/70 hidden md:block">Use Arrow Keys & Enter</div>
                  <div className="flex gap-4">
                    {setupStep > 0 ? (
                      <button className={`nes-btn ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => setSetupStep(setupStep - 1)}>
                        Back
                      </button>
                    ) : <div></div>}
                    {setupStep < 5 ? (
                      <button 
                        className={`nes-btn green ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} 
                        onClick={() => { 
                          setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                          setSetupStep(setupStep + 1); 
                          setSetupFocusIndex(0);
                        }}
                      >
                        Next
                      </button>
                    ) : (
                      <button className={`nes-btn green animate-pulse ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={startGame}>
                        Start Quest
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const renderLoading = () => (
            <div className={`flex flex-col h-full w-full ${gameTheme === 'bubble' ? 'bg-[#001133]' : 'bg-[#180907]'}`}>
              {/* Top/Middle Minigame */}
              <div className="flex-1 p-4 flex flex-col items-center justify-center bg-[#130807] overflow-hidden">
                <FlappyBatMinigame theme={gameTheme} />
              </div>
              
              {/* Bottom Progress Bar */}
              <div className="w-full p-6 flex flex-col items-center justify-center border-t-4 border-red-950 bg-stone-950 shrink-0">
                <h2 className={`font-pixel text-[10px] md:text-xs leading-relaxed text-center mb-1 ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-orange-400'}`}>
                  {loadingMsg}
                </h2>
                {/* Vetted Waiting Instruction Note */}
                <p className="font-terminal text-yellow-500 text-lg md:text-xl mb-4 text-center animate-pulse">
                  This could take several scary minutes.
                </p>
                <div className={`w-full max-w-md h-6 bg-black relative overflow-hidden ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                  <div className={`absolute top-0 left-0 h-full transition-all duration-500 ${gameTheme === 'bubble' ? 'bg-[#00E5FF]' : 'bg-orange-600'}`} style={{width: `${Math.min(loadingProgress, 99)}%`}}></div>
                </div>
                <p className="font-terminal text-xl text-orange-400 mt-2">{Math.floor(Math.min(loadingProgress, 99))}%</p>
              </div>
            </div>
          );

          const renderGameArea = () => {
            const ch = currentChapter;
            if (!ch && !errorMsg) return renderLoading();

            return (
              <div className="flex flex-col md:flex-row h-full w-full bg-[#180907] relative overflow-hidden">
                <div className="flex-1 flex flex-col relative h-full overflow-hidden order-2 md:order-1">
                  
                  {/* Status header */}
                  <div className={`flex justify-between items-center p-2 md:p-4 mb-0 shrink-0 z-10 ${gameTheme === 'bubble' ? 'bg-[#001133] pixel-border-bubble' : 'bg-[#2d140f] pixel-border-vania'}`}>
                    <div className={`font-pixel text-[10px] md:text-sm flex items-center gap-2 animate-pulse ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-amber-500'}`}>
                       🗺️ Chapter: {turnCount + 1}/10
                    </div>
                    <div className="flex items-center gap-2 md:gap-4">
                      <div className={`flex items-center gap-1 md:gap-2 bg-black px-1 md:px-2 py-1 mr-1 md:mr-2 ${gameTheme === 'bubble' ? 'music-border-bubble' : 'music-border-vania'}`}>
                        <span className="font-pixel text-[8px] text-gray-400">A</span>
                        <input type="range" min="14" max="24" value={textSize} onChange={(e) => setTextSize(parseInt(e.target.value))} className="w-16 md:w-20 cursor-pointer" />
                        <span className="font-pixel text-[12px] text-gray-400">A</span>
                      </div>
                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => { setConfirmDialog({ type: 'restart', message: "Are you sure you want to restart this adventure from the beginning?" }); }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">⏮️</span> <span className="hidden md:inline">Restart</span>
                      </button>
                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => { setConfirmDialog({ type: 'quit', message: "Are you sure you want to quit to the main menu?" }); }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">🔄</span> <span className="hidden md:inline">Quit</span>
                      </button>
                    </div>
                  </div>

                  {/* Left continuous scroll stories panel */}
                  <div 
                    ref={scrollRef}
                    onScroll={handleScroll}
                    className={`flex-grow overflow-y-auto px-4 md:px-8 pb-32 pt-4 ${gameTheme === 'bubble' ? 'scrollbar-bubble' : 'scrollbar-vania'}`}
                  >
                    {ch && (
                      <div className="animate-[fadeIn_0.5s_ease-in] space-y-6">
                        <div className={`p-4 md:p-6 relative bg-black ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                          <div className={`absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>
                          <div className={`absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 ${gameTheme === 'bubble' ? 'border-[#00E5FF]' : 'border-purple-600'}`}></div>

                          <div className="w-full space-y-6">
                             {/* Display all 3 pages progressively as a continuous layout scroll text */}
                             <InteractiveText text={ch.pages.join("\n\n") + (activeDeathMessage ? "\n\n" + activeDeathMessage : "")} textSize={textSize} />
                          </div>

                          <div className="mt-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4 border-t-2 border-dashed border-stone-800 pt-4">
                            <button 
                              onClick={() => handleReadAloud(ch.pages.join(". ") + (activeDeathMessage ? ". " + activeDeathMessage : ""))} 
                              className={`nes-btn shrink-0 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`}
                            >
                              {isSpeaking ? '⏹️ Stop Reading' : '🗣️ Read Aloud'}
                            </button>
                            <span className="font-pixel text-[8px] text-gray-500">📜 Scroll to the bottom to unlock!</span>
                          </div>
                        </div>
                      </div>
                    )}

                    {errorMsg && (
                      <div className="bg-[#5d120d] border-2 border-red-500 p-4 my-4 font-terminal text-xl text-white text-center flex flex-col gap-4">
                        <div>{errorMsg}</div>
                        <button className={`nes-btn mt-2 mx-auto ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => startGameWithData(setupData)}>Try Again</button>
                      </div>
                    )}
                    
                    {/* Locked/Unlocked Comprehension Question Section at the absolute bottom of stories panel */}
                    {ch && (
                      <div className="mt-8 pt-4 pb-20">
                        {!hasReadFullText ? (
                          <div className={`p-6 text-center border-4 border-dashed rounded-lg bg-black/80 animate-pulse ${gameTheme === 'bubble' ? 'border-[#00E5FF] text-[#00E5FF]' : 'border-red-900 text-red-500'}`}>
                            <span className="text-3xl block mb-2">🔒</span>
                            <span className="font-pixel text-[10px] leading-loose">Scroll to the very bottom above to unlock the comprehension challenge!</span>
                          </div>
                        ) : (
                          <div className={`p-6 relative bg-black border-4 transition-all duration-500 ${gameTheme === 'bubble' ? 'border-[#00E5FF] shadow-[0_0_15px_rgba(0,229,255,0.2)]' : 'border-purple-600 shadow-[0_0_15px_rgba(138,43,226,0.1)]'}`}>
                            <div className={`p-4 mb-6 border-l-4 ${gameTheme === 'bubble' ? 'bg-[#001133] border-[#FF4081]' : 'bg-purple-900 border-green-400'}`}>
                              <p className={`font-pixel text-[11px] leading-loose ${gameTheme === 'bubble' ? 'text-[#00E5FF]' : 'text-green-300'}`}>
                                <span className="text-yellow-400">CHALLENGE:</span> {ch.question}
                              </p>
                            </div>
                            
                            <p className="font-pixel text-[8px] text-gray-400 mb-3 text-center">What is your answer? (Arrows + Enter)</p>
                            <div className="flex flex-col gap-3 max-w-4xl mx-auto w-full">
                              {ch.choices?.map((choice, idx) => {
                                const isFocused = focusedChoice === idx;
                                return (
                                  <button 
                                    key={idx} 
                                    className={`nes-btn text-left flex justify-between items-center group py-3 transition-transform duration-100 ${isFocused ? 'bg-amber-950 ring-2 ring-orange-500 scale-[1.02]' : 'hover:bg-amber-950/40'} ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} 
                                    onClick={() => handleChoice(choice)} 
                                    onMouseEnter={() => setFocusedChoice(idx)}
                                  >
                                    <span className={`text-[10px] md:text-[11px] leading-relaxed pr-4 ${isFocused ? 'text-amber-300 font-bold' : ''}`}>{choice.text}</span>
                                    <span className={`${isFocused ? 'opacity-100 text-orange-500' : 'opacity-0'} shrink-0`}>▶</span>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    <div ref={endOfStoryRef} />
                  </div>
                </div>
                
                {/* RIGHT PANE - Custom procedural Sunset scene (Offline ready, zero AI delay!) */}
                <div className="w-full md:w-[40%] lg:w-[45%] h-64 md:h-full flex-shrink-0 border-b-4 md:border-b-0 md:border-l-4 border-red-950 relative order-1 md:order-2">
                    <SunsetPixelArt setting={setupData.setting} turn={turnCount} villain={setupData.villain} theme={gameTheme} />
                </div>
              </div>
            );
          };

          const renderAudioPlayer = () => {
             const activeTracks = gameTheme === 'bubble' ? BUBBLE_TRACKS : VANIA_TRACKS;
             return (
               <div className={`absolute top-2 right-2 md:top-4 md:right-4 z-50 bg-black p-2 md:p-3 flex flex-col gap-2 shadow-[0_4px_10px_rgba(0,0,0,0.8)] opacity-70 hover:opacity-100 transition-opacity ${gameTheme === 'bubble' ? 'music-border-bubble' : 'music-border-vania'}`}>
                  <div className="flex items-center gap-3 justify-between">
                    <button onClick={() => { initAudioContext(); if(isMuted) { startSynthEngine(); } setIsMuted(!isMuted); }} className="text-xl hover:scale-110 transition-transform focus:outline-none" title={isMuted ? "Unmute Music" : "Mute Music"}>
                      {isMuted ? '🔇' : '🔊'}
                    </button>
                    <input type="range" min="0" max="1" step="0.05" value={musicVolume} onChange={(e) => setMusicVolume(parseFloat(e.target.value))} className="w-20 md:w-24 cursor-pointer" />
                  </div>
                  <select className="bg-gray-950 text-orange-400 font-pixel text-[8px] p-1 border border-red-950 outline-none cursor-pointer" value={currentTrack} onChange={(e) => setCurrentTrack(parseInt(e.target.value))}>
                    {activeTracks.map((t, i) => <option key={i} value={i}>{t.name}</option>)}
                  </select>
               </div>
             );
          };

          return (
            <React.Fragment>
              <div className="crt fixed inset-0 z-50 pointer-events-none"></div>
              <div className="scanline fixed inset-0 z-40 pointer-events-none"></div>
              
              {/* Dynamic Animated Critters / Floaty Bubbles Layer */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {critters.map(crit => {
                  if (crit.isBubble) {
                    return (
                      <div 
                        key={crit.id} 
                        className="floating-bubble" 
                        style={crit.style} 
                        onClick={() => popBubble(crit.id)} 
                      />
                    );
                  }
                  if (gameTheme === 'bubble') {
                    return <RetroFairy key={crit.id} style={crit.style} />;
                  }
                  if (crit.isBat) return <RetroBat key={crit.id} style={crit.style} />;
                  return <div key={crit.id} className="critter font-pixel text-red-500" style={crit.style}>🕷️</div>;
                })}
              </div>

              {showLightning && <div className="lightning-overlay"></div>}
              {/* Shooting Star overlay for Bubble Theme */}
              {shootingStar && (
                <div 
                  className="shooting-star-animated pointer-events-none"
                  style={{ left: `${shootingStar.x}%` }}
                >
                  <svg viewBox="0 0 64 64" className="w-16 h-16">
                    <path d="M32 0 L36 24 L60 28 L36 32 L32 56 L28 32 L4 28 L28 24 Z" fill="#FFF" />
                    <path d="M32 8 L34 24 L50 28 L34 32 L32 48 L30 32 L14 28 L30 24 Z" fill="#00E5FF" />
                    <circle cx="20" cy="40" r="2" fill="#FF4081" opacity="0.8" />
                    <circle cx="15" cy="45" r="1.5" fill="#00E5FF" opacity="0.6" />
                    <circle cx="10" cy="50" r="1" fill="#FFF" opacity="0.4" />
                  </svg>
                </div>
              )}
              
              <div className="h-[100dvh] p-2 md:p-6 flex items-center justify-center relative">
                
                {confirmDialog && (
                  <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 p-4">
                    <div className={`p-6 md:p-8 text-center max-w-sm w-full bg-[#2d140f] ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                      <h3 className="font-pixel text-orange-400 mb-4 text-xl">Are you sure?</h3>
                      <p className="font-terminal text-xl text-white mb-8 leading-relaxed">
                        {confirmDialog.message}
                      </p>
                      <div className="flex gap-4 justify-center">
                        <button className={`nes-btn green flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => {
                          if (confirmDialog.type === 'restart') {
                            setCurrentPageIndex(0);
                            setTurnCount(0);
                            setStoryHistory([]);
                            setCorrectAnswers(0);
                            setTotalQuestions(0);
                            setActiveDeathMessage("");
                            setGameState('story');
                          } else if (confirmDialog.type === 'quit') {
                            setGameState('menu');
                            setActiveDeathMessage("");
                          }
                          setConfirmDialog(null);
                        }}>Yes</button>
                        <button className={`nes-btn red flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : 'nes-btn-vania'}`} onClick={() => setConfirmDialog(null)}>No</button>
                      </div>
                    </div>
                  </div>
                )}

                <div className={`w-full max-w-6xl h-full md:h-[95vh] bg-[#1c0f0d] relative overflow-hidden flex flex-col justify-between ${gameTheme === 'bubble' ? 'pixel-border-bubble bg-[#001133]/90' : 'pixel-border-vania'}`}>
                  {renderAudioPlayer()}

                  <div className="flex-grow h-full flex flex-col overflow-hidden relative">
                    {gameState === 'menu' && renderMenu()}
                    {gameState === 'setup' && renderSetup()}
                    {gameState === 'loading' && renderLoading()}
                    {(gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && renderGameArea()}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><Adventurevania /></ErrorBoundary>);
    </script>
</body>
</html>
