                osc.frequency.setValueAtTime(800, startTime);
                osc.frequency.exponentialRampToValueAtTime(1050, startTime + 0.1);
                osc.frequency.exponentialRampToValueAtTime(620, startTime + 0.35);
                
                gain.gain.setValueAtTime(0.0001, startTime);
                gain.gain.linearRampToValueAtTime(musicVolumeRef.current * 0.8, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.4);
                
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1200, startTime);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + 0.4);
              };

              // Double high chirp: "Kee-Kee!"
              chirp(now);
              chirp(now + 0.45);
            } catch(e) { console.warn("Seagull synth failed:", e); }
          }

          function triggerLightning() {
             setShowLightning(true);
             playThunderSynth();
             setTimeout(() => setShowLightning(false), 500);
             if (Math.random() > 0.5) {
               setTimeout(playRealisticWolfHowl, 1000);
             } else {
               setTimeout(playGhostHowl, 800);
              }
          }

          function triggerOceanWave() {
            playOceanWaveSynth();
            setTimeout(playSeagullSynth, 1200);
          }

          function triggerShootingStar() {
            const id = Date.now();
            const startX = Math.random() * 60 + 20; 
            const startY = Math.random() * 20 + 10; 
            setShootingStar({ id, x: startX, y: startY });
            
            playSynthNote(1200, 'sine', 0.1, 0.25);
            setTimeout(() => playSynthNote(1500, 'sine', 0.1, 0.15), 100);
            setTimeout(() => playSynthNote(1800, 'sine', 0.1, 0.2), 200);
            
            setTimeout(() => setShootingStar(null), 2200);
          }

          // --- TRIGGER GRADIENT WEATHER ON TURNS ---
          useEffect(() => {
            const ambientInterval = setInterval(() => {
              if (Math.random() > 0.6) {
                if (gameThemeRef.current === 'bubble') {
                  triggerShootingStar();
                } else if (gameThemeRef.current === 'adventure') {
                  triggerOceanWave();
                } else {
                  triggerLightning();
                }
              }
            }, 8000);
            return () => clearInterval(ambientInterval);
          }, [isMuted, musicVolume]);

          // --- INITIAL CRITTER FACTORY LOOPS ---
          useEffect(() => {
            let timeoutId;
            const spawnCritter = () => {
              const id = Date.now();
              const direction = Math.random() > 0.5 ? 'Right' : 'Left';
              const speed = Math.random() * 4 + 7; 
              
              if (gameThemeRef.current === 'bubble') {
                if (Math.random() > 0.5) {
                  // Bubble particle
                  const leftPercent = Math.floor(Math.random() * 80) + 10;
                  const sizePx = Math.floor(Math.random() * 24) + 16;
                  const animDuration = Math.floor(Math.random() * 4) + 5;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'bubble',
                    style: {
                      left: `${leftPercent}vw`,
                      width: `${sizePx}px`,
                      height: `${sizePx}px`,
                      animation: `floatBubble ${animDuration}s linear forwards`
                    }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, animDuration * 1000 + 500);
                } else {
                  // Fairy sprite
                  const top = Math.floor(Math.random() * 25) + 10;
                  const animation = `fairyFly${direction} ${speed}s ease-in-out forwards`;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'fairy',
                    style: { top: `${top}vh`, animation }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, speed * 1000 + 500);
                }
              } else if (gameThemeRef.current === 'adventure') {
                if (Math.random() > 0.5) {
                  // Gliding Seagull instead of bats!
                  const top = Math.floor(Math.random() * 30) + 5;
                  const animation = `fairyFly${direction} ${speed + 1}s ease-in-out forwards`;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'seagull',
                    style: { top: `${top}vh`, animation }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, (speed + 1) * 1000 + 500);
                } else {
                  // Drifting/Blowing Leaf falling down instead of spiders!
                  const leftPercent = Math.floor(Math.random() * 85) + 5;
                  const sizePx = Math.floor(Math.random() * 12) + 16;
                  const animDuration = Math.floor(Math.random() * 5) + 8;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'leaf',
                    style: {
                      left: `${leftPercent}vw`,
                      width: `${sizePx}px`,
                      height: `${sizePx}px`,
                      animation: `fallLeaf ${animDuration}s linear forwards`
                    }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, animDuration * 1000 + 500);
                }
              } else {
                // Creepy (Vania)
                if (Math.random() > 0.5) {
                  // Flapping Bat
                  const top = Math.floor(Math.random() * 35) + 5;
                  const animation = `batFly${direction} ${speed}s ease-in-out forwards`;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'bat',
                    style: { top: `${top}vh`, animation }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, speed * 1000 + 500);
                } else {
                  // Crawling spider
                  const top = Math.floor(Math.random() * 20) + 60;
                  const animation = `spiderCrawl${direction} ${speed + 5}s linear forwards`;
                  setCritters(prev => [...prev, {
                    id,
                    type: 'spider',
                    style: { top: `${top}vh`, animation }
                  }]);
                  setTimeout(() => { setCritters(prev => prev.filter(c => c.id !== id)); }, (speed + 5) * 1000 + 500);
                }
              }
              
              timeoutId = setTimeout(spawnCritter, Math.random() * 3500 + 2000);
            };
            
            timeoutId = setTimeout(spawnCritter, 1200);
            return () => clearTimeout(timeoutId);
          }, [gameTheme]);

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (document.activeElement.tagName === "INPUT" || confirmDialog !== null) return;

              if (gameState === 'setup') {
                 const currentDataList = getActiveCategoryList(setupStep, gameTheme);
                 if (!currentDataList) return;
                 const numOptions = currentDataList.length;

                 let nextIndex = setupFocusIndex;
                 if (e.key === 'ArrowRight') {
                   nextIndex = Math.min(setupFocusIndex + 1, numOptions - 1);
                   e.preventDefault();
                 } else if (e.key === 'ArrowLeft') {
                   nextIndex = Math.max(setupFocusIndex - 1, 0);
                   e.preventDefault();
                 } else if (e.key === 'ArrowDown') {
                   nextIndex = Math.min(setupFocusIndex + 5, numOptions - 1);
                   e.preventDefault();
                 } else if (e.key === 'ArrowUp') {
                   nextIndex = Math.max(setupFocusIndex - 5, 0);
                   e.preventDefault();
                 } else if (e.key === 'Enter') {
                   e.preventDefault();
                   const currentKey = STEPS_KEYS[setupStep];
                   const nextSetup = { ...setupData, [currentKey]: setupFocusIndex };
                   setSetupData(nextSetup);
                   
                   if (setupStep === 5) {
                      startGameWithData(nextSetup);
                   } else {
                     setSetupStep(prev => prev + 1);
                   }
                   return;
                 }

                 if (nextIndex !== setupFocusIndex) {
                   setSetupFocusIndex(nextIndex);
                   // Instantly sync value for keyboard arrow feedback
                   const currentKey = STEPS_KEYS[setupStep];
                   setSetupData(prev => ({ ...prev, [currentKey]: nextIndex }));
                 }
              } else if (gameState === 'story' && !errorMsg && hasReadFullText) {
                 const activeCh = fullBook[turnCount];
                 if (activeCh && activeCh.choices?.length > 0) {
                   if (e.key === 'ArrowDown') {
                     setFocusedChoice(prev => Math.min(prev + 1, activeCh.choices.length - 1));
                     e.preventDefault();
                   } else if (e.key === 'ArrowUp') {
                     setFocusedChoice(prev => Math.max(prev - 1, 0));
                     e.preventDefault();
                   } else if (e.key === 'Enter') {
                     e.preventDefault();
                     handleChoice(activeCh.choices[focusedChoice]);
                   }
                 }
              } else if (gameState === 'menu') {
                 if (e.key === 'Enter') {
                    e.preventDefault();
                    setSetupStep(0); 
                    setSetupFocusIndex(0);
                    setGameState('setup');
                 }
              }
            };

            const hackerChoiceEnter = (currentCh) => {
              if (!currentCh || !currentCh.choices || !currentCh.choices[focusedChoice]) return;
              handleChoice(currentCh.choices[focusedChoice]);
            };

            window.addEventListener('keydown', handleKeyDown, { passive: false });
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [gameState, setupStep, setupFocusIndex, fullBook, turnCount, focusedChoice, errorMsg, confirmDialog, setupData, hasReadFullText, gameTheme]);

          // --- KEYBOARD & SELECTION STYLE DETERMINATION FUNCTIONS ---
          const getBoxClasses = (isSelected, isFocused) => {
            if (isBubble) {
              if (isFocused) return "bg-[#FFC2D9]/30 border-[#FFC2D9] scale-105 text-[#C2185B] font-bold shadow-[0_0_15px_rgba(255,194,217,0.5)]";
              if (isSelected) return "bg-[#FFC2D9] border-[#FFC2D9] scale-105 text-[#C2185B] font-bold shadow-[0_0_15px_rgba(255,194,217,0.7)]";
              return "bg-white border-[#FFC2D9] text-[#0D47A1] hover:bg-[#FFF0F5] hover:text-[#C2185B]";
            } else if (isAdventure) {
              if (isFocused) return "bg-[#34D399]/30 border-[#D4AF37] scale-105 text-[#064E3B] font-bold shadow-[0_0_15px_rgba(52,211,153,0.5)] border-4";
              if (isSelected) return "bg-[#059669] border-[#D4AF37] scale-105 text-white font-bold shadow-[0_0_15px_rgba(5,150,105,0.7)] border-4";
              return "bg-[#F4ECD8] border-[#8D4F2A] text-[#3E2723] hover:bg-[#EEDFBE] hover:text-[#8D4F2A]";
            } else {
              if (isFocused) return "bg-[#D32F2F]/30 border-[#D32F2F] scale-105 text-white font-bold shadow-[0_0_15px_rgba(211,47,47,0.6)]";
              if (isSelected) return "bg-[#D32F2F] border-[#D32F2F] scale-105 text-white font-bold shadow-[0_0_15px_rgba(211,47,47,0.8)]";
              return "bg-black bg-opacity-80 border-stone-800 text-gray-300 hover:bg-stone-900 hover:text-white";
            }
          };

          const getDescClasses = (isSelected, isFocused) => {
            if (isBubble) {
              if (isFocused) return "text-[#C2185B]";
              if (isSelected) return "text-[#0D47A1] font-medium";
              return "text-[#0D47A1]/70";
            } else if (isAdventure) {
              if (isFocused) return "text-[#064E3B]/90";
              if (isSelected) return "text-white font-medium";
              return "text-[#3E2723]/75";
            } else {
              if (isFocused) return "text-yellow-200";
              if (isSelected) return "text-orange-100 font-medium";
              return "text-gray-400";
            }
          };

          const renderMenu = () => {
            const activeMenuImages = gameTheme === 'bubble' ? MENU_IMAGES_BUBBLE : (gameTheme === 'adventure' ? MENU_IMAGES_ADVENTURE : MENU_IMAGES_VANIA);
            
            let titleShadow = `text-[#FFE082] drop-shadow-[0_2px_8px_rgba(141,79,42,0.8)]`;
            let subStyle = `text-[#3E2723] drop-shadow-[0_1px_3px_rgba(255,255,255,0.6)]`;
            let borderStyle = `pixel-border-bubble border-[#A55120]`;

            if (gameTheme === 'bubble') {
              titleShadow = `text-[#C2185B] drop-shadow-[0_2px_10px_rgba(255,194,217,1)]`;
              subStyle = `text-[#0D47A1] drop-shadow-[0_1px_4px_rgba(255,255,255,1)]`;
              borderStyle = `pixel-border-bubble`;
            } else if (gameTheme === 'vania') {
              titleShadow = `text-amber-500 drop-shadow-[0_0_15px_rgba(230,81,0,1)]`;
              subStyle = `text-orange-400 drop-shadow-[0_0_10px_rgba(230,81,0,1)]`;
              borderStyle = `border-[#B71C1C] music-border-vania`;
            }

            return (
              <div className={`flex flex-col items-center justify-center h-full text-center p-4 md:p-8 space-y-6 md:space-y-8 relative ${isBubble ? 'bg-[#FFF9FA]' : (isAdventure ? 'bg-transparent' : 'bg-[#001133] bg-opacity-40')}`}>
                <div className={`w-full max-w-2xl h-48 sm:h-56 md:h-64 border-4 bg-black overflow-hidden relative mb-2 ${borderStyle}`}>
                   <img src={activeMenuImages[menuImgIndex]} className="w-full h-full object-cover transition-opacity duration-1000 ease-in-out" style={{ imageRendering: 'pixelated' }} alt="Retro Background" />
                   <div className={`absolute inset-0 mix-blend-color-burn ${isBubble ? 'bg-[#FFC2D9] bg-opacity-25' : (isAdventure ? 'bg-[#FF1744] bg-opacity-15' : 'bg-[#E65100] bg-opacity-25')}`}></div>
                   <div className="absolute inset-0 bg-black bg-opacity-40"></div>
                   <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2 w-full">
                      <h1 className={`font-pixel text-lg sm:text-2xl md:text-3xl lg:text-4xl tracking-wider w-full text-center break-words leading-tight ${titleShadow}`}>
                        ADVENTUREVANIA
                      </h1>
                      <p className={`font-terminal text-lg sm:text-xl md:text-2xl mt-2 font-bold ${subStyle}`}>
                        {isBubble ? '🧚 Choose Your Own Narrative Quest 🧚' : (isAdventure ? '🧭 A Retro-Style Reading Adventure 🧭' : 'A Choice-Driven Narrative Quest')}
                      </p>
                   </div>
                </div>

                {/* Theme Selector Toggle Block - Adventure theme is in the MIDDLE */}
                <div className="flex flex-wrap justify-center items-center gap-4 relative z-10 p-2 bg-black/10 rounded">
                  <button 
                    onClick={() => { initAudioContext(); setGameTheme('vania'); setCurrentTrack(0); playSynthNote(220, 'square', 0.15, 0.4); }}
                    className={`font-pixel text-[8px] md:text-[9px] px-3 py-2 border-2 ${gameTheme === 'vania' ? 'bg-[#B71C1C] border-[#D32F2F] text-white font-bold' : 'bg-transparent border-gray-400 text-gray-400 hover:text-red-500'}`}
                  >
                    👿 Creepy Crawly
                  </button>
                  <button 
                    onClick={() => { initAudioContext(); setGameTheme('adventure'); setCurrentTrack(0); playSynthNote(330, 'square', 0.15, 0.4); }}
                    className={`font-pixel text-[8px] md:text-[9px] px-3 py-2 border-2 ${gameTheme === 'adventure' ? 'bg-[#8D4F2A] border-[#D4AF37] text-white font-bold' : 'bg-transparent border-gray-400 text-gray-500 hover:text-[#8D4F2A]'}`}
                  >
                    🧭 Adventure
                  </button>
                  <button 
                    onClick={() => { initAudioContext(); setGameTheme('bubble'); setCurrentTrack(0); playSynthNote(440, 'square', 0.15, 0.4); }}
                    className={`font-pixel text-[8px] md:text-[9px] px-3 py-2 border-2 ${gameTheme === 'bubble' ? 'bg-[#FF80AB] border-[#FFC2D9] text-white font-bold' : 'bg-transparent border-gray-400 text-gray-500 hover:text-[#FF80AB]'}`}
                  >
                    🧚 Bubble Mode
                  </button>
                </div>

                <div className="flex flex-col gap-4 md:gap-6 w-full max-w-md relative z-10">
                  <button 
                    className={`nes-btn animate-pulse text-xs sm:text-sm ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} 
                    onClick={() => { initAudioContext(); setSetupStep(0); setSetupFocusIndex(0); setGameState('setup'); }}
                  >
                    ▶️ Press Enter to Start
                  </button>

                  <div className="flex flex-col gap-2 w-full text-left mt-2">
                      <label className={`font-pixel text-[8px] md:text-[10px] text-center ${isBubble ? 'text-[#0D47A1]' : (isAdventure ? 'text-[#3E2723]' : 'text-orange-400')}`}>
                        Student Identification:
                      </label>
                      <input 
                        type="text" 
                        placeholder="Enter Player Name..." 
                        value={playerName} 
                        onChange={(e) => { setPlayerName(e.target.value); localStorage.setItem('adventurevania_player', e.target.value); }} 
                        className={`w-full text-[10px] text-center p-3 outline-none font-pixel ${
                          isBubble 
                            ? 'bg-white border-2 border-[#FFC2D9] text-[#C2185B] focus:border-[#00E5FF]' 
                            : (isAdventure ? 'bg-[#F4ECD8] border-2 border-[#8D4F2A] text-[#3E2723] focus:border-[#D4AF37]' : 'bg-[#1c0f0d] border-2 border-red-950 text-orange-400 focus:border-orange-500')
                        }`} 
                      />
                  </div>
                </div>
              </div>
            );
          };

          const renderSetup = () => {
            const currentDataList = getActiveCategoryList(setupStep, gameTheme);
            if (!currentDataList) return null;
            const currentKey = STEPS_KEYS[setupStep];

            return (
              <div className={`flex flex-col h-full p-4 md:p-6 overflow-hidden ${gameTheme === 'bubble' ? 'bg-[#FFF9FA]' : (gameTheme === 'adventure' ? 'bg-transparent' : 'bg-black bg-opacity-30')}`}>
                <div className={`flex justify-between items-center mb-4 border-b-4 pb-2 shrink-0 ${gameTheme === 'bubble' ? 'border-[#FFC2D9]' : (gameTheme === 'adventure' ? 'border-[#D4AF37]' : 'border-red-950')}`}>
                  <h2 className={`font-pixel text-xs md:text-sm leading-relaxed ${gameTheme === 'bubble' ? 'text-[#C2185B]' : (gameTheme === 'adventure' ? 'text-[#3E2723]' : 'text-orange-400')}`}>
                    {["Select Your Hero", "Choose the Villain", "Pick a Setting", "Select the Plot", "Choose a Dilemma", "Reading Difficulty"][setupStep]}
                  </h2>
                  <span className={`font-pixel text-[9px] ${gameTheme === 'bubble' ? 'text-[#0D47A1]' : (gameTheme === 'adventure' ? 'text-white' : 'text-orange-500/70' || "")}`}>Step {setupStep + 1}/6</span>
                </div>

                {/* Setup scroll containers with horizontal px-4 cushion padding blocks */}
                <div className={`flex-grow overflow-y-auto min-h-0 px-4 pb-8 overflow-visible ${gameTheme === 'bubble' ? 'scrollbar-bubble' : (gameTheme === 'adventure' ? 'scrollbar-adventure' : 'scrollbar-vania')}`}>
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 py-2 overflow-visible">
                    {currentDataList.map((item, idx) => {
                      const isSelected = setupData[currentKey] === idx;
                      const isFocused = setupFocusIndex === idx;
                      return (
                        <div 
                          key={idx} 
                          onClick={() => { setSetupFocusIndex(idx); setSetupData({...setupData, [currentKey]: idx}); }} 
                          className={`p-3 cursor-pointer flex flex-col items-center text-center transition-all border-4 ${gameTheme === 'bubble' ? 'pixel-border-bubble' : (gameTheme === 'adventure' ? 'pixel-border-bubble' : 'pixel-border-vania')} ${getBoxClasses(isSelected, isFocused)}`}
                        >
                          <div className="text-3xl mb-1">{item.icon}</div>
                          <h3 className={`font-pixel text-[8px] md:text-[9px] mb-1 leading-tight h-8 flex items-center justify-center ${isSelected || isFocused ? (isBubble ? 'text-[#C2185B] font-bold' : (isAdventure ? 'text-white font-bold' : 'text-yellow-300 font-bold')) : (isBubble ? 'text-[#0D47A1]' : (isAdventure ? 'text-[#3E2723]' : 'text-white'))}`}>{item.name}</h3>
                          <p className={`font-terminal text-xs md:text-sm leading-tight hidden md:block ${getDescClasses(isSelected, isFocused)}`}>{item.desc}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="flex justify-between mt-4 pt-2 border-t-2 border-red-950 items-center shrink-0">
                  <div className="flex gap-4">
                    <button className={`nes-btn ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => {
                      setSetupStep(0);
                      setSetupFocusIndex(0);
                      setGameState('menu');
                    }}>
                      Main Menu
                    </button>
                    {setupStep > 0 && (
                      <button className={`nes-btn ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => setSetupStep(setupStep - 1)}>
                        Back
                      </button>
                    )}
                  </div>
                  
                  {setupStep < 5 ? (
                    <button className={`nes-btn green ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => { 
                      setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                      setSetupStep(setupStep + 1); 
                      setSetupFocusIndex(0);
                    }}>
                      Next 
                    </button>
                  ) : (
                    <button className={`nes-btn green animate-pulse ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={startGame}>
                      Start Quest
                    </button>
                  )}
                </div>
              </div>
            );
          };

          const renderGameArea = () => {
            const ch = fullBook[turnCount];
            if (!ch && !errorMsg) return renderLoading();

            const chUnlocked = !ch || !ch.missingWords || ch.missingWords.length === 0 || ch.missingWords.every((word, i) => currentBlanks[i]?.toLowerCase().trim() === word.toLowerCase().trim() && word !== "");

            return (
              <div className={`flex flex-col md:flex-row h-full w-full relative overflow-hidden ${gameTheme === 'bubble' ? 'bg-[#FFF9FA]' : (gameTheme === 'adventure' ? 'bg-transparent' : 'bg-[#180907]')}`}>
                {/* SUCCESS OVERLAY ("You've chosen wisely!") */}
                {gameState === 'success' && (
                  <div className="absolute inset-0 bg-black bg-opacity-60 backdrop-blur-xs z-[100] flex items-center justify-center p-4 transition-all duration-300">
                    <div className={`p-6 md:p-8 text-center max-w-sm w-full bg-[#1b5e20] bg-opacity-95 ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                       <h3 className="font-pixel text-yellow-300 mb-4 text-sm md:text-lg animate-bounce">
                         ✨ SUCCESS ✨
                       </h3>
                       <p className="font-terminal text-lg md:text-xl text-white mb-8 leading-relaxed">
                         You've chosen wisely!
                       </p>
                       <div className="flex justify-center">
                         <button className={`nes-btn green w-full ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} 
                           onClick={continueToNextChapter}>
                           Continue
                         </button>
                       </div>
                    </div>
                  </div>
                )}

                {/* GAME OVER OVERLAY */}
                {gameState === 'gameover' && (
                  <div className="absolute inset-0 bg-black bg-opacity-60 backdrop-blur-xs z-[100] flex items-center justify-center p-4 transition-all duration-300">
                    <div className={`p-6 md:p-8 text-center max-w-md w-full bg-[#2d140f] bg-opacity-95 border-4 ${gameTheme === 'bubble' ? 'border-[#FF80AB] shadow-[0_0_15px_rgba(255,128,171,0.4)]' : 'border-[#B71C1C] shadow-[0_0_15px_rgba(230,81,0,0.4)]'}`}>
                       <h3 className="font-pixel text-red-500 mb-4 text-xs md:text-sm flex items-center justify-center gap-2 animate-bounce">
                         <span>💀</span> GAME OVER <span>💀</span>
                       </h3>
                       <p className="font-terminal text-lg md:text-xl text-gray-200 mb-8 leading-relaxed whitespace-pre-wrap">
                         {activeDeathMessage}
                       </p>
                       <div className="flex flex-col gap-4 justify-center">
                         <button className={`nes-btn green w-full ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} 
                           onClick={() => { 
                             setGameState('story'); 
                             setActiveDeathMessage(""); 
                           }}>
                           Retry
                         </button>
                         <button className={`nes-btn red w-full ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} 
                           onClick={() => { 
                             setGameState('menu'); 
                             setActiveDeathMessage(""); 
                           }}>
                           Menu
                         </button>
                       </div>
                    </div>
                  </div>
                )}

                {/* VICTORY OVERLAY */}
                {gameState === 'victory' && (
                  <div className="absolute inset-0 bg-black bg-opacity-60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-all duration-300">
                    <div className={`p-6 md:p-8 text-center max-sm w-full bg-[#1b5e20] bg-opacity-95 border-4 ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                       <h2 className="font-pixel text-xl md:text-2xl text-yellow-400 mb-6 flex items-center justify-center gap-4 animate-bounce">
                         🏆 VICTORY! 🏆
                       </h2>
                       <p className="font-terminal text-xl text-white mb-6">You solved the mysteries and conquered Adventurevania!</p>
                       <button className={`nes-btn w-full ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => setGameState('menu')}>Play Again</button>
                    </div>
                  </div>
                )}

                {/* QUIT CONFIRMATION DIALOG */}
                {confirmDialog && (
                  <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-80 p-4">
                    <div className={`p-6 md:p-8 text-center max-w-sm w-full bg-[#2d140f] ${gameTheme === 'bubble' ? 'pixel-border-bubble' : 'pixel-border-vania'}`}>
                      <h3 className="font-pixel text-orange-400 mb-4 text-xl">Are you sure?</h3>
                      <p className="font-terminal text-xl text-white mb-8 leading-relaxed">
                        {confirmDialog.message}
                      </p>
                      <div className="flex gap-4 justify-center">
                        <button className={`nes-btn green flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => {
                          if (confirmDialog.type === 'restart') {
                            restartAdventure();
                          } else if (confirmDialog.type === 'quit') {
                            setGameState('menu');
                            setActiveDeathMessage("");
                          }
                          setConfirmDialog(null);
                        }}>Yes</button>
                        <button className={`nes-btn red flex-1 ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => setConfirmDialog(null)}>No</button>
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex-1 flex flex-col relative h-full overflow-hidden order-2 md:order-1">
                  
                  {/* Floating Absolute Header Bar */}
                  <div className={`absolute top-0 left-0 right-0 z-30 flex justify-between items-center p-2 md:p-4 shrink-0 shadow-lg backdrop-blur-md border-b-4 ${isBubble ? 'bg-[#FFF9FA]/90 border-[#FFC2D9]' : (isAdventure ? 'bg-[#F4ECD8]/90 border-[#8D4F2A]' : 'bg-[#2d140f]/90 border-[#B71C1C]')}`}>
                    <div className={`font-pixel text-[10px] md:text-sm flex items-center gap-4 ${gameTheme === 'bubble' ? 'text-[#C2185B]' : (gameTheme === 'adventure' ? 'text-[#8D4F2A]' : 'text-amber-500')}`}>
                       <span className="animate-pulse">🗺️ Chapter: {turnCount + 1}/10</span>
                       <button onClick={handleReadAloudOuter} className={`font-pixel text-[10px] border-l-2 pl-4 ${gameTheme === 'bubble' ? 'text-[#0D47A1] border-[#FFC2D9] hover:text-[#C2185B]' : (gameTheme === 'adventure' ? 'text-[#8D4F2A] border-[#8D4F2A] hover:text-[#3E2723]' : 'text-gray-300 border-gray-700 hover:text-white')}`} title="Read Aloud">
                         {isSpeaking ? '⏹️ Stop' : '🗣️ Listen'}
                       </button>
                    </div>
                    <div className="flex items-center gap-2 md:gap-4">
                      <button className={`nes-btn hidden md:block text-[8px] md:text-[10px] px-2 py-1 ${isBubble ? 'nes-btn-bubble' : (isAdventure ? 'nes-btn-adventure' : 'nes-btn-vania')}`} onClick={() => { setConfirmDialog({ type: 'quit', message: "Are you sure you want to quit to the main menu?" }); }}>
                        Menu
                      </button>
                      <div className={`flex items-center gap-1 md:gap-2 px-1 md:px-2 py-1 mr-1 md:mr-2 border-2 ${isBubble ? 'bg-white border-[#FFC2D9]' : (isAdventure ? 'bg-[#F4ECD8] border-[#8D4F2A]' : 'bg-black border-purple-800')}`}>
                        <span className="font-pixel text-[8px] text-gray-400">A</span>
                        <input type="range" min="14" max="24" value={textSize} onChange={(e) => setTextSize(parseInt(e.target.value))} className="w-16 md:w-20 cursor-pointer" />
                        <span className="font-pixel text-[12px] text-gray-400">A</span>
                      </div>
                      <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => { setConfirmDialog({ type: 'restart', message: "Are you sure you want to restart this adventure from the beginning?" }); }}>
                        <span className="text-xl md:text-2xl drop-shadow-md">⏮️</span>
                      </button>
                    </div>
                  </div>

                  {/* Left continuous scroll stories panel with Top Padding to clear floating menu */}
                  <div 
                    ref={scrollRef}
                    onScroll={handleScroll}
                    className={`flex-grow overflow-y-auto px-4 md:px-8 pb-32 pt-24 ${gameTheme === 'bubble' ? 'scrollbar-bubble' : (gameTheme === 'adventure' ? 'scrollbar-adventure' : 'scrollbar-vania')}`}
                  >
                    {fullBook.map((chapter, idx) => {
                      const isPast = idx < turnCount;
                      const isCurrent = idx === turnCount;
                      const isFuture = idx > turnCount;
                      
                      return (
                        <div key={idx} className={`space-y-6 mb-12 relative transition-all duration-1000 ${isFuture ? 'opacity-30 blur-sm pointer-events-none select-none h-48 overflow-hidden' : ''}`} ref={isCurrent ? activeChapterRef : null}>
                          <div className={`p-4 md:p-6 relative border-4 ${gameTheme === 'bubble' ? 'bg-white pixel-border-bubble' : (gameTheme === 'adventure' ? 'bg-[#EFEBE9] border-[#8D4F2A]' : 'bg-black pixel-border-vania')} ${isPast ? 'opacity-60 grayscale-[30%]' : ''}`}>
                            <div className={`absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 ${isAdventure ? 'border-[#D4AF37]' : 'border-purple-600'}`}></div>
                            <div className={`absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 ${isAdventure ? 'border-[#D4AF37]' : 'border-purple-600'}`}></div>
                            <div className={`absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 ${isAdventure ? 'border-[#D4AF37]' : 'border-purple-600'}`}></div>
                            <div className={`absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 ${isAdventure ? 'border-[#D4AF37]' : 'border-purple-600'}`}></div>

                            <div className="w-full">
                              <window.ClozeTextChapter 
                                pages={chapter.pages} 
                                missingWords={chapter.missingWords || []} 
                                isCurrent={isCurrent} 
                                isHistorical={isPast} 
                                currentBlanks={currentBlanks} 
                                setCurrentBlanks={setCurrentBlanks} 
                                textSize={textSize} 
                                gameTheme={gameTheme} 
                              />
                            </div>
                          </div>
                          
                          {/* CYOA Question & Choices Rendering */}
                          {isCurrent && (
                            <div className="mt-8 pt-4 pb-12">
                              {!chUnlocked ? (
                                <div className={`p-6 text-center border-4 border-dashed rounded-lg bg-opacity-80 animate-pulse ${gameTheme === 'bubble' ? 'border-[#FF80AB] bg-white text-[#C2185B]' : (gameTheme === 'adventure' ? 'border-[#8D4F2A] bg-white text-[#3E2723]' : 'bg-black border-red-900 text-red-500')}`}>
                                  <span className="text-3xl block mb-2">🔒</span>
                                  <span className="font-pixel text-[10px] leading-loose">Fill in the blanks in the text above to unlock the challenge!</span>
                                </div>
                              ) : (
                                <div className={`p-6 relative border-4 transition-all duration-500 ${gameTheme === 'bubble' ? 'bg-white border-[#FFC2D9] shadow-[0_0_15px_rgba(255,194,217,0.2)]' : (gameTheme === 'adventure' ? 'bg-white border-[#8D4F2A] shadow-[0_0_15px_rgba(141,79,42,0.1)]' : 'bg-black border-purple-600 shadow-[0_0_15px_rgba(138,43,226,0.1)]')}`}>
                                  <div className={`p-4 mb-6 border-l-4 ${gameTheme === 'bubble' ? 'bg-[#FFF3F8] border-[#FF80AB]' : (gameTheme === 'adventure' ? 'bg-[#F4ECD8] border-[#8D4F2A]' : 'bg-purple-900 border-green-400')}`}>
                                    <p className={`font-pixel text-[11px] leading-loose ${gameTheme === 'bubble' ? 'text-[#0D47A1]' : (gameTheme === 'adventure' ? 'text-[#3E2723]' : 'text-green-300')}`}>
                                      <span className="text-yellow-400">CHALLENGE:</span> {chapter.question}
                                    </p>
                                  </div>
                                  
                                  <p className={`font-pixel text-[8px] mb-3 text-center ${gameTheme === 'bubble' ? 'text-gray-500' : (gameTheme === 'adventure' ? 'text-gray-600' : 'text-gray-400')}`}>What is your answer? (Arrows + Enter)</p>
                                  <div className="flex flex-col gap-3 max-w-4xl mx-auto w-full">
                                    {chapter.choices?.map((choice, cIdx) => {
                                      const isFocused = focusedChoice === cIdx;
                                      return (
                                        <button 
                                          key={cIdx} 
                                          className={`nes-btn text-left flex justify-between items-center group py-3 transition-transform duration-100 ${isFocused ? 'bg-[#059669] text-white ring-2 ring-orange-500 scale-[1.02]' : 'hover:bg-[#059669] hover:text-white bg-opacity-40'} ${gameTheme === 'bubble' ? 'nes-btn-bubble' : (gameTheme === 'adventure' ? 'nes-btn-adventure' : 'nes-btn-vania')}`} 
                                          onClick={() => handleChoice(choice)} 
                                          onMouseEnter={() => setFocusedChoice(cIdx)}
                                        >
                                          <span className={`text-[10px] md:text-[11px] leading-relaxed pr-4 ${isFocused ? 'text-yellow-300 font-bold' : ''}`}>{choice.text}</span>
                                          <span className={`${isFocused ? 'opacity-100 text-orange-500' : 'opacity-0'} shrink-0`}>▶</span>
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}

                          {/* Cloud Mask over Future Chapters */}
                          {isFuture && (
                            <div className="absolute inset-0 flex items-center justify-center z-20">
                              <div className={`p-6 text-center border-4 rounded-lg bg-opacity-95 ${gameTheme === 'bubble' ? 'border-[#FFC2D9] bg-white text-[#C2185B]' : (gameTheme === 'adventure' ? 'border-[#8D4F2A] bg-white text-[#3E2723]' : 'border-purple-600 bg-black text-purple-400')}`}>
                                <span className="text-4xl block mb-2">🔒</span>
                                <span className="font-pixel text-[12px]">LOCKED</span>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}

                    <div ref={endOfStoryRef} />
                  </div>
                </div>
                
                {/* RIGHT PANE - High Fidelity Pollinations Generated Image */}
                <div className={`w-full md:w-[40%] lg:w-[45%] h-64 md:h-full flex-shrink-0 border-b-4 md:border-b-0 md:border-l-4 relative order-1 md:order-2 bg-black overflow-hidden ${isBubble ? 'border-[#FFC2D9]' : (isAdventure ? 'border-[#D4AF37]' : 'border-purple-900')}`}>
                  {fullBook[turnCount] && fullBook[turnCount].imagePrompt ? (
                    <img 
                      src={`https://image.pollinations.ai/prompt/${encodeURIComponent(fullBook[turnCount].imagePrompt + " highly detailed 8-bit pixel art retro video game screenshot")}?width=600&height=1000&nologo=true&seed=${turnCount + (isBubble ? 100 : (isAdventure ? 200 : 0))}`} 
                      alt="Scene illustration" 
                      className="w-full h-full object-cover relative z-10"
                      style={{ imageRendering: 'pixelated' }}
                    />
                  ) : (
                    <SunsetPixelArt setting={setupData.setting} turn={turnCount} villain={setupData.villain} theme={gameTheme} />
                  )}
                  <div className="absolute inset-0 bg-black bg-opacity-20 pointer-events-none z-20"></div>
                </div>
              </div>
            );
          };

          const renderAudioPlayer = () => {
             const activeTracks = gameTheme === 'bubble' ? BUBBLE_TRACKS : (gameTheme === 'adventure' ? ADVENTURE_TRACKS : VANIA_TRACKS);
             return (
               <div className={`absolute top-2 right-2 md:top-4 md:right-4 z-50 bg-black p-2 md:p-3 flex flex-col gap-2 shadow-[0_4px_10px_rgba(0,0,0,0.8)] opacity-70 hover:opacity-100 transition-opacity ${gameTheme === 'bubble' ? 'music-border-bubble bg-white' : (gameTheme === 'adventure' ? 'music-border-bubble bg-[#F4ECD8] border-[#8D4F2A]' : 'music-border-vania')}`}>
                  <div className="flex items-center gap-3 justify-between">
                    <button onClick={toggleMute} className="text-xl hover:scale-110 transition-transform focus:outline-none" title={isMuted ? "Unmute Music" : "Mute Music"}>
                      {isMuted ? '🔇' : '🔊'}
                    </button>
                    <input type="range" min="0" max="1" step="0.05" value={musicVolume} onChange={(e) => setMusicVolume(parseFloat(e.target.value))} className="w-20 md:w-24 cursor-pointer" />
                  </div>
                  <select className={`bg-gray-950 text-orange-400 font-pixel text-[8px] p-1 border border-red-950 outline-none cursor-pointer ${gameTheme === 'bubble' ? 'bg-white text-[#C2185B] border-[#FFC2D9]' : (gameTheme === 'adventure' ? 'bg-[#F4ECD8] text-[#3E2723] border-[#8D4F2A]' : '')}`} value={currentTrack} onChange={(e) => setCurrentTrack(parseInt(e.target.value))}>
                    {activeTracks.map((t, i) => <option key={i} value={i}>{t.name}</option>)}
                  </select>
               </div>
             );
          };

          return (
            <React.Fragment>
              <div className="crt fixed inset-0 z-50 pointer-events-none"></div>
              <div className="scanline fixed inset-0 z-40 pointer-events-none"></div>
              
              {/* Dynamic Animated Critters / Floaty Bubbles Layer */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {critters.map(crit => {
                  if (crit.type === 'bubble') {
                    return (
                      <div 
                        key={crit.id} 
                        className="floating-bubble" 
                        style={crit.style} 
                        onClick={() => popBubble(crit.id)} 
                      />
                    );
                  }
                  if (crit.type === 'fairy') {
                    return <RetroFairy key={crit.id} style={crit.style} />;
                  }
                  if (crit.type === 'bat') {
                    return <RetroBat key={crit.id} style={crit.style} />;
                  }
                  if (crit.type === 'seagull') {
                    return <RetroSeagull key={crit.id} style={crit.style} />;
                  }
                  if (crit.type === 'leaf') {
                    return <RetroLeaf key={crit.id} style={crit.style} />;
                  }
                  if (crit.type === 'spider') {
                    return <div key={crit.id} className="critter font-pixel text-red-500 text-lg" style={crit.style}>🕷️</div>;
                  }
                  return null;
                })}
              </div>

              {showLightning && <div className="lightning-overlay"></div>}
              {shootingStar && (
                <div 
                  className="shooting-star-animated pointer-events-none"
                  style={{ left: `${shootingStar.x}%` }}
                >
                  <svg viewBox="0 0 64 64" className="w-16 h-16">
                    <path d="M32 0 L36 24 L60 28 L36 32 L32 56 L28 32 L4 28 L28 24 Z" fill="#FFF" />
                    <path d="M32 8 L34 24 L50 28 L34 32 L32 48 L30 32 L14 28 L30 24 Z" fill="#00E5FF" />
                    <circle cx="20" cy="40" r="2" fill="#FF4081" opacity="0.8" />
                    <circle cx="15" cy="45" r="1.5" fill="#00E5FF" opacity="0.6" />
                    <circle cx="10" cy="50" r="1" fill="#FFF" opacity="0.4" />
                  </svg>
                </div>
              )}
              
              <div className="h-[100dvh] p-2 md:p-6 flex items-center justify-center relative">
                
                <div 
                  className={`w-full max-w-6xl h-full md:h-[95vh] relative overflow-hidden flex flex-col justify-between ${gameTheme === 'bubble' ? 'pixel-border-bubble bg-[#FFF9FA] bg-opacity-95' : (gameTheme === 'adventure' ? 'pixel-border-bubble border-[#D4AF37]' : 'pixel-border-vania')}`}
                  style={getAppBackgroundStyle()}
                >
                  {renderAudioPlayer()}

                  <div className="flex-grow h-full flex flex-col overflow-hidden relative">
                    {gameState === 'menu' && renderMenu()}
                    {gameState === 'setup' && renderSetup()}
                    {gameState === 'loading' && renderLoading()}
                    {(['story', 'success', 'gameover', 'victory'].includes(gameState)) && renderGameArea()}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }
        window.App = App;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
