<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventurevania - Choose Your Own Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat Bundles (Stable Globals) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
      
      .font-pixel { font-family: 'Press Start 2P', cursive; }
      .font-terminal { font-family: 'VT323', monospace; }
      
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.6),
          inset 4px 4px 0px 0px rgba(255,255,255,0.15),
          0 0 0 4px #D32F2F,
          0 0 0 8px #000;
      }

      .music-border {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.15),
          0 0 0 2px #E65100,
          0 0 0 4px #000;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(230,81,0,0.1) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.15;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 235, 204, 0); }
        10% { background-color: rgba(255, 240, 217, 0.7); }
        20% { background-color: rgba(255, 235, 204, 0); }
        35% { background-color: rgba(255, 240, 217, 0.5); }
        45% { background-color: rgba(255, 235, 204, 0); }
        100% { background-color: rgba(255, 235, 204, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.7s ease-out;
      }

      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        background-color: #B71C1C;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.25);
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
        box-shadow: 
          inset 4px 4px 0px 0px rgba(0,0,0,0.5),
          inset -4px -4px 0px 0px rgba(255,255,255,0.25);
      }
      .nes-btn.green { background-color: #E65100; color: #fff; }
      .nes-btn.red { background-color: #3e2723; color: #ffab91; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #1a0f0d; border-left: 2px solid #E65100; }
      ::-webkit-scrollbar-thumb { background: #B71C1C; border: 2px solid #000; }
      
      body { 
        background: linear-gradient(135deg, #180907 0%, #2D140F 40%, #4D1A0F 75%, #180907 100%); 
        margin: 0; 
        overflow-x: hidden; 
      }
      
      input[type=range] { accent-color: #E65100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GLOBAL ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMessage: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMessage: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("React Crash:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-[#180907] p-8 text-center border-4 border-red-600">
                  <h1 className="font-pixel text-4xl text-red-500 mb-6">SYSTEM CRASH</h1>
                  <p className="font-terminal text-2xl text-white mb-6">A magical anomaly broke the timeline:</p>
                  <div className="bg-black p-4 text-red-400 font-terminal text-xl pixel-border w-full max-w-2xl break-words">
                    {this.state.errorMessage}
                  </div>
                  <button className="nes-btn green mt-8" onClick={() => window.location.reload()}>Reboot System</button>
                </div>
              );
            }
            return this.props.children; 
          }
        }

        // --- CONFIGURATION & CONSTANTS ---
        const POLLINATIONS_TEXT_URL = "https://text.pollinations.ai/";
        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx0V7hWS2O4mjqtII6sW3NvWXE927uhvjXtIKrAe1V8R9SmMDp2QhUwEaC1HP_N4q2XDQ/exec"; 

        const MENU_IMAGES = [
          "https://image.pollinations.ai/prompt/dracula%20castle%20exterior%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20spooky%20night%20blood%20moon?width=600&height=300&nologo=true&seed=1",
          "https://image.pollinations.ai/prompt/creepy%20haunted%20graveyard%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20spooky%20lightning?width=600&height=300&nologo=true&seed=2",
          "https://image.pollinations.ai/prompt/dark%20dungeon%20interior%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20torches%20skeletons?width=600&height=300&nologo=true&seed=3"
        ];

        const SYNTH_TRACKS = [
          {
            name: "Simon's Theme", tempo: 145,
            melody: [
              { note: "E4", dur: 2 }, { note: "A4", dur: 2 }, { note: "C5", dur: 2 }, { note: "B4", dur: 2 },
              { note: "A4", dur: 4 }, { note: "E4", dur: 4 },
              { note: "F4", dur: 2 }, { note: "A4", dur: 2 }, { note: "D5", dur: 2 }, { note: "C5", dur: 2 },
              { note: "B4", dur: 8 }
            ],
            bass: ["A2", "C2", "D2", "E2"]
          },
          {
            name: "Creepy Crawly", tempo: 140,
            melody: [
              { note: "A4", dur: 2 }, { note: "B4", dur: 2 }, { note: "C5", dur: 4 }, { note: "B4", dur: 2 }, { note: "A4", dur: 2 },
              { note: "G#4", dur: 4 }, { note: "E4", dur: 4 }, { note: "A4", dur: 2 }, { note: "B4", dur: 2 }, 
              { note: "C5", dur: 4 }, { note: "D5", dur: 4 }, { note: "E5", dur: 8 }
            ],
            bass: ["A2", "E2", "F2", "G2"]
          }
        ];

        const NOTE_FREQ = {
          "C2": 65.41, "D2": 73.42, "E2": 82.41, "F2": 87.31, "G2": 98.00, "A2": 110.00,
          "D4": 293.66, "E4": 329.63, "F4": 349.23, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "B4": 493.88,
          "C5": 523.25, "D5": 587.33, "E5": 659.25, "F5": 698.46, "G5": 783.99, "A5": 880.00
        };

        const CATEGORIES = {
          characters: [
            { name: "The Mathlete", icon: "⚡", desc: "Calculates at the speed of light!" },
            { name: "Word Weaver", icon: "📖", desc: "Casts spells using vocabulary." },
            { name: "Eco-Ranger", icon: "🌿", desc: "Controls plants and knows nature." },
            { name: "Time Traveler", icon: "⏳", desc: "Expert on historical events." },
            { name: "Gravity Kid", icon: "🍎", desc: "Manipulates physics and forces." },
            { name: "Great Lakes Explorer", icon: "🌊", desc: "Expert navigator of the Great Lakes." },
            { name: "The Alchemist", icon: "🧪", desc: "Mixes matter and states of chemistry." },
            { name: "Cartographer", icon: "🗺️", desc: "Never gets lost, reads any map." },
            { name: "The Tinkerer", icon: "⚙️", desc: "Builds simple machines on the fly." },
            { name: "Codebreaker", icon: "🔍", desc: "Solves logic puzzles and ciphers." }
          ],
          villains: [
            { name: "Fraction Phantom", icon: "👻", desc: "Splits everything into pieces." },
            { name: "Count Misspell", icon: "🧛", desc: "Steals vowels in the night." },
            { name: "Sludge Monster", icon: "🧟", desc: "Pollutes rivers and habitats." },
            { name: "The Negabor", icon: "👹", desc: "A moody green ogre who drains positive energy." },
            { name: "Sir Gravity-Drop", icon: "🦇", desc: "Turns the world upside down." },
            { name: "Grammar Gargoyle", icon: "🗿", desc: "Turns bad sentences to stone." },
            { name: "Dr. Deforestation", icon: "🚜", desc: "Destroys the local ecosystems." },
            { name: "Map-Mangler", icon: "🌪️", desc: "Scrambles the continents." },
            { name: "Multiplication Mummy", icon: "🧻", desc: "Traps you in tangles of times tables." },
            { name: "Punc. Poltergeist", icon: "🎭", desc: "Ends sentences prematurely!" }
          ],
          settings: [
            { name: "Haunted Library", icon: "🏛️", desc: "Books fly off the shelves here." },
            { name: "Castle of Calculus", icon: "🏰", desc: "A fortress built on math." },
            { name: "Primeval Forest", icon: "🌲", desc: "Dark woods full of science." },
            { name: "Ancient Pyramids", icon: "🏜️", desc: "Social studies in the sand." },
            { name: "Abandoned Lab", icon: "🏭", desc: "Where chemistry went wrong." },
            { name: "Spooky Swamp", icon: "🐊", desc: "Murky and full of biology." },
            { name: "Ghost Town", icon: "🏚️", desc: "An empty historical settlement." },
            { name: "Clockwork Tower", icon: "🕰️", desc: "A giant machine of gears." },
            { name: "Forgotten Museum", icon: "🖼️", desc: "Artifacts come alive at night." },
            { name: "Creepy Carnival", icon: "🎪", desc: "Rollercoasters of physics." }
          ],
          plots: [
            { name: "Find the Lost Artifact", icon: "💎", desc: "Recover the ancient treasure." },
            { name: "Rescue the Mayor", icon: "👑", desc: "The town leader is kidnapped!" },
            { name: "Stop the Machine", icon: "💣", desc: "Halt the villain's contraption." },
            { name: "Solve the Mystery", icon: "🧩", desc: "Find out who is haunting town." },
            { name: "Escape the Maze", icon: "🌀", desc: "Find your way out of the labyrinth." },
            { name: "Restore the Timeline", icon: "🕰️", desc: "Fix history before it's gone." },
            { name: "Cure the Curse", icon: "💊", desc: "Heal the townsfolk's ailments." },
            { name: "Find Hidden Treasure", icon: "💰", desc: "Follow the clues to the gold." },
            { name: "Defend the Castle", icon: "🛡️", desc: "Hold off the monster invasion." },
            { name: "Expose the Monster", icon: "🔦", desc: "Pull off the villain's mask!" }
          ],
          dilemmas: [
            { name: "Running Out of Time", icon: "⏰", desc: "The clock is ticking down fast." },
            { name: "Hopelessly Lost", icon: "🧭", desc: "You have no idea where you are." },
            { name: "Ignored Warning", icon: "⚠️", desc: "You shouldn't have opened that door." },
            { name: "Lost Magic Tool", icon: "🚫", desc: "Your primary weapon is gone." },
            { name: "Betrayed by Friend", icon: "🐍", desc: "Someone wasn't who they seemed." },
            { name: "Trapped in Room", icon: "🚪", desc: "The walls are closing in." },
            { name: "Sudden Storm", icon: "🌩️", desc: "Extreme weather strikes." },
            { name: "Weakness Revealed", icon: "👁️", desc: "The villain knows how to beat you." },
            { name: "Missing Pieces", icon: "🧩", desc: "You don't have all the clues." },
            { name: "Accused of Crime", icon: "⚖️", desc: "The town thinks YOU did it!" }
          ],
          readingLevels: [
            { name: "Early Primary", icon: "🧸", desc: "Grades 1-2 reading level." },
            { name: "Primary", icon: "🎒", desc: "Grade 3-4 reading level." },
            { name: "Junior", icon: "📚", desc: "Grade 5-6 reading level." },
            { name: "Intermediate", icon: "🎓", desc: "Grade 7-8 reading level." }
          ]
        };

        const STEPS_KEYS = ["character", "villain", "setting", "plot", "dilemma", "readingLevel"];
        const CATEGORIES_KEYS = ["characters", "villains", "settings", "plots", "dilemmas", "readingLevels"];

        const getActiveCategoryList = (step) => {
          return CATEGORIES[CATEGORIES_KEYS[step]];
        };

        // --- UTILITIES ---
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- FIREBASE AND AUDIO CONTEXT GLOBALS ---
        let fbApp = null, fbAuth = null, fbDb = null, fbAppId = 'adventurevania-default';

        // Compat Wrappers to bridge Global Compatibility variables cleanly without ES module imports
        const initializeFirebaseApp = (config) => {
          if (typeof firebase !== 'undefined' && firebase.initializeApp) {
            return firebase.initializeApp(config);
          }
          return null;
        };
        const getFirebaseAuth = () => {
          if (typeof firebase !== 'undefined' && firebase.auth) {
            return firebase.auth();
          }
          return null;
        };
        const getFirebaseFirestore = () => {
          if (typeof firebase !== 'undefined' && firebase.firestore) {
            return firebase.firestore();
          }
          return null;
        };

        const doc = (database, ...paths) => database ? database.doc(paths.join('/')) : null;
        const collection = (database, ...paths) => database ? database.collection(paths.join('/')) : null;
        const setDoc = (docRef, data) => docRef ? docRef.set(data) : Promise.reject(new Error("No Database Connection"));
        const getDoc = async (docRef) => {
          if (!docRef) return { exists: () => false };
          const snap = await docRef.get();
          return {
            exists: () => snap.exists,
            data: () => snap.data()
          };
        };

        // --- FIREBASE GLOBALS MAP WITH LOCAL BINDING FIXES ---
        const signInAnonymously = (authRef) => {
          return authRef ? authRef.signInAnonymously() : Promise.reject(new Error("Auth Unavailable"));
        };
        const signInWithCustomToken = (authRef, token) => {
          return authRef ? authRef.signInWithCustomToken(token) : Promise.reject(new Error("Auth Unavailable"));
        };
        const onAuthStateChanged = (authRef, callback) => {
          return authRef ? authRef.onAuthStateChanged(callback) : () => {};
        };

        try {
          const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};
          if (Object.keys(firebaseConfig).length > 0 && typeof firebase !== 'undefined') {
            fbApp = initializeFirebaseApp(firebaseConfig);
            fbAuth = getFirebaseAuth();
            fbDb = getFirebaseFirestore();
            fbAppId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'adventurevania-default';
          }
        } catch (e) {
          console.error("Firebase init failed:", e);
        }

        // --- DUAL-ENGINE COHERENT FALLBACK STORY GENERATOR ---
        const generateLocalBook = (setup) => {
          const char = CATEGORIES.characters[setup.character];
          const vill = CATEGORIES.villains[setup.villain];
          const sett = CATEGORIES.settings[setup.setting];
          const plot = CATEGORIES.plots[setup.plot];
          const dil = CATEGORIES.dilemmas[setup.dilemma];
          const level = setup.readingLevel;

          let chapters = [];
          for (let turn = 0; turn < 10; turn++) {
            let p1, p2, p3, q, choices;

            if (setup.readingLevel === 0) { // Toddler logic
              p1 = `Chapter ${turn + 1}. The sky is dark. ${char.name} walks. It is scary.`;
              p2 = `There is a big noise! The bad ${vill.name} is here.`;
              p3 = `Oh no! The bad ${vill.name} wants to stop you.`;
              q = `Who made the loud noise?`;
              choices = [
                { text: `The ${vill.name}`, isCorrect: true, isGameOver: false },
                { text: `A little bug`, isCorrect: false, isGameOver: true, gameOverMessage: "No, the bug was quiet. You lose!" }
              ];
            } else { // Standard logic
              p1 = `Chapter ${turn + 1}. With a sudden crash of lightning, ${char.name} moves forward into the ancient shadows of the ${sett.name}. The atmosphere is heavy with the trace of ${dil.name}.`;
              p2 = `The path ahead divides. Spooky winds whisper through the crumbling structures of the ${sett.name}. You must stay vigilant to proceed with your quest to ${plot.name}.`;
              p3 = `A sudden rustle behind the pillars! ${char.name} catches a glimpse of the terrifying ${vill.name} weaving complex puzzles in the twilight.`;
              q = `What primary force or dilemma was weighing heavily upon ${char.name} during this exploration?`;
              choices = [
                { text: `${dil.name}`, isCorrect: true, isGameOver: false },
                { text: "Finding a snack", isCorrect: false, isGameOver: true, gameOverMessage: "You became distracted by food and fell into a trapdoor!" }
              ];
            }

            chapters.push({ pages: [p1, p2, p3], question: q, choices: choices.sort(() => Math.random() - 0.5) });
          }
          return chapters;
        };

        // --- CUSTOM PROGRESSIVE SUNSET PROCEDURAL 8-BIT RENDERER ---
        const SunsetPixelArt = ({ setting, turn, villain }) => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            // 1. SKY GRADIENT (10 phases of sunset)
            let skyColors = [];
            if (turn === 0 || turn === 1) {
              skyColors = ['#fc9838', '#fc7460', '#bc447c']; 
            } else if (turn >= 2 && turn <= 4) {
              skyColors = ['#f85800', '#e40058', '#a800a8', '#5800a8']; 
            } else if (turn >= 5 && turn <= 7) {
              skyColors = ['#e40058', '#a800a8', '#400080', '#000040']; 
            } else {
              skyColors = ['#180040', '#000028', '#000010', '#000000']; 
            }

            const step = h / skyColors.length;
            skyColors.forEach((color, i) => {
              ctx.fillStyle = color;
              ctx.fillRect(0, i * step, w, step);
            });

            // 2. CELESTIAL BODIES
            if (turn < 7) {
              const sunY = 60 + turn * 22;
              ctx.fillStyle = 'rgba(255, 235, 59, 0.2)';
              ctx.beginPath(); ctx.arc(w/2, sunY, 48, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = '#ffeb3b';
              ctx.beginPath(); ctx.arc(w/2, sunY, 32, 0, Math.PI * 2); ctx.fill();
            } else {
              ctx.fillStyle = '#ffffff';
              for (let i = 0; i < 20; i++) {
                ctx.fillRect(Math.floor((Math.sin(i * 99) * 0.5 + 0.5) * w), Math.floor((Math.cos(i * 33) * 0.5 + 0.5) * (h - 100)), 2, 2);
              }
              const moonColor = turn === 9 ? '#d32f2f' : '#fff9c4';
              const moonGlow = turn === 9 ? 'rgba(211, 47, 47, 0.3)' : 'rgba(255, 249, 196, 0.2)';
              ctx.fillStyle = moonGlow;
              ctx.beginPath(); ctx.arc(w - 70, 60, 26, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = moonColor;
              ctx.beginPath(); ctx.arc(w - 70, 60, 18, 0, Math.PI * 2); ctx.fill();
            }

            // 2.5 THE NEGABOR GREEN OGRE FACE
            if (villain === 3) {
              const ogreX = w * 0.15; const ogreY = 45;
              ctx.fillStyle = '#388e3c'; ctx.fillRect(ogreX, ogreY, 40, 40);
              ctx.fillRect(ogreX - 8, ogreY + 6, 8, 8); ctx.fillRect(ogreX + 40, ogreY + 6, 8, 8);
              ctx.fillStyle = '#f57c00'; ctx.fillRect(ogreX + 6, ogreY + 12, 6, 6); ctx.fillRect(ogreX + 28, ogreY + 12, 6, 6);
              ctx.fillStyle = '#ff1744'; ctx.fillRect(ogreX + 8, ogreY + 14, 2, 2); ctx.fillRect(ogreX + 30, ogreY + 14, 2, 2);
              ctx.fillStyle = '#1b5e20'; ctx.fillRect(ogreX + 16, ogreY + 22, 8, 6);
              ctx.fillStyle = '#ffffff'; ctx.fillRect(ogreX + 8, ogreY + 30, 4, 4); ctx.fillRect(ogreX + 28, ogreY + 30, 4, 4);
              ctx.fillStyle = '#000000'; ctx.fillRect(ogreX + 12, ogreY + 32, 16, 2);
            }

            // 3. MOUNTAIN SILHOUETTE
            ctx.fillStyle = 'rgba(24, 9, 7, 0.65)';
            ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(0, h - 80); ctx.lineTo(w * 0.2, h - 120);
            ctx.lineTo(w * 0.4, h - 70); ctx.lineTo(w * 0.6, h - 105); ctx.lineTo(w * 0.8, h - 80);
            ctx.lineTo(w, h - 130); ctx.lineTo(w, h); ctx.closePath(); ctx.fill();

            // 4. SETTING SILHOUETTES
            ctx.fillStyle = '#100504'; ctx.fillRect(0, h - 40, w, 40);
            ctx.fillStyle = '#3e2723'; ctx.fillRect(0, h - 40, w, 4);
            ctx.fillStyle = '#000000';

            switch(setting) {
              case 0: {
                ctx.fillRect(10, 0, 30, h); ctx.fillRect(w - 40, 0, 30, h);
                ctx.fillStyle = '#ffeb3b'; ctx.fillRect(120, h - 140, 12, 6); ctx.fillRect(w - 150, h - 180, 14, 8);
                break;
              }
              case 1: {
                ctx.fillRect(30, h - 220, 60, 180); ctx.fillRect(200, h - 180, 50, 140);
                ctx.beginPath(); ctx.moveTo(30, h - 220); ctx.lineTo(60, h - 270); ctx.lineTo(90, h - 220); ctx.fill();
                break;
              }
              case 2: {
                const drawTree = (tx, ty) => {
                  ctx.fillRect(tx + 12, ty, 6, h - ty);
                  ctx.beginPath(); ctx.moveTo(tx, ty + 60); ctx.lineTo(tx + 15, ty); ctx.lineTo(tx + 30, ty + 60); ctx.fill();
                  ctx.beginPath(); tx -= 5; ctx.moveTo(tx, ty + 120); ctx.lineTo(tx + 20, ty + 40); ctx.lineTo(tx + 40, ty + 120); ctx.fill();
                };
                drawTree(40, h - 240); drawTree(w - 90, h - 260);
                break;
              }
              case 3: {
                ctx.beginPath(); ctx.moveTo(w/2 - 120, h - 40); ctx.lineTo(w/2, h - 190); ctx.lineTo(w/2 + 120, h - 40); ctx.closePath(); ctx.fill();
                break;
              }
              case 4: {
                ctx.fillRect(20, h - 160, 20, 120); ctx.fillRect(w - 50, h - 190, 30, 150);
                ctx.fillStyle = '#00e676'; ctx.fillRect(25, h - 120, 4, 4);
                ctx.fillStyle = '#ff1744'; ctx.fillRect(25, h - 100, 4, 4);
                break;
              }
              case 5: {
                ctx.fillRect(0, h - 50, w, 20); ctx.fillRect(40, h - 180, 12, 140); ctx.fillRect(w - 80, h - 200, 14, 160);
                break;
              }
              case 6: {
                ctx.fillRect(20, h - 170, 80, 130); ctx.fillRect(w - 110, h - 190, 90, 150);
                ctx.fillStyle = '#000'; ctx.fillRect(w/2 - 3, h - 100, 6, 40); ctx.fillRect(w/2 - 12, h - 90, 24, 6);
                break;
              }
              case 7: {
                ctx.beginPath(); ctx.arc(80, h - 160, 45, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w - 100, h - 200, 60, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 8: {
                ctx.fillRect(60, h - 120, 40, 80); ctx.fillRect(w - 100, h - 140, 40, 100);
                ctx.beginPath(); ctx.arc(w - 80, h - 160, 15, 0, Math.PI * 2); ctx.fill();
                break;
              }
              case 9: {
                ctx.beginPath(); ctx.arc(w/2, h - 150, 70, 0, Math.PI * 2); ctx.strokeStyle = '#000000'; ctx.lineWidth = 6; ctx.stroke();
                ctx.lineWidth = 2;
                for (let a = 0; a < 8; a++) {
                  const angle = (a * Math.PI) / 4;
                  ctx.beginPath(); ctx.moveTo(w/2, h - 150); ctx.lineTo(w/2 + Math.cos(angle) * 70, h - 150 + Math.sin(angle) * 70); ctx.stroke();
                }
                break;
              }
            }
          }, [setting, turn, villain]);

          return (
            <canvas ref={canvasRef} width={500} height={500} className="w-full h-full object-cover transition-opacity duration-1000" style={{ imageRendering: 'pixelated' }} />
          );
        };

        // --- INTERACTIVE TEXT HIGHLIGHTER ---
        const InteractiveText = ({ text, textSize }) => {
          const [highlights, setHighlights] = useState([]);
          useEffect(() => { setHighlights([]); }, [text]); 

          const handleSelection = () => {
            const selection = window.getSelection();
            if (!selection || selection.isCollapsed) return;
            const selectedText = selection.toString().trim();
            if (selectedText.length > 1 && !highlights.includes(selectedText)) setHighlights(prev => [...prev, selectedText]);
          };
          const removeHighlight = (phrase) => { setHighlights(prev => prev.filter(h => h !== phrase)); };

          const renderText = () => {
            if (!text) return null;
            if (highlights.length === 0) return text;
            const sorted = highlights.slice().sort((a, b) => b.length - a.length).map(h => h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
            const regex = new RegExp(`(${sorted.join('|')})`, 'gi');
            const parts = text.split(regex);
            return parts.map((part, i) => {
              const matched = highlights.find(h => h.toLowerCase() === part.toLowerCase());
              if (matched) return (<mark key={i} className="bg-amber-400 text-black px-1 rounded cursor-pointer" onClick={() => removeHighlight(matched)}>{part}</mark>);
              return <span key={i}>{part}</span>;
            });
          };

          return (
            <div onMouseUp={handleSelection} onTouchEnd={handleSelection}>
              <p className="font-terminal text-gray-200 leading-relaxed whitespace-pre-wrap" style={{ fontSize: `${textSize}px` }}>{renderText()}</p>
            </div>
          );
        };
