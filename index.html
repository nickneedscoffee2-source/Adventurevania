<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventurevania - Choose Your Own Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
      
      .font-pixel { font-family: 'Press Start 2P', cursive; }
      .font-terminal { font-family: 'VT323', monospace; }
      
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      
      .pixel-border {
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.5),
          inset 4px 4px 0px 0px rgba(255,255,255,0.2),
          0 0 0 4px #4A00E0,
          0 0 0 8px #000;
      }

      .music-border {
        box-shadow: 
          inset -2px -2px 0px 0px rgba(0,0,0,0.5),
          inset 2px 2px 0px 0px rgba(255,255,255,0.2),
          0 0 0 2px #4ade80,
          0 0 0 4px #000;
      }
      
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 49;
        position: fixed;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(138,43,226,0.2) 50%, rgba(0,0,0,0) 100%);
        opacity: 0.1;
        animation: scanline 8s linear infinite;
      }
      
      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      @keyframes lightning {
        0% { background-color: rgba(255, 255, 255, 0); }
        10% { background-color: rgba(255, 255, 255, 0.95); }
        20% { background-color: rgba(255, 255, 255, 0); }
        35% { background-color: rgba(255, 255, 255, 0.7); }
        45% { background-color: rgba(255, 255, 255, 0); }
        100% { background-color: rgba(255, 255, 255, 0); }
      }

      .lightning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 99;
        animation: lightning 0.6s ease-out;
      }

      /* Animated Critters (Bats & Spiders) */
      @keyframes batFlyRight {
        0% { transform: translate(-100px, var(--start-y)) scale(1); }
        25% { transform: translate(25vw, calc(var(--start-y) - 5vh)) scale(1.2); }
        50% { transform: translate(50vw, calc(var(--start-y) + 5vh)) scale(1); }
        75% { transform: translate(75vw, calc(var(--start-y) - 2vh)) scale(1.1); }
        100% { transform: translate(110vw, var(--start-y)) scale(1); }
      }
      @keyframes batFlyLeft {
        0% { transform: translate(110vw, var(--start-y)) scaleX(-1) scale(1); }
        25% { transform: translate(75vw, calc(var(--start-y) - 5vh)) scaleX(-1) scale(1.2); }
        50% { transform: translate(50vw, calc(var(--start-y) + 5vh)) scaleX(-1) scale(1); }
        75% { transform: translate(25vw, calc(var(--start-y) - 2vh)) scaleX(-1) scale(1.1); }
        100% { transform: translate(-100px, var(--start-y)) scaleX(-1) scale(1); }
      }
      @keyframes spiderCrawlRight {
        0% { transform: translate(-100px, var(--start-y)); }
        40% { transform: translate(40vw, var(--start-y)); }
        60% { transform: translate(40vw, var(--start-y)); } /* Pause in place */
        100% { transform: translate(110vw, var(--start-y)); }
      }
      @keyframes spiderCrawlLeft {
        0% { transform: translate(110vw, var(--start-y)) scaleX(-1); }
        40% { transform: translate(60vw, var(--start-y)) scaleX(-1); }
        60% { transform: translate(60vw, var(--start-y)) scaleX(-1); } /* Pause in place */
        100% { transform: translate(-100px, var(--start-y)) scaleX(-1); }
      }
      .critter {
        position: fixed; pointer-events: none; z-index: 80; 
        filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
      }

      .nes-btn {
        position: relative;
        display: inline-block;
        background-color: #8E2DE2;
        color: white;
        padding: 8px 16px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 
          inset -4px -4px 0px 0px rgba(0,0,0,0.4),
          inset 4px 4px 0px 0px rgba(255,255,255,0.3);
        transition: transform 0.1s;
      }
      .nes-btn:active {
        transform: scale(0.95);
        box-shadow: 
          inset 4px 4px 0px 0px rgba(0,0,0,0.4),
          inset -4px -4px 0px 0px rgba(255,255,255,0.3);
      }
      .nes-btn.green { background-color: #4ade80; color: #064e3b; }
      .nes-btn.red { background-color: #ef4444; color: #450a0a; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: #000; border-left: 2px solid #4A00E0; }
      ::-webkit-scrollbar-thumb { background: #8E2DE2; border: 2px solid #000; }
      
      body { background-color: #050505; margin: 0; overflow-x: hidden; }

      /* Story Book Columns */
      .story-columns {
        column-count: 1;
        column-gap: 2rem;
      }
      @media (min-width: 768px) {
        .story-columns {
          column-count: 2;
          column-rule: 2px dashed #4A00E0;
        }
      }
      
      /* Music Slider styling */
      input[type=range] { accent-color: #8E2DE2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION & CONSTANTS ---
        const apiKey = ""; 
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        // GOOGLE APPS SCRIPT WEB APP URL 
        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx0V7hWS2O4mjqtII6sW3NvWXE927uhvjXtIKrAe1V8R9SmMDp2QhUwEaC1HP_N4q2XDQ/exec"; 

        const MENU_IMAGES = [
          "https://image.pollinations.ai/prompt/dracula%20castle%20exterior%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20spooky%20night%20blood%20moon?width=600&height=300&nologo=true&seed=1",
          "https://image.pollinations.ai/prompt/creepy%20haunted%20graveyard%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20spooky%20lightning?width=600&height=300&nologo=true&seed=2",
          "https://image.pollinations.ai/prompt/dark%20dungeon%20interior%208-bit%20pixel%20art%20retro%20video%20game%20screenshot%20torches%20skeletons?width=600&height=300&nologo=true&seed=3"
        ];

        // Web Audio Synthesizer Presets Composition
        const SYNTH_TRACKS = [
          {
            name: "Vampire's Keep",
            tempo: 130,
            melody: [
              { note: "A4", dur: 2 }, { note: "E4", dur: 2 }, { note: "A4", dur: 2 }, { note: "B4", dur: 2 },
              { note: "C5", dur: 4 }, { note: "B4", dur: 4 },
              { note: "A4", dur: 2 }, { note: "G#4", dur: 2 }, { note: "A4", dur: 2 }, { note: "C5", dur: 2 },
              { note: "E5", dur: 8 }
            ],
            bass: ["A2", "E2", "F2", "E2"]
          },
          {
            name: "Dungeon Depths",
            tempo: 75,
            melody: [
              { note: "D4", dur: 4 }, { note: "D#4", dur: 4 }, { note: "F#4", dur: 4 }, { note: "G4", dur: 4 },
              { note: "Ab4", dur: 4 }, { note: "G4", dur: 4 }, { note: "F#4", dur: 4 }, { note: "D4", dur: 4 }
            ],
            bass: ["D2", "D#2", "D2", "C#2"]
          },
          {
            name: "Scooby Chase",
            tempo: 160,
            melody: [
              { note: "E4", dur: 2 }, { note: "G4", dur: 2 }, { note: "A4", dur: 2 }, { note: "A#4", dur: 2 },
              { note: "B4", dur: 4 }, { note: "G4", dur: 4 },
              { note: "E4", dur: 2 }, { note: "D4", dur: 2 }, { note: "E4", dur: 4 }
            ],
            bass: ["E2", "G2", "A2", "B2"]
          }
        ];

        const NOTE_FREQ = {
          "C2": 65.41, "C#2": 69.30, "D2": 73.42, "D#2": 77.78, "E2": 82.41, "F2": 87.31, "F#2": 92.50, "G2": 98.00, "G#2": 103.83, "A2": 110.00, "A#2": 116.54, "B2": 123.47,
          "D4": 293.66, "D#4": 311.13, "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88,
          "C5": 523.25, "D5": 587.33, "E5": 659.25, "F5": 698.46, "G5": 783.99, "Ab4": 415.30
        };

        const CATEGORIES = {
          characters: [
            { name: "The Mathlete", icon: "⚡", desc: "Calculates at the speed of light!" },
            { name: "Word Weaver", icon: "📖", desc: "Casts spells using vocabulary." },
            { name: "Eco-Ranger", icon: "🌿", desc: "Controls plants and knows nature." },
            { name: "Time Traveler", icon: "⏳", desc: "Expert on historical events." },
            { name: "Gravity Kid", icon: "🍎", desc: "Manipulates physics and forces." },
            { name: "Great Lakes Explorer", icon: "🌊", desc: "Expert navigator of the Great Lakes." },
            { name: "The Alchemist", icon: "🧪", desc: "Mixes matter and states of chemistry." },
            { name: "Cartographer", icon: "🗺️", desc: "Never gets lost, reads any map." },
            { name: "The Tinkerer", icon: "⚙️", desc: "Builds simple machines on the fly." },
            { name: "Codebreaker", icon: "🔍", desc: "Solves logic puzzles and ciphers." }
          ],
          villains: [
            { name: "Fraction Phantom", icon: "👻", desc: "Splits everything into pieces." },
            { name: "Count Misspell", icon: "🧛", desc: "Steals vowels in the night." },
            { name: "Sludge Monster", icon: "🧟", desc: "Pollutes rivers and habitats." },
            { name: "Time Lich", icon: "💀", desc: "Erases important history." },
            { name: "Sir Gravity-Drop", icon: "🦇", desc: "Turns the world upside down." },
            { name: "Grammar Gargoyle", icon: "🗿", desc: "Turns bad sentences to stone." },
            { name: "Dr. Deforestation", icon: "🚜", desc: "Destroys the local ecosystems." },
            { name: "Map-Mangler", icon: "🌪️", desc: "Scrambles the continents." },
            { name: "Multiplication Mummy", icon: "🧻", desc: "Traps you in tangles of times tables." },
            { name: "Punc. Poltergeist", icon: "🎭", desc: "Ends sentences prematurely!" }
          ],
          settings: [
            { name: "Haunted Library", icon: "🏛️", desc: "Books fly off the shelves here." },
            { name: "Castle of Calculus", icon: "🏰", desc: "A fortress built on math." },
            { name: "Primeval Forest", icon: "🌲", desc: "Dark woods full of science." },
            { name: "Ancient Pyramids", icon: "🏜️", desc: "Social studies in the sand." },
            { name: "Abandoned Lab", icon: "🏭", desc: "Where chemistry went wrong." },
            { name: "Spooky Swamp", icon: "🐊", desc: "Murky and full of biology." },
            { name: "Ghost Town", icon: "🏚️", desc: "An empty historical settlement." },
            { name: "Clockwork Tower", icon: "🕰️", desc: "A giant machine of gears." },
            { name: "Forgotten Museum", icon: "🖼️", desc: "Artifacts come alive at night." },
            { name: "Creepy Carnival", icon: "🎪", desc: "Rollercoasters of physics." }
          ],
          plots: [
            { name: "Find the Lost Artifact", icon: "💎", desc: "Recover the ancient treasure." },
            { name: "Rescue the Mayor", icon: "👑", desc: "The town leader is kidnapped!" },
            { name: "Stop the Machine", icon: "💣", desc: "Halt the villain's contraption." },
            { name: "Solve the Mystery", icon: "🧩", desc: "Find out who is haunting town." },
            { name: "Escape the Maze", icon: "🌀", desc: "Find your way out of the labyrinth." },
            { name: "Restore the Timeline", icon: "🕰️", desc: "Fix history before it's gone." },
            { name: "Cure the Curse", icon: "💊", desc: "Heal the townsfolk's ailments." },
            { name: "Find Hidden Treasure", icon: "💰", desc: "Follow the clues to the gold." },
            { name: "Defend the Castle", icon: "🛡️", desc: "Hold off the monster invasion." },
            { name: "Expose the Monster", icon: "🔦", desc: "Pull off the villain's mask!" }
          ],
          dilemmas: [
            { name: "Running Out of Time", icon: "⏰", desc: "The clock is ticking down fast." },
            { name: "Hopelessly Lost", icon: "🧭", desc: "You have no idea where you are." },
            { name: "Ignored Warning", icon: "⚠️", desc: "You shouldn't have opened that door." },
            { name: "Lost Magic Tool", icon: "🚫", desc: "Your primary weapon is gone." },
            { name: "Betrayed by Friend", icon: "🐍", desc: "Someone wasn't who they seemed." },
            { name: "Trapped in Room", icon: "🚪", desc: "The walls are closing in." },
            { name: "Sudden Storm", icon: "🌩️", desc: "Extreme weather strikes." },
            { name: "Weakness Revealed", icon: "👁️", desc: "The villain knows how to beat you." },
            { name: "Missing Pieces", icon: "🧩", desc: "You don't have all the clues." },
            { name: "Accused of Crime", icon: "⚖️", desc: "The town thinks YOU did it!" }
          ]
        };

        // --- FIREBASE SETUP ---
        let app, auth, db, appId;
        try {
          const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};
          if (Object.keys(firebaseConfig).length > 0) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'adventurevania-default';
          }
        } catch (e) {
          console.error("Firebase init failed:", e);
        }

        // --- UTILITIES ---
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const fetchWithRetry = async (url, options, retries = 5) => {
          let delay = 1000;
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, options);
              if (!response.ok) {
                const errText = await response.text();
                if (response.status === 400) throw new Error("Bad Request: " + errText);
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              return await response.json();
            } catch (e) {
              if (e.message.includes("Bad Request") || i === retries - 1) throw e;
              await sleep(delay);
              delay *= 2;
            }
          }
        };

        // Global Synth variables to prevent garbage collection / redundant triggers
        let synthCtx = null;
        let melodyInterval = null;

        // --- MAIN COMPONENT ---
        function Adventurevania() {
          const [user, setUser] = useState(null);
          const [gameState, setGameState] = useState('menu'); 
          
          // Game Data State
          const [setupData, setSetupData] = useState({ character: 0, villain: 0, setting: 0, plot: 0, dilemma: 0 });
          const [setupStep, setSetupStep] = useState(0); 
          const [setupFocusIndex, setSetupFocusIndex] = useState(0); // Focused element for Keyboard navigation
          const [storyHistory, setStoryHistory] = useState([]);
          const [currentNode, setCurrentNode] = useState(null);
          const [turnCount, setTurnCount] = useState(0);
          
          // Analytics & Tracking State
          const [sessionStartTime, setSessionStartTime] = useState(null);
          const [correctAnswers, setCorrectAnswers] = useState(0);
          const [totalQuestions, setTotalQuestions] = useState(0);

          // Aesthetic & Nav State
          const [menuImgIndex, setMenuImgIndex] = useState(0);
          const [showLightning, setShowLightning] = useState(false);
          const [musicVolume, setMusicVolume] = useState(0.3);
          const [isMuted, setIsMuted] = useState(true); 
          const [currentTrack, setCurrentTrack] = useState(0);
          const [focusedChoice, setFocusedChoice] = useState(0);
          const [critters, setCritters] = useState([]); // Array of flying bats and spiders
          
          // Audio TTS State
          const [isSpeaking, setIsSpeaking] = useState(false);

          const endOfStoryRef = useRef(null);

          // Initialize Firebase Auth
          useEffect(() => {
            const initAuth = async () => {
              if(!auth) return;
              try {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                  await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) { console.error("Auth Error", err); }
            };
            initAuth();
            if (auth) {
              const unsubscribe = onAuthStateChanged(auth, setUser);
              return () => unsubscribe();
            }
            // Cleanup TTS on unmount
            return () => {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            }
          }, []);

          // Scroll to bottom
          useEffect(() => {
            if ((gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && endOfStoryRef.current) {
              endOfStoryRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [currentNode, gameState]);

          // Rotating Menu Backgrounds
          useEffect(() => {
            if(gameState !== 'menu') return;
            const imgInterval = setInterval(() => {
              setMenuImgIndex(prev => (prev + 1) % MENU_IMAGES.length);
            }, 3000);
            return () => clearInterval(imgInterval);
          }, [gameState]);

          // Critter Spawner (Bats & Spiders)
          useEffect(() => {
            let timeoutId;
            const spawnCritter = () => {
              const id = Date.now();
              const isBat = Math.random() > 0.5;
              const direction = Math.random() > 0.5 ? 'Right' : 'Left';
              // Bats fly higher up, spiders crawl lower near the bottom
              const top = isBat ? Math.floor(Math.random() * 40) + 5 : Math.floor(Math.random() * 30) + 60; 
              
              const animation = isBat ? `batFly${direction} 8s linear forwards` : `spiderCrawl${direction} 12s linear forwards`;
              const icon = isBat ? '🦇' : '🕷️';
              
              const critterObj = {
                id, icon,
                style: {
                  '--start-y': `${top}vh`,
                  animation: animation,
                  fontSize: isBat ? '2rem' : '1.5rem'
                }
              };

              setCritters(prev => [...prev, critterObj]);

              // Remove critter from DOM after animation completes
              setTimeout(() => {
                setCritters(prev => prev.filter(c => c.id !== id));
              }, 12500);

              // Schedule next critter (Between 30 to 45 seconds)
              timeoutId = setTimeout(spawnCritter, Math.random() * 15000 + 30000);
            };

            // Spawn first critter quickly
            timeoutId = setTimeout(spawnCritter, Math.random() * 5000 + 5000);
            return () => clearTimeout(timeoutId);
          }, []);

          // --- 8-BIT SYNTH MUSIC CHIP ---
          const playSynthNote = (freq, type, duration, volMod) => {
            if (!synthCtx || isMuted || !freq) return;
            try {
              if (synthCtx.state === 'suspended') {
                synthCtx.resume();
              }
              const osc = synthCtx.createOscillator();
              const gainNode = synthCtx.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, synthCtx.currentTime);
              
              gainNode.gain.setValueAtTime(0, synthCtx.currentTime);
              gainNode.gain.linearRampToValueAtTime(musicVolume * volMod, synthCtx.currentTime + 0.01);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, synthCtx.currentTime + duration - 0.01);
              
              osc.connect(gainNode);
              gainNode.connect(synthCtx.destination);
              osc.start();
              osc.stop(synthCtx.currentTime + duration);
            } catch (e) {
              console.warn("Synth error:", e);
            }
          };

          const startSynthEngine = () => {
            if (melodyInterval) clearInterval(melodyInterval);
            if (!synthCtx) {
              synthCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const track = SYNTH_TRACKS[currentTrack];
            const stepDuration = 60 / track.tempo / 2; // eighth notes
            let step = 0;

            melodyInterval = setInterval(() => {
              if (isMuted) return;

              // Play Bassline
              if (step % 4 === 0) {
                const bassNote = track.bass[Math.floor(step / 4) % track.bass.length];
                if (NOTE_FREQ[bassNote]) {
                  playSynthNote(NOTE_FREQ[bassNote], "triangle", stepDuration * 3.8, 0.7);
                }
              }

              // Play Melody Sequence
              let melodySum = 0;
              let currentMelodyNote = null;
              for (let i = 0; i < track.melody.length; i++) {
                const item = track.melody[i];
                if (step % 16 === melodySum) {
                  currentMelodyNote = item;
                  break;
                }
                melodySum += item.dur;
              }

              if (currentMelodyNote && NOTE_FREQ[currentMelodyNote.note]) {
                playSynthNote(NOTE_FREQ[currentMelodyNote.note], "square", stepDuration * currentMelodyNote.dur * 0.9, 0.3);
              }

              step = (step + 1) % 16;
            }, stepDuration * 1000);
          };

          // Thunder Noise Generator
          const playThunderSynth = () => {
            if (!synthCtx || isMuted) return;
            try {
              const bufferSize = synthCtx.sampleRate * 1.5;
              const buffer = synthCtx.createBuffer(1, bufferSize, synthCtx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
              }
              const noiseNode = synthCtx.createBufferSource();
              noiseNode.buffer = buffer;
              
              const filterNode = synthCtx.createBiquadFilter();
              filterNode.type = 'lowpass';
              filterNode.frequency.setValueAtTime(600, synthCtx.currentTime);
              filterNode.frequency.exponentialRampToValueAtTime(30, synthCtx.currentTime + 1.2);
              
              const gainNode = synthCtx.createGain();
              gainNode.gain.setValueAtTime(musicVolume * 1.2, synthCtx.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.0001, synthCtx.currentTime + 1.4);
              
              noiseNode.connect(filterNode);
              filterNode.connect(gainNode);
              gainNode.connect(synthCtx.destination);
              noiseNode.start();
            } catch(e) {
              console.warn(e);
            }
          };

          // Spooky Wolf Howl Synth
          const playWolfHowl = () => {
            if (!synthCtx || isMuted) return;
            try {
              const osc = synthCtx.createOscillator();
              const gain = synthCtx.createGain();
              osc.type = 'sine';

              const now = synthCtx.currentTime;
              
              // Frequency envelope (howl glissando)
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(450, now + 1.5);
              
              // Add slight vibrato (LFO)
              const lfo = synthCtx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.setValueAtTime(5, now);
              const lfoGain = synthCtx.createGain();
              lfoGain.gain.setValueAtTime(10, now);
              lfo.connect(lfoGain);
              lfoGain.connect(osc.frequency);
              lfo.start(now + 1.0);
              lfo.stop(now + 4.0);
              
              osc.frequency.exponentialRampToValueAtTime(280, now + 3.5);

              // Amplitude envelope
              gain.gain.setValueAtTime(0.0001, now);
              gain.gain.exponentialRampToValueAtTime(musicVolume * 0.8, now + 1.5);
              gain.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);

              osc.connect(gain);
              gain.connect(synthCtx.destination);
              osc.start(now);
              osc.stop(now + 4.0);
            } catch(e) { 
              console.warn(e); 
            }
          };

          // Reliable track/mute toggle trigger
          useEffect(() => {
            if (!isMuted) {
              startSynthEngine();
            } else {
              if (melodyInterval) {
                clearInterval(melodyInterval);
                melodyInterval = null;
              }
            }
            return () => {
              if (melodyInterval) clearInterval(melodyInterval);
            };
          }, [isMuted, currentTrack, musicVolume]);

          // Lightning Effect & SFX
          const triggerLightning = () => {
             setShowLightning(true);
             playThunderSynth();
             setTimeout(() => setShowLightning(false), 500);
             
             // Wolf howl follows the thunder
             setTimeout(playWolfHowl, 800);
          };

          // Lightning happens at random intervals universally throughout the app
          useEffect(() => {
            const lightningInterval = setInterval(() => {
              if (Math.random() > 0.6) triggerLightning();
            }, 8000);
            return () => clearInterval(lightningInterval);
          }, [isMuted, musicVolume]);

          // --- TTS FUNCTIONALITY ---
          const handleReadAloud = (text) => {
            if (!window.speechSynthesis) return;
            
            // If currently speaking, stop it.
            if (isSpeaking) {
              window.speechSynthesis.cancel();
              setIsSpeaking(false);
              return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; // Slightly slower for younger readers
            utterance.onend = () => setIsSpeaking(false);
            utterance.onerror = () => setIsSpeaking(false);
            
            setIsSpeaking(true);
            window.speechSynthesis.speak(utterance);
          };

          // Keyboard Navigation controls
          useEffect(() => {
            const handleKeyDown = (e) => {
              if(document.activeElement.tagName === "INPUT" && document.activeElement.type === "text") return;

              if (gameState === 'setup') {
                 if (e.key === 'ArrowRight') {
                   setSetupFocusIndex(prev => Math.min(prev + 1, 9));
                 } else if (e.key === 'ArrowLeft') {
                   setSetupFocusIndex(prev => Math.max(prev - 1, 0));
                 } else if (e.key === 'ArrowDown') {
                   setSetupFocusIndex(prev => Math.min(prev + 5, 9));
                 } else if (e.key === 'ArrowUp') {
                   setSetupFocusIndex(prev => Math.max(prev - 5, 0));
                 } else if (e.key === 'Enter') {
                   const currentKey = Object.keys(setupData)[setupStep];
                   setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                   setSetupFocusIndex(0); // Reset for next screen
                   if (setupStep < 4) {
                     setSetupStep(prev => prev + 1);
                   } else {
                     startGame();
                   }
                 }
              } else if (gameState === 'story' && currentNode?.choices?.length > 0 && !errorMsg) {
                 if (e.key === 'ArrowDown') {
                   setFocusedChoice(prev => Math.min(prev + 1, currentNode.choices.length - 1));
                 } else if (e.key === 'ArrowUp') {
                   setFocusedChoice(prev => Math.max(prev - 1, 0));
                 } else if (e.key === 'Enter') {
                   handleChoice(currentNode.choices[focusedChoice]);
                 }
              } else if (gameState === 'menu') {
                 if (e.key === 'Enter') {
                    if (isMuted) setIsMuted(false); 
                    setSetupStep(0); 
                    setSetupFocusIndex(0);
                    setGameState('setup');
                 }
              } else if (gameState === 'gameover' || gameState === 'victory') {
                 if (e.key === 'Enter') setGameState('menu');
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [gameState, setupStep, setupData, setupFocusIndex, currentNode, focusedChoice, errorMsg, isMuted]);

          // --- ANALYTICS FUNCTION ---
          const recordEngagement = async (outcome) => {
            if (!SPREADSHEET_WEB_APP_URL) return; 
            
            const timeSpentSecs = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
            const compScore = totalQuestions > 0 ? (correctAnswers / totalQuestions * 100).toFixed(2) : 0;

            const trackingData = {
              timestamp: new Date().toISOString(),
              character: CATEGORIES.characters[setupData.character].name,
              villain: CATEGORIES.villains[setupData.villain].name,
              outcome: outcome,
              turnsSurvived: turnCount,
              totalQuestionsAttempted: totalQuestions,
              correctAnswers: correctAnswers,
              comprehensionScore: compScore + "%",
              timeSpentSeconds: timeSpentSecs
            };

            try {
              await fetch(SPREADSHEET_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(trackingData)
              });
            } catch (err) { console.error("Error sending analytics:", err); }
          };

          // --- API LOGIC ---
          const [loadingMsg, setLoadingMsg] = useState("");
          const [loadCodeInput, setLoadCodeInput] = useState("");
          const [saveCode, setSaveCode] = useState(null);
          const [errorMsg, setErrorMsg] = useState("");

          const generateStoryNode = async (actionText = null) => {
            // Stop any ongoing reading when moving to next screen
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            setIsSpeaking(false);

            setGameState('loading');
            setFocusedChoice(0); 
            setLoadingMsg("Summoning AI Game Master...");
            setErrorMsg("");
            
            const char = CATEGORIES.characters[setupData.character];
            const vill = CATEGORIES.villains[setupData.villain];
            const sett = CATEGORIES.settings[setupData.setting];
            const plot = CATEGORIES.plots[setupData.plot];
            const dil = CATEGORIES.dilemmas[setupData.dilemma];

            const subjects = ["Math", "Language Arts", "Science", "Social Studies"];
            const currentSubject = subjects[turnCount % subjects.length];

            let promptText = `
              Current Game State:
              - Player Character: ${char.name} (${char.desc})
              - Villain: ${vill.name} (${vill.desc})
              - Setting: ${sett.name} (${sett.desc})
              - Main Plot: ${plot.name}
              - Central Dilemma: ${dil.name}
              - Turn Count: ${turnCount} out of 10.
            `;

            if (turnCount === 0) {
              promptText += "\nThis is the BEGINNING of the story. Introduce the character, the setting, the villain's plot, and the central dilemma. Set the spooky but kid-friendly tone.";
            } else {
              promptText += `\nThe player previously chose this action: "${actionText}". Continue the story based on this choice.`;
            }

            if (turnCount >= 10) {
              promptText += "\nThis is the FINAL TURN. The player has survived long enough. Provide a satisfying, victorious conclusion where the character defeats the villain and resolves the plot. Set isVictory to true. Do not provide further choices.";
            } else {
              promptText += `
              \nREQUIREMENTS FOR THIS TURN:
              1. Write a 100-150 word engaging story segment in a spooky, Scooby-Doo mixed with 80s Castlevania style.
              2. Incorporate a Grade 3 educational challenge based on: ${currentSubject}. The challenge should naturally fit the story.
              3. State the question or challenge clearly in the "question" field.
              4. Provide 2 or 3 "choices" for the player.
                 - At least one choice MUST be the correct educational answer (set 'isCorrect' to true).
                 - At least one choice MUST be incorrect (set 'isCorrect' to false). If it causes a Game Over, set 'isGameOver' to true and write a funny 'deathMessage'.
              5. Provide an "imagePrompt" field containing a short visual description of the scene to generate an 8-bit image.
              `;
            }

            const systemInstruction = `You are the dynamic AI game engine for 'Adventurevania', a CYOA game for 3rd graders. You output strict JSON. Tone: Spooky, funny, 80s retro, educational.`;

            const payload = {
              contents: [{ role: "user", parts: [{ text: promptText }] }],
              systemInstruction: { role: "system", parts: [{ text: systemInstruction }] },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    storyText: { type: "STRING" },
                    imagePrompt: { type: "STRING" },
                    question: { type: "STRING" },
                    choices: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          text: { type: "STRING" },
                          isCorrect: { type: "BOOLEAN" },
                          isGameOver: { type: "BOOLEAN" },
                          deathMessage: { type: "STRING" }
                        }
                      }
                    },
                    isVictory: { type: "BOOLEAN" }
                  }
                }
              }
            };

            try {
              const response = await fetchWithRetry(GEMINI_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!response.candidates || response.candidates.length === 0) throw new Error("Empty Response");

              let jsonText = response.candidates[0].content.parts[0].text;
              const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
              if (jsonMatch) jsonText = jsonMatch[0];
              
              const nodeData = JSON.parse(jsonText);
              setCurrentNode(nodeData);
              
              if (nodeData.isVictory) {
                setGameState('victory');
                recordEngagement('Victory');
              } else {
                setGameState('story');
              }
            } catch (err) {
              console.error("Story Generation Error:", err);
              setErrorMsg("The magical connection was lost. Try again!");
              setGameState('story');
            }
          };

          const handleChoice = (choice) => {
            if (currentNode.question) {
              setTotalQuestions(prev => prev + 1);
              if (choice.isCorrect) setCorrectAnswers(prev => prev + 1);
            }

            setStoryHistory([...storyHistory, { node: currentNode, chosenAction: choice.text }]);
            setTurnCount(turnCount + 1);

            if (choice.isGameOver) {
              setCurrentNode({
                ...currentNode,
                storyText: currentNode.storyText + "\n\n" + (choice.deathMessage || "You made a grave mistake!"),
                choices: []
              });
              setGameState('gameover');
              recordEngagement('GameOver');
            } else {
              generateStoryNode(choice.text);
            }
          };

          const startGame = () => {
            setTurnCount(0);
            setStoryHistory([]);
            setSessionStartTime(Date.now());
            setCorrectAnswers(0);
            setTotalQuestions(0);
            generateStoryNode();
          };

          // --- SAVING & LOADING (FIRESTORE) ---
          const saveGame = async () => {
            if (!user || !db) return setErrorMsg("Must be connected to magical servers to save.");
            setLoadingMsg("Saving to the Crypt...");
            try {
              let code;
              let isUnique = false;
              while(!isUnique) {
                code = Math.floor(1000 + Math.random() * 9000).toString();
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'adventurevania_saves', code);
                const docSnap = await getDoc(docRef);
                if(!docSnap.exists()) isUnique = true;
              }

              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'adventurevania_saves', code);
              await setDoc(docRef, {
                setupData, storyHistory, currentNode, turnCount, gameState, timestamp: new Date().toISOString()
              });
              setSaveCode(code);
            } catch (e) {
              setErrorMsg("Failed to save your progress!");
            }
          };

          const loadGame = async () => {
            if (!user || !db) return;
            if (loadCodeInput.length !== 4) return setErrorMsg("Code must be 4 digits.");
            setGameState('loading'); setLoadingMsg("Searching the Archives..."); setErrorMsg("");
            try {
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'adventurevania_saves', loadCodeInput);
              const docSnap = await getDoc(docRef);
              if (docSnap.exists()) {
                const data = docSnap.data();
                setSetupData(data.setupData); setStoryHistory(data.storyHistory);
                setCurrentNode(data.currentNode); setTurnCount(data.turnCount);
                setGameState(data.gameState === 'gameover' ? 'gameover' : (data.gameState === 'victory' ? 'victory' : 'story'));
                setSaveCode(null); setSessionStartTime(Date.now()); 
              } else {
                setErrorMsg("No adventure found with that code."); setGameState('menu');
              }
            } catch (e) { setErrorMsg("Error accessing the archives."); setGameState('menu'); }
          };

          // --- RENDERERS ---

          const renderMenu = () => (
            <div className="flex flex-col items-center justify-center h-full text-center p-4 md:p-8 space-y-6 md:space-y-8">
              
              <div className="w-full max-w-2xl h-48 sm:h-56 md:h-64 border-4 border-purple-800 music-border bg-black overflow-hidden relative mb-2">
                 <img 
                   src={MENU_IMAGES[menuImgIndex]} 
                   className="w-full h-full object-cover transition-opacity duration-1000 ease-in-out" 
                   style={{ imageRendering: 'pixelated' }}
                   alt="Retro Castlevania Background"
                 />
                 <div className="absolute inset-0 bg-black/40"></div>
                 <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none px-2 w-full">
                    <h1 className="font-pixel text-lg sm:text-2xl md:text-3xl lg:text-4xl text-purple-500 tracking-wider drop-shadow-[0_0_15px_rgba(138,43,226,1)] w-full text-center break-words leading-tight">
                      ADVENTUREVANIA
                    </h1>
                    <p className="font-terminal text-green-400 text-lg sm:text-xl md:text-2xl mt-2 font-bold drop-shadow-[0_0_10px_rgba(74,222,128,1)]">A Grade 3 Reading Quest</p>
                 </div>
              </div>

              <div className="flex flex-col gap-4 md:gap-6 w-full max-w-md relative z-10">
                <button className="nes-btn animate-pulse text-xs sm:text-sm" onClick={() => { if(isMuted) setIsMuted(false); setSetupStep(0); setGameState('setup'); }}>
                  ▶️ Press Enter to Start
                </button>
                
                <div className="pixel-border bg-gray-900 p-4 md:p-6 flex flex-col gap-3 md:gap-4">
                  <p className="font-pixel text-[10px] text-gray-300">Resume Adventure</p>
                  <div className="flex gap-2">
                    <input 
                      type="text" maxLength="4" placeholder="0000" value={loadCodeInput}
                      onChange={(e) => setLoadCodeInput(e.target.value.replace(/\D/g, ''))}
                      className="w-full bg-black border-2 border-purple-800 text-green-400 font-pixel text-center p-2 outline-none focus:border-green-400"
                    />
                    <button className="nes-btn green" onClick={loadGame}>Load</button>
                  </div>
                  {errorMsg && <p className="font-terminal text-red-500 text-xl">{errorMsg}</p>}
                </div>
              </div>
            </div>
          );

          const renderSetup = () => {
            const steps = [
              { title: "Select Your Hero", key: "character", data: CATEGORIES.characters },
              { title: "Choose the Villain", key: "villain", data: CATEGORIES.villains },
              { title: "Pick a Setting", key: "setting", data: CATEGORIES.settings },
              { title: "Select the Plot", key: "plot", data: CATEGORIES.plots },
              { title: "Choose a Dilemma", key: "dilemma", data: CATEGORIES.dilemmas }
            ];
            const current = steps[setupStep];

            return (
              <div className="flex flex-col h-full p-4 md:p-8">
                <div className="flex justify-between items-center mb-6 border-b-4 border-purple-900 pb-4">
                  <h2 className="font-pixel text-xl md:text-2xl text-green-400">{current.title}</h2>
                  <span className="font-pixel text-xs text-gray-500">Step {setupStep + 1}/5</span>
                </div>

                <div className="flex-grow grid grid-cols-2 md:grid-cols-5 gap-4 overflow-y-auto pb-8 pr-2">
                  {current.data.map((item, idx) => {
                    const isSelected = setupData[current.key] === idx;
                    const isFocused = setupFocusIndex === idx;
                    return (
                      <div 
                        key={idx}
                        onClick={() => {
                          setSetupFocusIndex(idx);
                          setSetupData({...setupData, [current.key]: idx});
                        }}
                        className={`pixel-border p-4 cursor-pointer flex flex-col items-center text-center transition-all ${isFocused ? 'bg-purple-900 border-green-400 scale-105 shadow-[0_0_25px_rgba(74,222,128,0.7)]' : isSelected ? 'bg-purple-950 border-purple-500' : 'bg-black hover:bg-gray-800'}`}
                        style={isFocused ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.2), 0 0 0 4px #4ade80, 0 0 0 8px #000' } : isSelected ? { boxShadow: 'inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.2), 0 0 0 4px #8E2DE2, 0 0 0 8px #000' } : {}}
                      >
                        <div className="text-4xl mb-2">{item.icon}</div>
                        <h3 className="font-pixel text-[10px] md:text-xs text-white mb-2 leading-tight h-8 flex items-center">{item.name}</h3>
                        <p className="font-terminal text-gray-400 text-sm md:text-lg leading-tight hidden md:block">{item.desc}</p>
                      </div>
                    );
                  })}
                </div>

                <div className="flex justify-between mt-6 pt-4 items-center">
                  <div className="font-pixel text-[8px] text-gray-500 hidden md:block">Use Arrow Keys & Enter</div>
                  <div className="flex gap-4">
                    {setupStep > 0 ? <button className="nes-btn" onClick={() => setSetupStep(setupStep - 1)}>Back</button> : <div></div>}
                    {setupStep < 4 ? 
                      <button className="nes-btn green" onClick={() => {
                        const currentKey = Object.keys(setupData)[setupStep];
                        setSetupData(prev => ({...prev, [currentKey]: setupFocusIndex}));
                        setSetupFocusIndex(0);
                        setSetupStep(setupStep + 1);
                      }}>Next</button> : 
                      <button className="nes-btn green animate-pulse" onClick={startGame}>Start Quest</button>
                    }
                  </div>
                </div>
              </div>
            );
          };

          const renderStoryNode = (node, isHistory = false, chosenAction = null) => {
            if (!node) return null;
            return (
              <div className={`mb-12 ${isHistory ? 'opacity-60' : 'animate-[fadeIn_0.5s_ease-in]'}`}>
                <div className="pixel-border bg-black p-4 md:p-6 relative">
                  
                  {/* Decorative Corners */}
                  <div className="absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-purple-600"></div>
                  <div className="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-purple-600"></div>
                  <div className="absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-purple-600"></div>
                  <div className="absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-purple-600"></div>
                  
                  {node.imagePrompt && (
                    <div className="w-full h-32 md:h-48 mb-6 border-4 border-[#4A00E0] bg-gray-900 overflow-hidden relative">
                      <div className="absolute inset-0 flex items-center justify-center text-gray-500 font-pixel text-[10px] animate-pulse">
                        Generating 8-Bit Scene...
                      </div>
                      <img 
                        src={`https://image.pollinations.ai/prompt/${encodeURIComponent(node.imagePrompt + " 8-bit pixel art style retro video game screenshot castlevania spooky")}?width=800&height=300&nologo=true&seed=${turnCount}`} 
                        alt="Scene illustration" 
                        className="w-full h-full object-cover relative z-10"
                        style={{ imageRendering: 'pixelated' }}
                        onError={(e) => { e.target.style.display = 'none'; }}
                      />
                    </div>
                  )}

                  <div className="story-columns">
                    <p className="font-terminal text-2xl md:text-3xl text-gray-200 leading-relaxed whitespace-pre-wrap mb-4">
                      {node.storyText}
                    </p>
                  </div>

                  <div className="mt-4 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                    {node.question && !isHistory && (
                      <div className="p-3 bg-purple-900 border-l-4 border-green-400 break-inside-avoid w-full">
                        <p className="font-pixel text-[11px] text-green-300 leading-loose">
                          <span className="text-yellow-400">CHALLENGE:</span> {node.question}
                        </p>
                      </div>
                    )}
                    
                    {/* TTS Read Aloud Button */}
                    {!isHistory && (
                      <button 
                        onClick={() => handleReadAloud(node.storyText + (node.question ? ". The challenge is: " + node.question : ""))} 
                        className="nes-btn shrink-0"
                      >
                        {isSpeaking ? '⏹️ Stop Reading' : '🗣️ Read Aloud'}
                      </button>
                    )}
                  </div>
                </div>

                {isHistory && chosenAction && (
                  <div className="flex items-center justify-end mt-4 text-green-500 font-pixel text-xs">
                    <span className="bg-gray-900 px-4 py-2 pixel-border">You chose: {chosenAction}</span>
                  </div>
                )}
              </div>
            );
          };

          const renderGameArea = () => {
            if (!currentNode && !errorMsg) {
              return renderLoading();
            }

            return (
              <div className="flex flex-col h-full relative">
                <div className="flex justify-between items-center bg-gray-900 p-4 pixel-border mb-4 shrink-0 z-10">
                  <div className="font-pixel text-xs md:text-sm text-purple-400 flex items-center gap-2">
                     🗺️ Turn: {turnCount}/10
                  </div>
                  <div className="flex gap-4 md:gap-6">
                    <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={saveGame} disabled={gameState === 'gameover'}>
                      <span className="text-xl md:text-2xl drop-shadow-md">💾</span> Save
                    </button>
                    <button className="text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-pixel text-xs md:text-sm" onClick={() => {if(confirm("Quit to menu?")) setGameState('menu')}}>
                      <span className="text-xl md:text-2xl drop-shadow-md">🔄</span> Quit
                    </button>
                  </div>
                </div>

                {saveCode && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
                    <div className="pixel-border bg-gray-900 p-8 text-center max-w-sm w-full">
                      <h3 className="font-pixel text-green-400 mb-4">Adventure Saved!</h3>
                      <p className="font-terminal text-2xl text-white mb-6">Write down this magic code to resume later:</p>
                      <div className="text-6xl font-pixel text-yellow-400 bg-black p-6 pixel-border mb-8 inline-block tracking-widest">
                        {saveCode}
                      </div>
                      <button className="nes-btn w-full" onClick={() => setSaveCode(null)}>Continue</button>
                    </div>
                  </div>
                )}

                <div className="flex-grow overflow-y-auto px-4 md:px-8 pb-32">
                  {storyHistory.map((hist, idx) => (
                    <React.Fragment key={idx}>
                      {renderStoryNode(hist.node, true, hist.chosenAction)}
                    </React.Fragment>
                  ))}
                  
                  {renderStoryNode(currentNode, false)}

                  {errorMsg && (
                    <div className="bg-red-900 border-2 border-red-500 p-4 my-4 font-terminal text-2xl text-white text-center">
                      {errorMsg}
                      <br/>
                      <button className="nes-btn mt-4" onClick={() => generateStoryNode(storyHistory.length > 0 ? storyHistory[storyHistory.length-1].chosenAction : null)}>Try Again</button>
                    </div>
                  )}

                  <div ref={endOfStoryRef} />
                </div>

                {(gameState === 'story') && !errorMsg && currentNode?.choices && currentNode.choices.length > 0 && (
                  <div className="absolute bottom-0 left-0 right-0 bg-gray-900/95 p-3 md:p-4 border-t-4 border-purple-600 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
                    <p className="font-pixel text-[9px] text-gray-400 mb-2 text-center">What will you do next? (Arrows + Enter)</p>
                    <div className="flex flex-col gap-2 max-w-4xl mx-auto">
                      {currentNode.choices.map((choice, idx) => {
                        const isFocused = focusedChoice === idx;
                        return (
                          <button 
                            key={idx} 
                            className={`nes-btn text-left flex justify-between items-center group py-2 transition-transform duration-100 ${isFocused ? 'bg-purple-800 ring-2 ring-green-400 scale-[1.02]' : 'hover:bg-purple-800'}`}
                            onClick={() => handleChoice(choice)}
                            onMouseEnter={() => setFocusedChoice(idx)}
                          >
                            <span className={`text-[10px] md:text-[11px] leading-relaxed pr-4 ${isFocused ? 'text-green-300' : ''}`}>{choice.text}</span>
                            <span className={`${isFocused ? 'opacity-100 text-green-400' : 'opacity-0'} shrink-0`}>▶</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {gameState === 'gameover' && (
                  <div className="absolute bottom-0 left-0 right-0 bg-red-900/95 p-8 border-t-4 border-red-600 z-10 text-center">
                     <h2 className="font-pixel text-3xl text-red-400 mb-6 flex items-center justify-center gap-4">
                       💀 GAME OVER 💀
                     </h2>
                     <button className="nes-btn text-xl" onClick={() => setGameState('menu')}>Play Again</button>
                  </div>
                )}

                {gameState === 'victory' && (
                  <div className="absolute bottom-0 left-0 right-0 bg-green-900/95 p-8 border-t-4 border-green-600 z-10 text-center">
                     <h2 className="font-pixel text-3xl text-yellow-400 mb-6 flex items-center justify-center gap-4 animate-bounce">
                       🏆 VICTORY! 🏆
                     </h2>
                     <p className="font-terminal text-2xl text-white mb-6">You solved the mysteries and conquered Adventurevania!</p>
                     <button className="nes-btn text-xl" onClick={() => setGameState('menu')}>Play Again</button>
                  </div>
                )}
              </div>
            );
          };

          const renderLoading = () => (
            <div className="flex flex-col items-center justify-center h-full text-center space-y-6 flex-grow py-12">
              <div className="text-6xl animate-bounce">👻</div>
              <h2 className="font-pixel text-xl text-purple-400 leading-relaxed">{loadingMsg || "Summoning Game Engine..."}</h2>
              <div className="w-64 h-4 bg-gray-900 pixel-border mt-4 overflow-hidden relative mx-auto">
                <div className="absolute top-0 left-0 h-full bg-green-500 animate-[loading_2s_ease-in-out_infinite]" style={{width: '50%'}}></div>
              </div>
            </div>
          );

          // Audio Player Overlay UI
          const renderAudioPlayer = () => (
             <div className="absolute top-2 right-2 md:top-4 md:right-4 z-50 bg-black music-border p-2 md:p-3 flex flex-col gap-2 shadow-[0_4px_10px_rgba(0,0,0,0.8)] opacity-70 hover:opacity-100 transition-opacity">
                <div className="flex items-center gap-3 justify-between">
                  <button 
                    onClick={() => {
                      if(isMuted) {
                        if (synthCtx && synthCtx.state === 'suspended') synthCtx.resume();
                      }
                      setIsMuted(!isMuted);
                    }} 
                    className="text-xl hover:scale-110 transition-transform focus:outline-none"
                    title={isMuted ? "Unmute Music" : "Mute Music"}
                  >
                    {isMuted ? '🔇' : '🔊'}
                  </button>
                  <input 
                    type="range" min="0" max="1" step="0.05" 
                    value={musicVolume} 
                    onChange={(e) => setMusicVolume(parseFloat(e.target.value))} 
                    className="w-20 md:w-24 cursor-pointer"
                  />
                </div>
                <select 
                  className="bg-gray-900 text-green-400 font-pixel text-[8px] p-1 border border-purple-800 outline-none cursor-pointer" 
                  value={currentTrack} 
                  onChange={(e) => setCurrentTrack(parseInt(e.target.value))}
                >
                  {SYNTH_TRACKS.map((t, i) => <option key={i} value={i}>{t.name}</option>)}
                </select>
             </div>
          );

          return (
            <React.Fragment>
              <div className="crt fixed inset-0 z-50 pointer-events-none"></div>
              <div className="scanline fixed inset-0 z-40 pointer-events-none"></div>
              
              {/* Dynamic Animated Critters Layer */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {critters.map(crit => (
                  <div key={crit.id} className="critter" style={crit.style}>
                    {crit.icon}
                  </div>
                ))}
              </div>

              {showLightning && <div className="lightning-overlay"></div>}
              
              <div className="min-h-screen bg-[#050505] p-2 md:p-6 flex items-center justify-center relative">
                <div className="w-full max-w-5xl h-[95vh] bg-black pixel-border relative overflow-hidden flex flex-col justify-between">
                  {renderAudioPlayer()}

                  <div className="flex-grow overflow-hidden relative">
                    {gameState === 'menu' && renderMenu()}
                    {gameState === 'setup' && renderSetup()}
                    {gameState === 'loading' && renderLoading()}
                    {(gameState === 'story' || gameState === 'gameover' || gameState === 'victory') && renderGameArea()}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Adventurevania />);
    </script>
</body>
</html>
